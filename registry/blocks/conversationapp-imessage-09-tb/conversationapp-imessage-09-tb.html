  <meta charset="UTF-8" />

</head>
<body>
<div id="conversationapp-imessage-09-tb" data-composition-id="conversationapp-imessage-09-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="6">
<style>
    /* 🎨 CUSTOMIZE HERE */
    [data-composition-id="conversationapp-imessage-09-tb"] {
      --tb-accent: var(--tb-brand-accent, #007AFF);
      /* Samuel Kraft EXACT vars · light mode iMessage */
      --tb-bg: #ffffff;               /* --bg · screen background WHITE */
      --tb-text: #000;                /* black text on light bubbles */
      --tb-text-dim: rgba(60,60,67,0.6);
      --tb-sent: #0b93f6;             /* --sentColor · iMessage blue */
      --tb-received: #e5e5ea;         /* --receiveColor · light gray */
      --tb-blue: #007aff;             /* iOS system blue */
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --im-name:  "Alex";
      --im-1: "Hey did you see the new pack?";          --im-1-side: "in";
      --im-2: "no link?";                                --im-2-side: "out";
      --im-3: "tareabox.com — 52 layouts";              --im-3-side: "in";
      --im-4: "ready to render";                         --im-4-side: "in";
      --im-5: "shut up. taking my money 🤝";             --im-5-side: "out";
    }
    /* ⛔ EFFECT CODE */
    [data-composition-id="conversationapp-imessage-09-tb"] {
      position: relative; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2a2a2e 0%, #0a0a0c 100%);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="conversationapp-imessage-09-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* iPhone frame — anchored to column 3 of 4 (right-third, NOT edge) */
    [data-composition-id="conversationapp-imessage-09-tb"] .phone {
      position: absolute;
      top: 4%;
      right: 25%;
      height: 92%;
      aspect-ratio: 9/19.5;
      background: #1a1a1c;
      border-radius: 5.5vmin;
      padding: 0.9vmin;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10),
        0 30px 90px rgba(0,0,0,0.75),
        0 12px 30px rgba(0,0,0,0.5);
    
      z-index: 2;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .btn-side {
      position: absolute; background: #0e0e10; border-radius: 2px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .btn-mute   { left: -0.5vmin; top: 12%; width: 0.5vmin; height: 4%; }
    [data-composition-id="conversationapp-imessage-09-tb"] .btn-vol-up { left: -0.5vmin; top: 19%; width: 0.5vmin; height: 7%; }
    [data-composition-id="conversationapp-imessage-09-tb"] .btn-vol-dn { left: -0.5vmin; top: 28%; width: 0.5vmin; height: 7%; }
    [data-composition-id="conversationapp-imessage-09-tb"] .btn-power  { right: -0.5vmin; top: 22%; width: 0.5vmin; height: 11%; }

    [data-composition-id="conversationapp-imessage-09-tb"] .screen {
      width: 100%; height: 100%;
      border-radius: 4.6vmin;
      overflow: hidden;
      background: var(--tb-bg);
      display: flex; flex-direction: column;
      position: relative;
    }
    /* Dynamic Island */
    [data-composition-id="conversationapp-imessage-09-tb"] .island {
      position: absolute;
      top: 1.4vmin; left: 50%;
      transform: translateX(-50%);
      width: 30%; height: 3vmin;
      background: #000;
      border-radius: 2vmin;
      z-index: 10;
    }

    /* Status bar */
    [data-composition-id="conversationapp-imessage-09-tb"] .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4vmin 3vmin 0.6vmin;
      font-size: clamp(16px, 1.7vmin, 24px);
      font-weight: 700;
      color: #000;
      background: #ffffff;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .status-icons { display: flex; gap: 0.5vmin; align-items: center; }
    [data-composition-id="conversationapp-imessage-09-tb"] .status-icons svg {
      width: clamp(11px, 1.4vmin, 18px); height: clamp(11px, 1.4vmin, 18px);
      fill: #000;
    }

    /* iMessage header (light) */
    [data-composition-id="conversationapp-imessage-09-tb"] .im-header {
      padding: 0.4vmin 2vmin 1.4vmin;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      background: rgba(247,247,247,0.92);
      backdrop-filter: blur(20px);
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .back svg {
      width: clamp(15px, 2vmin, 26px); height: clamp(15px, 2vmin, 26px);
      stroke: var(--tb-blue); stroke-width: 2.5; fill: none;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .center {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.4vmin; flex: 1;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .avatar {
      width: 5vmin; height: 5vmin; border-radius: 50%;
      background: linear-gradient(135deg, #5856d6 0%, #ff2d55 100%);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700;
      font-size: clamp(22px, 2.6vmin, 36px);
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .name-row {
      display: flex; align-items: center; gap: 0.4vmin;
      font-size: clamp(16px, 1.7vmin, 24px);
      color: var(--tb-text);
      font-weight: 500;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .name-row svg {
      width: clamp(9px, 1.1vmin, 14px); height: clamp(9px, 1.1vmin, 14px);
      stroke: var(--tb-text-dim); stroke-width: 2.5; fill: none;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .ft svg {
      width: clamp(15px, 2vmin, 26px); height: clamp(15px, 2vmin, 26px);
      stroke: var(--tb-blue); stroke-width: 2; fill: none;
    }

    /* Messages area — bottom-anchored so new bubbles push up */
    [data-composition-id="conversationapp-imessage-09-tb"] .messages {
      flex: 1;
      padding: 1.4vmin 1.4vmin 1.6vmin;
      display: flex; flex-direction: column;
      justify-content: flex-start;
      gap: 0.3vmin;
      overflow: hidden;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .time-stamp {
      align-self: center;
      color: var(--tb-text-dim);
      font-size: clamp(16px, 1.5vmin, 24px);
      font-weight: 500;
      margin: 0.6vmin 0 1vmin;
      opacity: 0;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .time-stamp strong { color: var(--tb-text); font-weight: 700; }

    /* ════════════════════════════════════════════════════════
       BUBBLE TAILS — Samuel Kraft technique
       (samuelkraft.com/blog/ios-chat-bubbles-css)
       Two pseudo-elements: :before is the colored curve,
       :after is the bg-colored cut-out that creates the natural curve.
       ════════════════════════════════════════════════════════ */
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble {
      position: relative;
      max-width: 70%;
      margin-bottom: 15px;
      padding: 10px 20px;
      line-height: 24px;
      word-wrap: break-word;
      border-radius: 25px;
      font-size: clamp(22px, 2.3vmin, 36px);
      opacity: 0;
    }
    /* Tail shared sizes — Samuel Kraft EXACT specs */
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.tail::before,
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.tail::after {
      position: absolute;
      bottom: 0;
      height: 25px;
      content: "";
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.tail::before {
      width: 20px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.tail::after {
      width: 26px;
      background-color: var(--tb-bg);
    }

    /* OUTGOING (sent · solid blue, no gradient — Samuel Kraft default) */
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.out {
      align-self: flex-end;
      color: white;
      background: var(--tb-sent);
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.out.tail::before {
      right: -7px;
      background-color: var(--tb-sent);
      border-bottom-left-radius: 16px 14px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.out.tail::after {
      right: -26px;
      border-bottom-left-radius: 10px;
    }

    /* INCOMING (received · light gray) */
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.in {
      align-self: flex-start;
      color: black;
      background: var(--tb-received);
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.in.tail::before {
      left: -7px;
      background-color: var(--tb-received);
      border-bottom-right-radius: 16px 14px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.in.tail::after {
      left: -26px;
      border-bottom-right-radius: 10px;
    }

    /* Stacked consecutive bubbles (no tail) — Samuel Kraft .noTail */
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.stacked {
      margin-bottom: 2px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.stacked::before,
    [data-composition-id="conversationapp-imessage-09-tb"] .bubble.stacked::after {
      opacity: 0;
    }

    /* Typing indicator (light mode) */
    [data-composition-id="conversationapp-imessage-09-tb"] .typing {
      align-self: flex-start;
      background: var(--tb-received);
      padding: 12px 16px;
      border-radius: 25px;
      display: flex; gap: 6px; align-items: center;
      opacity: 0;
      position: relative;
      margin-bottom: 15px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .typing::before,
    [data-composition-id="conversationapp-imessage-09-tb"] .typing::after {
      content: "";
      position: absolute;
      bottom: 0; height: 25px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .typing::before {
      left: -7px; width: 20px;
      background: var(--tb-received);
      border-bottom-right-radius: 16px 14px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .typing::after {
      left: -26px; width: 26px;
      background: var(--tb-bg);
      border-bottom-right-radius: 10px;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .typing-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
    }

    /* Delivered marker */
    [data-composition-id="conversationapp-imessage-09-tb"] .delivered {
      align-self: flex-end;
      color: var(--tb-text-dim);
      font-size: clamp(16px, 1.6vmin, 24px);
      font-weight: 500;
      margin-top: 2px;
      letter-spacing: 0.02em;
      opacity: 0;
    }

    /* iMessage input bar (light) */
    [data-composition-id="conversationapp-imessage-09-tb"] .im-input {
      display: flex; align-items: center; gap: 1vmin;
      padding: 1vmin 1.6vmin 2vmin;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      background: #ffffff;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .plus {
      width: 4vmin; height: 4vmin; border-radius: 50%;
      background: #f1f1f3;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .plus svg {
      width: clamp(14px, 1.8vmin, 24px); height: clamp(14px, 1.8vmin, 24px);
      stroke: rgba(0,0,0,0.45); stroke-width: 2; fill: none;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .text-pill {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(0,0,0,0.18);
      border-radius: 999px;
      padding: 0.9vmin 1.6vmin;
      display: flex; align-items: center; justify-content: space-between;
      font-size: clamp(18px, 2.1vmin, 24px);
      color: var(--tb-text-dim);
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .text-pill svg {
      width: clamp(13px, 1.6vmin, 22px); height: clamp(13px, 1.6vmin, 22px);
      stroke: rgba(0,0,0,0.45); stroke-width: 2; fill: none;
    }
    [data-composition-id="conversationapp-imessage-09-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: 35% center;
      filter: brightness(0.28) saturate(0.85);
      z-index: 0;
    }
</style>

    <div class="phone">

          <span class="status-icons">
            <svg viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
            <svg viewBox="0 0 16 12"><path d="M8 3.5c2.4 0 4.6 0.9 6.3 2.4l1.2-1.2C13.4 2.7 10.8 1.5 8 1.5S2.6 2.7 0.5 4.7l1.2 1.2C3.4 4.4 5.6 3.5 8 3.5zm0 2.5c1.6 0 3.1 0.6 4.2 1.6l1.2-1.2C12 4.9 10 4 8 4S4 4.9 2.6 6.4l1.2 1.2C4.9 6.6 6.4 6 8 6zm0 3a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>
            <svg viewBox="0 0 24 12"><rect x="0" y="0" width="22" height="12" rx="2.5" fill="none" stroke="#fff" stroke-width="1"/><rect x="22.5" y="3.5" width="1.5" height="5" rx="0.6"/><rect x="2" y="2" width="18" height="8" rx="1.2"/></svg>
          </span>
        </div>

        <div class="im-header">
          <div class="back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
          <div class="center">
            <div class="avatar" id="im09-avatar">A</div>

              <span id="im09-name"></span>
              <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>

          </div>
        </div>

        <!-- Messages — bottom-anchored, scrolls up automatically -->
        <div class="messages" id="im09-messages">
          <div class="time-stamp" id="im09-stamp"><strong>iMessage</strong> · Today 9:41</div>
          <div class="bubble in tail"  id="im09-b1"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-imessage-09-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-imessage-09-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      /* Native HyperFrames variables → override CSS custom properties */
      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      setStr("--im-name", V.name);
      setStr("--im-1", V.msg1); setStr("--im-2", V.msg2); setStr("--im-3", V.msg3);
      setStr("--im-4", V.msg4); setStr("--im-5", V.msg5);

      $("#im09-name").textContent     = G("--im-name");
      $("#im09-avatar").textContent   = G("--im-name").charAt(0);
      $("#im09-b1").textContent       = G("--im-1");
      $("#im09-b2").textContent       = G("--im-2");
      $("#im09-b3").textContent       = G("--im-3");
      $("#im09-b4").textContent       = G("--im-4");
      $("#im09-b5").textContent       = G("--im-5");

      const tl = gsap.timeline({ paused: true });

      tl.to($("#im09-stamp"), { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.1);

      /* Bubbles slide up from below with bounce — Dribbble-style scroll feel */
      const bubbleTimes = [0.5, 1.15, 1.65, 2.15, 3.6];  /* tighter pacing */
      [1,2,3,4,5].forEach((i, idx) => {
        const b = $("#im09-b"+i);
        const at = bubbleTimes[idx];
        gsap.set(b, { y: 30, scale: 0.85 });
        tl.to(b, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.8)" }, at);
      });

      /* Typing indicator between b4 and b5 */
      const tt = $("#im09-typing");
      gsap.set(tt, { y: 18, scale: 0.9 });
      tl.to(tt, { opacity: 1, y: 0, scale: 1, duration: 0.3, ease: "back.out(1.8)" }, 2.65);
      const dots = tt.querySelectorAll(".typing-dot");
      dots.forEach((d, i) => {
        tl.to(d, { y: -3, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 4 }, 2.85 + i * 0.06);
      });
      tl.to(tt, { opacity: 0, y: 10, scale: 0.85, duration: 0.25, ease: "power2.in" }, 3.4);

      /* Delivered after last bubble */
      tl.to($("#im09-delivered"), { opacity: 1, duration: 0.3, ease: "power2.out" }, 4.3);

      tl.to({}, { duration: 6 }, 0);
      return tl;
    })();
  </script>
