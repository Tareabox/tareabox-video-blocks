<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Pack Natalie
  visual-gif-crumple-11-tb (horizontal 1920x1080)
  Talking head + 1 GIF protagonista + crumple exit (tipo papel arrugándose).
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"gifLabel","type":"string","label":"GIF label","default":"MOOD"},
  {"id":"accent","type":"color","label":"Accent color","default":"#EA9F84"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@500;700;800&display=block" rel="stylesheet" />
</head>
<body>
<div id="visual-gif-crumple-11-tb" data-composition-id="visual-gif-crumple-11-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-gif-crumple-11-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-accent:       var(--tb-brand-accent, #EA9F84);
      --tb-text:         #ffffff;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --gif-src: url("../assets/tb-media/tb-react-mind-blown.mp4");
      --gif-label: "MOOD";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                           */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-gif-crumple-11-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="visual-gif-crumple-11-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="visual-gif-crumple-11-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: 25% center;
    }

    [data-composition-id="visual-gif-crumple-11-tb"] .vig {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 60%, transparent 30%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 1;
    }

    [data-composition-id="visual-gif-crumple-11-tb"] .gif-frame {
      position: absolute;
      top: 50%;
      left: 72%;
      transform: translate(-50%, -50%);
      width: 32%;
      aspect-ratio: 1 / 1;
      background: white;
      padding: 2vmin 2vmin 8vmin 2vmin;
      border-radius: 1.5vmin;
      box-shadow:
        0 3vmin 8vmin rgba(0,0,0,0.6),
        0 0.8vmin 2vmin rgba(0,0,0,0.4);
      opacity: 0;
      z-index: 5;
      will-change: transform, opacity, filter;
    }

    [data-composition-id="visual-gif-crumple-11-tb"] .gif-inner {
      width: 100%; height: 100%;
      object-fit: contain;
      background-color: #1a1a1a;
      border-radius: 0.6vmin;
      display: block;
    }

    [data-composition-id="visual-gif-crumple-11-tb"] .gif-label {
      position: absolute;
      bottom: 1.8vmin;
      left: 0; right: 0;
      text-align: center;
      font-size: clamp(28px, 3.6vmin, 48px);
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    [data-composition-id="visual-gif-crumple-11-tb"] .tape {
      position: absolute;
      top: -1.4vmin; left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      width: 8vmin; height: 2.8vmin;
      background: rgba(255,235,150,0.7);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 0.2vmin 0.6vmin rgba(0,0,0,0.2);
    }
</style>


    <!--
      ASSET (vertical) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video class="bg-video" id="gc11h-bg"
           data-start="0" data-duration="5" data-track-index="0"
           src="https://videos.pexels.com/video-files/8048324/8048324-hd_1920_1080_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
           muted playsinline></video>

    <div class="vig"></div>

    <div class="gif-frame" id="gc11h-frame">
      <div class="tape"></div>
      <video class="gif-inner" id="gc11h-img"
             src="../assets/tb-media/tb-react-mind-blown.mp4"
             data-start="0" data-duration="5" data-track-index="11"
             muted playsinline loop></video>
      <span class="gif-label" id="gc11h-label"></span>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["visual-gif-crumple-11-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="visual-gif-crumple-11-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--gif-label", V.gifLabel);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      $("#gc11h-label").textContent = G("--gif-label");

      const gifSrc = cs.getPropertyValue("--gif-src").trim().replace(/^url\(["']?|["']?\)$/g, "");
      if (gifSrc && gifSrc.length > 3) {
        const media = $("#gc11h-img");
        if (media) media.src = gifSrc;
      }

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });
      const frame = $("#gc11h-frame");

      gsap.set(frame, { xPercent: -50, yPercent: -50, scale: 0.4, rotation: -8 });
      tl.to(frame, {
        opacity: 1,
        scale: 1,
        rotation: -2,
        duration: 0.6,
        ease: "back.out(2)"
      }, 0.4);

      tl.to(frame, {
        rotation: 2,
        duration: 1.5,
        yoyo: true, repeat: 1, ease: "sine.inOut"
      }, 1.0);

      const CRUMPLE_AT = 4.0;
      tl.to(frame, {
        scale: 0.92, skewX: 6, rotation: -12,
        filter: "blur(0.5px) contrast(1.15)",
        duration: 0.08, ease: "power2.in"
      }, CRUMPLE_AT);
      tl.to(frame, {
        scale: 0.7, skewX: -10, skewY: 4, rotation: 18,
        filter: "blur(1.5px) contrast(1.3)",
        duration: 0.1, ease: "power2.in"
      }, CRUMPLE_AT + 0.08);
      tl.to(frame, {
        scale: 0.4, skewX: 14, skewY: -8, rotation: -28,
        filter: "blur(3px) contrast(1.5) brightness(0.7)",
        duration: 0.12, ease: "power3.in"
      }, CRUMPLE_AT + 0.18);
      tl.to(frame, {
        scale: 0.05, skewX: -20, skewY: 18, rotation: 45,
        opacity: 0,
        filter: "blur(8px) contrast(2) brightness(0.4)",
        duration: 0.15, ease: "expo.in"
      }, CRUMPLE_AT + 0.3);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
