    /* ═══════════════════════════════════════════════════════ */

    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */

    /* WORD pills — Creativa Studio tape style, GRANDES y CENTRADAS */

    [data-composition-id="text-popup-words-28-tb-v"] .word-tape.coral { background: var(--tb-coral); }
    [data-composition-id="text-popup-words-28-tb-v"] .word-tape.sage  { background: var(--tb-sage); }

    /* Subtle paper texture grain */
    [data-composition-id="text-popup-words-28-tb-v"] .word-tape::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* Inner soft drop-shadow on the tape edge (depth) */
    [data-composition-id="text-popup-words-28-tb-v"] .word-tape::before {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 6px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.18));
      pointer-events: none;
    }

    /* Decorative center divider · pequeño corazón coral elegante */

    /* HEARTS / sparkles decorativos brand */

    [data-composition-id="text-popup-words-28-tb-v"] .heart svg {

    [data-composition-id="text-popup-words-28-tb-v"] .spark svg {

      <div class="burst-el heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#5D9493"/></svg></div>
      <div class="burst-el heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#F5D1C1"/></svg></div>
      <div class="burst-el heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#FDB79E"/></svg></div>

      <!-- Sparkles -->

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-popup-words-28-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="text-popup-words-28-tb-v"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      /* Native HyperFrames variables → override CSS custom properties */
      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--w1", V.word1);
      setStr("--w2", V.word2);
      setStr("--w3", V.word3);
      setRaw("--tb-coral", V.accent);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-sage",  V.sage);
      setRaw("--tb-bg",    V.bg);

      $("#na12v-w1").textContent = G("--w1");
      $("#na12v-w2").textContent = G("--w2");
      $("#na12v-w3").textContent = G("--w3");

      const BURST = parseFloat(G("--burst-at")) || 1.07;
      const EXIT  = 2.37;   // libro se cierra → palabras pop IN al libro
      const TOTAL = 4.17;
      const tl = gsap.timeline({ paused: true });

      const w1 = $("#na12v-w1"),
            w2 = $("#na12v-w2"),
            w3 = $("#na12v-w3"),
            soft = $("#na12v-soft"),
            endbg = $("#na12v-endbg");
      const decor = root.querySelectorAll(".heart, .spark");

      /* Soft overlay fade — para que las palabras se lean mejor */
      tl.to(soft, { opacity: 1, duration: 0.3, ease: "power2.out" }, BURST - 0.1);

      /* ═══════════════════════════════════════════════════════
         POP OUT — palabras pop del libro a 1.07s en cascada rápida
         (window de lectura: 1.07 → 2.37 = 1.3s)
         ═══════════════════════════════════════════════════════ */
      const wordTargets = [
        { el: w1, dx: 0, dy: -240, rot: -2 },    // Creativa arriba
        { el: w2, dx: 0, dy:  -80, rot:  2 },    // es centro
        { el: w3, dx: 0, dy:  80,  rot: -1.5 },  // Conexión abajo
      ];

      wordTargets.forEach(({ el, dx, dy, rot }, i) => {
        /* xPercent/yPercent + transformOrigin centered → preview === render */
        gsap.set(el, {
          xPercent: -50,
          yPercent: -50,
          transformOrigin: "center center",
          scale: 0.3,
          rotation: rot - 6
        });

        const at = BURST + (i * 0.15);

        tl.to(el, {
          opacity: 1,
          scale: 1,
          x: dx,
          y: dy,
          rotation: rot,
          duration: 0.55,
          ease: "back.out(2.4)"
        }, at);

        tl.to(el, {
          y: dy - 4,
          duration: 0.5,
          ease: "sine.inOut",
          yoyo: true,
          repeat: 1
        }, at + 0.6);
      });

      /* ═══════════════════════════════════════════════════════
         POP IN AL LIBRO — libro cierra a 2.37s, palabras se contraen al origen
         ═══════════════════════════════════════════════════════ */
      tl.to([w1, w2, w3], {
        x: 0,
        y: 0,             // vuelven al origen del burst (donde estaba el libro)
        scale: 0.1,
        opacity: 0,
        duration: 0.4,
        ease: "back.in(2.5)",
        stagger: 0.04
      }, EXIT);

      tl.to(soft, { opacity: 0, duration: 0.4, ease: "power2.in" }, EXIT);

      /* ═══════════════════════════════════════════════════════
         DECOR · hearts + sparkles random scatter (pocas, sutiles)
         ═══════════════════════════════════════════════════════ */
      decor.forEach((el, i) => {
        const angle = gsap.utils.random(-180, 0);
        const distance = gsap.utils.random(220, 420);
        const rad = angle * Math.PI / 180;
        const dx = Math.cos(rad) * distance;
        const dy = Math.sin(rad) * distance;

        gsap.set(el, { scale: 0.2, rotation: gsap.utils.random(-30, 30) });

        const at = BURST + (i * 0.05);

        /* Pop OUT con palabras */
        tl.to(el, {
          opacity: 1,
          scale: gsap.utils.random(0.85, 1.15),
          x: dx,
          y: dy,
          rotation: gsap.utils.random(-360, 360),
          duration: 0.7,
          ease: "back.out(2)"
        }, at);

        /* Pop IN al libro (junto con palabras) */
        tl.to(el, {
          x: 0,
          y: 0,
          scale: 0.05,
          opacity: 0,
          rotation: 0,
          duration: 0.4,
          ease: "back.in(2)"
        }, EXIT);
      });

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
