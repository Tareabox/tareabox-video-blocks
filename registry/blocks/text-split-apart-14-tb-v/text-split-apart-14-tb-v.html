<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-split-apart-14-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Words converge from outside (top/center/bottom) to form a phrase, hold, then explode apart.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"word1","type":"string","label":"Word 1","default":"BREAK"},
  {"id":"word2","type":"string","label":"Word 2 (accent)","default":"THE"},
  {"id":"word3","type":"string","label":"Word 3","default":"RULES"},
  {"id":"accent","type":"color","label":"Accent color","default":"#ef4444"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-split-apart-14-tb-v" data-composition-id="text-split-apart-14-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3.5">
<style>
    [data-composition-id="text-split-apart-14-tb-v"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #ef4444);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --word1: "BREAK";
      --word2: "THE";
      --word3: "RULES";
    }
    [data-composition-id="text-split-apart-14-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-split-apart-14-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-split-apart-14-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 6%;
      gap: 0.1em;
    }
    [data-composition-id="text-split-apart-14-tb-v"] .word {
      font-size: clamp(110px, 18vmin, 230px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
    }
    [data-composition-id="text-split-apart-14-tb-v"] .word:nth-child(1) { color: var(--tb-text); }
    [data-composition-id="text-split-apart-14-tb-v"] .word:nth-child(2) { color: var(--tb-accent); font-size: clamp(60px, 10vmin, 130px); }
    [data-composition-id="text-split-apart-14-tb-v"] .word:nth-child(3) { color: var(--tb-text); }
</style>

    <div class="stage">
      <div class="word" id="sp14v-w1"></div>
      <div class="word" id="sp14v-w2"></div>
      <div class="word" id="sp14v-w3"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-split-apart-14-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="text-split-apart-14-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--word1",     V.word1);
      setStr("--word2",     V.word2);
      setStr("--word3",     V.word3);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const w1 = root.querySelector("#sp14v-w1");
      const w2 = root.querySelector("#sp14v-w2");
      const w3 = root.querySelector("#sp14v-w3");

      w1.textContent = cs.getPropertyValue("--word1").trim().replace(/^["']|["']$/g, "");
      w2.textContent = cs.getPropertyValue("--word2").trim().replace(/^["']|["']$/g, "");
      w3.textContent = cs.getPropertyValue("--word3").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      // Converge from outside (vertical layout: top → center → bottom)
      tl.from(w1, { y: -500, opacity: 0, duration: 0.55, ease: "expo.out" }, 0.1);
      tl.from(w2, { x: -80,  opacity: 0, duration: 0.45, ease: "back.out(2)" }, 0.25);
      tl.from(w3, { y:  500, opacity: 0, duration: 0.55, ease: "expo.out" }, 0.1);

      // Hold assembled — then explode apart on final scene (vertical)
      tl.to(w1, { y: -700, opacity: 0, rotation: -8,  duration: 0.45, ease: "power3.in" }, 2.8);
      tl.to(w2, { x:  300, opacity: 0, scale: 0.6,    duration: 0.4,  ease: "power3.in" }, 2.85);
      tl.to(w3, { y:  700, opacity: 0, rotation:  8,  duration: 0.45, ease: "power3.in" }, 2.8);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
