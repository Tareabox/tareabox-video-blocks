<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-typewriter-dark-01-tb
  Tareabox Hyperframes Effect
  Description: Headline types out character by character on dark background with glowing cursor.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-typewriter-dark-01-tb" data-composition-id="text-typewriter-dark-01-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-dark-01-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #06b6d4);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline:        "Your headline here";
      --label:           "Typewriter";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-dark-01-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-typewriter-dark-01-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-typewriter-dark-01-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8% 10%; gap: 24px;
    
      z-index: 2;
    }
    [data-composition-id="text-typewriter-dark-01-tb"] .label {
      font-size: clamp(11px, 1.2vmin, 14px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-typewriter-dark-01-tb"] .headline {
      font-size: clamp(36px, 7.5vmin, 88px);
      font-weight: 700;
      color: var(--tb-text);
      line-height: 1.1;
      letter-spacing: -0.03em;
      text-align: center;
      max-width: 90%;
      overflow: hidden;
    }
    [data-composition-id="text-typewriter-dark-01-tb"] .cursor {
      display: inline-block;
      width: 0.055em; height: 0.88em;
      background: var(--tb-accent);
      margin-left: 0.06em;
      vertical-align: text-bottom;
      transform: translateY(0.05em);
      box-shadow: 0 0 16px var(--tb-accent);
    }
    [data-composition-id="text-typewriter-dark-01-tb"] .cursor.blink {
      animation: tw-d01-blink 0.55s steps(2, end) infinite;
    }
    @keyframes tw-d01-blink { 50% { opacity: 0; } }
    [data-composition-id="text-typewriter-dark-01-tb"] .vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
    }
    [data-composition-id="text-typewriter-dark-01-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.45;
    }
</style>

    <!--
      ASSET (horizontal/vertical) — demo from Pexels (free license).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
    -->
    <video class="bg-video"
           src="https://videos.pexels.com/video-files/14904130/14904130-hd_1920_1080_30fps.mp4"
           crossorigin="anonymous" data-tb-asset="background"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="stage">
      <div class="label"></div>
      <h1 class="headline"><span class="typed"></span><span class="cursor"></span></h1>
    </div>
    <div class="vignette"></div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-typewriter-dark-01-tb"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-typewriter-dark-01-tb"]');
      const typedEl = root.querySelector(".typed");
      const cursor  = root.querySelector(".cursor");
      const labelEl = root.querySelector(".label");
      const cs      = getComputedStyle(root);
      const text    = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label   = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      const TOTAL   = 3;
      const TYPE_D  = 1.8;

      root.querySelector(".headline").setAttribute("aria-label", text);
      labelEl.textContent = label;
      typedEl.textContent = "";

      const tl = gsap.timeline({ paused: true });
      const counter = { v: 0 };

      tl.to(labelEl, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0.1);
      tl.to(counter, {
        v: text.length, duration: TYPE_D, ease: "none",
        snap: { v: 1 },
        onUpdate: () => { typedEl.textContent = text.slice(0, Math.floor(counter.v)); }
      }, 0.3);
      tl.call(() => cursor.classList.add("blink"), [], 0.3 + TYPE_D);
      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
