<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;

    /* ⛔ EFFECT CODE                                          */

    [data-composition-id="layout-yt-reaction-title-06-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Top panel — face cam */
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .face-panel {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40%;
      overflow: hidden;
    }
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .face-video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 22%;
    }
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .face-grad {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 55%,
        rgba(9,9,11,0.92) 100%
      );
    }

    /* Bottom content panel */
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .content-panel {
      position: absolute;
      top: 38%; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      padding: 0 5%;

    /* Glass card */
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .card {
      width: 100%;
      background: rgba(9,9,11,0.82);
      border: 1px solid rgba(255,255,255,0.14);
      border-left: 6px solid var(--tb-accent);
      border-radius: 22px;
      padding: 6% 6%;
      backdrop-filter: blur(16px);
      display: flex; flex-direction: column;
      gap: 3.4vmin;
      opacity: 0;
    }

      display: flex; align-items: center;
      gap: 1.8vmin;

      border-radius: 50%;

    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .eyebrow-text {

      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--tb-accent);
    }

    /* Main title */
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .card-title {
      font-size: clamp(48px, 7vmin, 96px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--tb-text);
    }

    /* Body text */
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .card-body {
      font-size: clamp(24px, 3.2vmin, 44px);
      font-weight: 400;
      color: var(--tb-text-dim);
      line-height: 1.45;

    /* Rating badge */
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .card-rating {
      display: flex; align-items: center; gap: 2.4vmin;
      flex-wrap: wrap;
      margin-top: 1vmin;
    }
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .rating-label {
      font-size: clamp(20px, 2.6vmin, 34px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--tb-text-dim);
    }
    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .rating-value {
      font-size: clamp(34px, 4.6vmin, 62px);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--tb-accent);

    [data-composition-id="layout-yt-reaction-title-06-tb-v"] .stars {
      display: flex; gap: 0.8vmin; align-items: center;

      width: clamp(24px, 3vmin, 40px);
      height: clamp(24px, 3vmin, 40px);

<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-reaction-title-06-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="layout-yt-reaction-title-06-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--rt-eyebrow", V.rtEyebrow);
      setStr("--rt-title",   V.rtTitle);
      setStr("--rt-body",    V.rtBody);
      setStr("--rt-rating",  V.rtRating);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const card = root.querySelector("#yr06v-card");

      root.querySelector("#yr06v-eyebrow").textContent = cs.getPropertyValue("--rt-eyebrow").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#yr06v-title").textContent   = cs.getPropertyValue("--rt-title").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#yr06v-body").textContent    = cs.getPropertyValue("--rt-body").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#yr06v-rating").textContent  = cs.getPropertyValue("--rt-rating").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });

      gsap.set(card, { y: 30, scale: 0.97 });
      tl.to(card, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "expo.out" }, 0.25);

      const kids = card.children;
      gsap.set(kids, { opacity: 0, y: 12 });
      tl.to(kids, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out", stagger: 0.1 }, 0.45);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
