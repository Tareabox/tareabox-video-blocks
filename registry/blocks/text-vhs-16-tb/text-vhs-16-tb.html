<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-vhs-16-tb
  Tareabox Hyperframes Effect
  Description: Text materializes with VHS-style RGB channel separation and scanline overlay, then stabilizes.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-vhs-16-tb" data-composition-id="text-vhs-16-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-vhs-16-tb"] {
      --tb-bg:           #020a04;
      --tb-text:         #b0ffb8;
      --tb-text-dim:     #4ade80;
      --tb-accent:       var(--tb-brand-accent, #4ade80);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "REWIND";
      --label:    "PLAY ▶ VHS";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-vhs-16-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-vhs-16-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-vhs-16-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    
      z-index: 6;
    }
    [data-composition-id="text-vhs-16-tb"] .label {
      font-size: clamp(10px, 1.1vmin, 13px);
      font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-vhs-16-tb"] .headline {
      font-size: clamp(80px, 15vmin, 180px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--tb-text);
      opacity: 0;
    }
    [data-composition-id="text-vhs-16-tb"] .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      opacity: 0.7;
    
      z-index: 5;
    }
    [data-composition-id="text-vhs-16-tb"] .vignette {
      /* Empty — vignette now rendered as SVG feGaussianBlur (no CSS gradient = no banding) */
      display: none;
    }
    [data-composition-id="text-vhs-16-tb"] .noise-bar {
      position: absolute;
      left: 0; right: 0;
      height: 6px;
      background: rgba(180,255,200,0.25);
      top: 50%;
      opacity: 0;
    }
    [data-composition-id="text-vhs-16-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
</style>

    <!--
      ASSET (horizontal/vertical) — demo from Pexels (free license).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
    -->
    <video class="bg-video"
           src="https://videos.pexels.com/video-files/28682064/12451981_1920_1080_30fps.mp4"
           crossorigin="anonymous" data-tb-asset="background"
           data-start="0" data-duration="3.5" data-track-index="0"
           muted playsinline></video>

    <div class="scanlines"></div>
    <svg class="vignette-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none"
         style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4">
      <defs>
        <filter id="vhs-vig-text-vhs-16-tb" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="140" />
        </filter>
      </defs>
      <!-- Frame con hueco central, blureado heavy → vignette smooth sin banding -->
      <path d="M 0,0 L 1920,0 L 1920,1080 L 0,1080 Z M 345,194 L 1575,194 L 1575,886 L 345,886 Z"
            fill="black" fill-rule="evenodd" opacity="0.85"
            filter="url(#vhs-vig-text-vhs-16-tb)" />
    </svg>
    <div class="noise-bar" id="vhs16-bar"></div>
    <div class="stage">
      <div class="label" id="vhs16-label"></div>
      <div class="headline" id="vhs16-head"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-vhs-16-tb"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-vhs-16-tb"]');
      const cs      = getComputedStyle(root);
      const headEl  = root.querySelector("#vhs16-head");
      const labelEl = root.querySelector("#vhs16-label");
      const barEl   = root.querySelector("#vhs16-bar");

      headEl.textContent  = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      labelEl.textContent = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      // Noise bar sweeps
      tl.to(barEl, { opacity: 1, top: "0%", duration: 0, ease: "none" }, 0.1);
      tl.to(barEl, { top: "100%", duration: 0.35, ease: "none" }, 0.1);
      tl.to(barEl, { opacity: 0, duration: 0 }, 0.45);

      // Text appears with RGB channel split
      tl.fromTo(headEl,
        { opacity: 1, textShadow: "-14px 0 rgba(255,20,60,0.85), 14px 0 rgba(0,255,200,0.85)", x: -4 },
        { opacity: 1, textShadow: "0px 0 rgba(255,20,60,0), 0px 0 rgba(0,255,200,0)", x: 0, duration: 0.8, ease: "power2.out" },
        0.35);
      tl.set(headEl, { opacity: 1 }, 0.35);

      // Label fades in
      tl.to(labelEl, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);

      // Deterministic glitch twitches
      tl.to(headEl, { x: -6, textShadow: "-8px 0 rgba(255,20,60,0.7), 8px 0 rgba(0,255,200,0.7)", duration: 0, ease: "none" }, 1.5);
      tl.to(headEl, { x: 0, textShadow: "none", duration: 0.07, ease: "none" }, 1.52);

      tl.to(headEl, { x: 4, textShadow: "6px 0 rgba(255,20,60,0.6), -6px 0 rgba(0,255,200,0.6)", duration: 0, ease: "none" }, 2.3);
      tl.to(headEl, { x: 0, textShadow: "none", duration: 0.05, ease: "none" }, 2.34);

      // Second noise bar pass
      tl.to(barEl, { opacity: 0.8, top: "20%", duration: 0, ease: "none" }, 2.6);
      tl.to(barEl, { top: "85%", duration: 0.25, ease: "none" }, 2.6);
      tl.to(barEl, { opacity: 0, duration: 0 }, 2.85);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
