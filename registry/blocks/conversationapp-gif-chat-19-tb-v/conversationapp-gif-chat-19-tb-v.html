<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Pack Natalie
  conversationapp-gif-chat-19-tb-v (vertical 1080x1920)
  Vertical 9:16 — Talking head + iMessage-style bubble flotante con GIF reaccion adentro.
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"senderName","type":"string","label":"Sender name","default":"Sam"},
  {"id":"replyText","type":"string","label":"Reply text","default":"lol same energy"},
  {"id":"accent","type":"color","label":"Accent color","default":"#EA9F84"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-gif-chat-19-tb-v" data-composition-id="conversationapp-gif-chat-19-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="6">
<style>
    /* 🎨 CUSTOMIZE HERE */
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] {
      --tb-bg:           #0a0a0a;
      --tb-accent:       var(--tb-brand-accent, #EA9F84);
      --tb-text:         #ffffff;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --gif-src: url("../assets/tb-media/tb-react-clap.mp4");

      --sender-name:    "Sam";
      --sender-avatar:  url("https://i.pravatar.cc/200?img=12");
      --reply-text:     "lol same energy";
    }
    /* ⛔ EFFECT CODE */
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 25%;
    }

    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .bubble-row {
      position: absolute;
      bottom: 14%;
      left: 5%;
      display: flex;
      align-items: flex-end;
      gap: 1.6vmin;
      z-index: 10;
      opacity: 0;
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .avatar {
      width: 8vmin; height: 8vmin;
      border-radius: 50%;
      background-image: var(--sender-avatar);
      background-size: cover;
      background-position: center;
      background-color: #2a2a2c;
      border: 0.3vmin solid white;
      box-shadow: 0 0.8vmin 2.4vmin rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .bubble-stack {
      display: flex; flex-direction: column;
      gap: 0.8vmin;
      align-items: flex-start;
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .sender {
      font-size: clamp(16px, 2.2vmin, 28px);
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-left: 1.6vmin;
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .gif-bubble {
      position: relative;
      width: 38vmin; height: 38vmin;
      background: #e5e5ea;
      border-radius: 2.8vmin;
      overflow: hidden;
      box-shadow: 0 1.6vmin 4vmin rgba(0,0,0,0.5);
      padding: 1.2vmin;
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .gif-bubble::before {
      content: "";
      position: absolute;
      bottom: 0; left: -0.8vmin;
      width: 2.4vmin; height: 3vmin;
      background-color: #e5e5ea;
      border-bottom-right-radius: 1.9vmin 1.7vmin;
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .gif-bubble::after {
      content: "";
      position: absolute;
      bottom: 0; left: -3.2vmin;
      width: 3.2vmin; height: 3vmin;
      background-color: var(--tb-bg);
      border-bottom-right-radius: 1.2vmin;
    }
    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .gif-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      background-color: #1a1a1a;
      border-radius: 1.8vmin;
      display: block;
    }

    [data-composition-id="conversationapp-gif-chat-19-tb-v"] .text-bubble {
      background: #e5e5ea;
      color: #000;
      padding: 1.6vmin 2.6vmin;
      border-radius: 2.4vmin;
      font-size: clamp(20px, 2.8vmin, 36px);
      font-weight: 500;
      line-height: 1.3;
      box-shadow: 0 0.8vmin 2vmin rgba(0,0,0,0.3);
      opacity: 0;
    }
</style>


    <!--
      ASSET (vertical) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video class="bg-video" id="n15v-bg"
           data-start="0" data-duration="6" data-track-index="0"
           src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
           muted playsinline></video>

    <div class="bubble-row" id="n15v-row">
      <div class="avatar"></div>
      <div class="bubble-stack">
        <span class="sender" id="n15v-sender"></span>
        <div class="gif-bubble" id="n15v-gif">
          <video class="gif-img" id="n15v-gif-img" src="../assets/tb-media/tb-react-clap.mp4"
                 data-start="0" data-duration="6" data-track-index="11"
                 muted playsinline loop></video>
        </div>
        <div class="text-bubble" id="n15v-text"></div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-gif-chat-19-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-gif-chat-19-tb-v"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--sender-name", V.senderName);
      setStr("--reply-text",  V.replyText);
      setRaw("--tb-accent",   V.accent);
      setRaw("--tb-bg",       V.bg);

      $("#n15v-sender").textContent = G("--sender-name");
      $("#n15v-text").textContent   = G("--reply-text");

      const gifSrc = cs.getPropertyValue("--gif-src").trim().replace(/^url\(["']?|["']?\)$/g, "");
      if (gifSrc && gifSrc.length > 3) $("#n15v-gif-img").src = gifSrc;

      const TOTAL = 6;
      const tl = gsap.timeline({ paused: true });

      gsap.set("#n15v-row", { y: 60 });
      tl.to("#n15v-row", {
        opacity: 1, y: 0,
        duration: 0.55, ease: "power3.out"
      }, 0.6);

      gsap.set("#n15v-gif", { scale: 0.7, transformOrigin: "left bottom" });
      tl.to("#n15v-gif", {
        scale: 1,
        duration: 0.5, ease: "back.out(2)"
      }, 0.8);

      tl.to("#n15v-text", {
        opacity: 1,
        duration: 0.4, ease: "power3.out"
      }, 1.8);

      tl.to("#n15v-row", {
        opacity: 0, y: 60,
        duration: 0.4, ease: "power2.in"
      }, 5.3);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
