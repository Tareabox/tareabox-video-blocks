<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-outline-to-fill-13-tb
  Tareabox Hyperframes Effect
  Description: SVG text strokes draw in, then the fill floods from left to right.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-outline-to-fill-13-tb" data-composition-id="text-outline-to-fill-13-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-outline-to-fill-13-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "LAUNCH";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-outline-to-fill-13-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-outline-to-fill-13-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-outline-to-fill-13-tb"] .svg-stage {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    [data-composition-id="text-outline-to-fill-13-tb"] #otf13-outline {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    [data-composition-id="text-outline-to-fill-13-tb"] #otf13-filled {
      clip-path: url(#otf13-clip);
    }
</style>

    <svg class="svg-stage" viewBox="0 0 1920 1080">
      <defs>
        <clipPath id="otf13-clip">
          <rect id="otf13-clip-rect" x="-10" y="0" width="0" height="1080" />
        </clipPath>
        <clipPath id="otf13-out-clip">
          <rect id="otf13-out-clip-rect" x="-10" y="0" width="0" height="1080" />
        </clipPath>
      </defs>
      <!-- outline text (revealed by clip-path slide for reliable cross-engine render) -->
      <text id="otf13-outline"
            x="960" y="620"
            text-anchor="middle"
            font-family="Geist, sans-serif"
            font-size="220"
            font-weight="900"
            letter-spacing="-8"
            stroke-width="4"
            clip-path="url(#otf13-out-clip)">
      </text>
      <!-- filled text (revealed by clip) -->
      <text id="otf13-filled"
            x="960" y="620"
            text-anchor="middle"
            font-family="Geist, sans-serif"
            font-size="220"
            font-weight="900"
            letter-spacing="-8">
      </text>
    </svg>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-outline-to-fill-13-tb"] = (function () {
      const root      = document.querySelector('[data-composition-id="text-outline-to-fill-13-tb"]');
      const cs        = getComputedStyle(root);
      const outlineEl   = root.querySelector("#otf13-outline");
      const filledEl    = root.querySelector("#otf13-filled");
      const clipRect    = root.querySelector("#otf13-clip-rect");
      const outClipRect = root.querySelector("#otf13-out-clip-rect");

      const headline  = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const accent    = cs.getPropertyValue("--tb-accent").trim();
      outlineEl.textContent = headline;
      filledEl.textContent  = headline;
      outlineEl.setAttribute("stroke", accent);
      outlineEl.setAttribute("fill", "none");
      filledEl.setAttribute("fill", accent);

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      // Reveal outline via clip-path slide (reliable across engines)
      tl.to(outClipRect, {
        attr: { width: 1940 },
        duration: 1.2, ease: "power2.inOut"
      }, 0.15);

      // Flood fill from left
      tl.to(clipRect, {
        attr: { width: 1940 },
        duration: 0.9, ease: "power3.inOut"
      }, 1.5);

      // Fade outline as fill takes over
      tl.to(outlineEl, { opacity: 0, duration: 0.4, ease: "power2.in" }, 1.9);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
