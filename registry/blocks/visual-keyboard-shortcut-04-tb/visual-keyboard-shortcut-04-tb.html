<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  visual-keyboard-shortcut-04-tb
  Tareabox Hyperframes Effect
  Description: Keyboard shortcut keys appear one by one as styled chips, then a label fades in below.
  Category: visual
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="visual-keyboard-shortcut-04-tb" data-composition-id="visual-keyboard-shortcut-04-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-keyboard-shortcut-04-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --key1:  "Cmd";
      --key2:  "K";
      --label: "Open command palette";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-keyboard-shortcut-04-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="visual-keyboard-shortcut-04-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="visual-keyboard-shortcut-04-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.55);
    }
    [data-composition-id="visual-keyboard-shortcut-04-tb"] .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 90%);
      pointer-events: none;
    }


    [data-composition-id="visual-keyboard-shortcut-04-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4vmin;
    }
    [data-composition-id="visual-keyboard-shortcut-04-tb"] .keys-row {
      display: flex; align-items: center; gap: 2vmin;
    }
    [data-composition-id="visual-keyboard-shortcut-04-tb"] .key {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 7vmin; height: 7vmin;
      padding: 0 2vmin;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.28);
      box-shadow: 0 2px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.20);
      font-size: clamp(21px, 4vmin, 46px);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--tb-text);
      opacity: 0;
    }
    [data-composition-id="visual-keyboard-shortcut-04-tb"] .separator {
      font-size: clamp(19px, 3.2vmin, 35px);
      font-weight: 300;
      color: var(--tb-text-dim);
      opacity: 0;
    }
    [data-composition-id="visual-keyboard-shortcut-04-tb"] .shortcut-label {
      font-size: clamp(15px, 3.5vmin, 35px);
      font-weight: 500; letter-spacing: 0.04em;
      color: var(--tb-text-dim);
      opacity: 0;
    }
    [data-composition-id="visual-keyboard-shortcut-04-tb"] .accent-glow {
      position: absolute;
      width: 40%; height: 40%;
      top: 30%; left: 30%;
      border-radius: 50%;
      background: radial-gradient(ellipse, color-mix(in srgb, var(--tb-accent) 6%, transparent) 0%, transparent 70%);
      filter: blur(60px);
      opacity: 0;
    }
</style>

    <!--
      ASSET (horizontal) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="bg04-vid" class="bg-video" src="https://videos.pexels.com/video-files/8048324/8048324-hd_1280_720_50fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="vignette"></div>
    <div class="accent-glow" id="ks04-glow"></div>
    <div class="stage">
      <div class="keys-row" id="ks04-row"></div>
      <div class="shortcut-label" id="ks04-label"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["visual-keyboard-shortcut-04-tb"] = (function () {
      const root  = document.querySelector('[data-composition-id="visual-keyboard-shortcut-04-tb"]');
      const cs    = getComputedStyle(root);
      const row   = root.querySelector("#ks04-row");
      const label = root.querySelector("#ks04-label");
      const glow  = root.querySelector("#ks04-glow");

      const keys = [];
      ["--key1","--key2","--key3","--key4"].forEach(v => {
        const val = cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");
        if (val) keys.push(val);
      });
      label.textContent = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g,"");

      const keyEls = [], sepEls = [];
      keys.forEach((k, i) => {
        if (i > 0) {
          const sep = document.createElement("span");
          sep.className = "separator"; sep.textContent = "+";
          row.appendChild(sep); sepEls.push(sep);
        }
        const el = document.createElement("div");
        el.className = "key"; el.textContent = k;
        row.appendChild(el); keyEls.push(el);
      });

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      tl.to(glow, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.1);

      keyEls.forEach((el, i) => {
        tl.to(el, { opacity: 1, scale: 1, duration: 0.3, ease: "back.out(2)" }, 0.2 + i * 0.18);
        tl.from(el,{ scale: 0.7, duration: 0.3, ease: "back.out(2)" }, 0.2 + i * 0.18);
      });
      sepEls.forEach((el, i) => {
        tl.to(el, { opacity: 1, duration: 0.2, ease: "power2.out" }, 0.32 + i * 0.18);
      });
      tl.to(label, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.2 + keyEls.length * 0.18 + 0.15);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
