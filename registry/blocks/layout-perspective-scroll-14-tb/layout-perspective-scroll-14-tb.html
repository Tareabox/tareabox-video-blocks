<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-perspective-scroll-14-tb (horizontal 1920x1080)
  Description: Phone mockup floating in 3D perspective with scrolling content feed.
               Tilted device with cards, real thumbnails via YouTube CDN,
               gentle floating animation. Trendy 2026 app showcase style.
  Category: layout
  Duration: 8 seconds
  REQUIRES: gsap (CDN), Google Fonts (Inter)
-->
<html lang="en" data-composition-variables='[
  {"id":"headerText","type":"string","label":"Feed header","default":"Trending"},
  {"id":"accent","type":"color","label":"Accent color","default":"#3b82f6"},
  {"id":"bg","type":"color","label":"Background color","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=block" rel="stylesheet" />
</head>
<body style="margin:0;background:#0a0a0a;">
<div id="layout-perspective-scroll-14-tb" data-composition-id="layout-perspective-scroll-14-tb"
     data-width="1920" data-height="1080"
     data-start="0" data-duration="8">
<style>
  /* ═══════════════════════════════════════════════════════ */
  /* 🎨 CUSTOMIZE HERE                                       */
  /* ═══════════════════════════════════════════════════════ */
  [data-composition-id="layout-perspective-scroll-14-tb"] {
    --tb-bg:           var(--tb-brand-bg, #0a0a0a);
    --tb-bg-glow:      rgba(255,255,255,0.035);
    --tb-phone-bg:     #0f0f0f;
    --tb-phone-border: #2a2a2a;
    --tb-accent:       var(--tb-brand-accent, #3b82f6);
    --tb-text:         #ffffff;
    --tb-text-muted:   #777777;
    --tb-card-bg:      #1a1a1a;
    --tb-font:         var(--tb-brand-font-display, "Inter", sans-serif);

    /* Perspective tilt (degrees) */
    --tb-tilt-y: -22;
    --tb-tilt-x: 5;

    /* Video IDs for thumbnails */
    --tb-vid-00: "fb_SQe51UCk";  --tb-vid-01: "M1gu9MDucMA";
    --tb-vid-02: "t5SieIcMMjo";  --tb-vid-03: "myzs0mcpmFI";
    --tb-vid-04: "7iJrn8iwCtI";  --tb-vid-05: "ar9gkUGGfcE";
    --tb-vid-06: "Ir7xFCQP1pQ";  --tb-vid-07: "IyYC-hSFEFQ";
    --tb-vid-08: "Gc4Xh8u19NU";  --tb-vid-09: "6sJFI8LbhpY";

    /* Card titles */
    --tb-title-00: "Build your landing page with AI";
    --tb-title-01: "COMPLETE Notion tutorial 2025";
    --tb-title-02: "Automate your business with Make";
    --tb-title-03: "SEO for beginners: full guide";
    --tb-title-04: "Figma: intensive tutorial";
    --tb-title-05: "Email marketing that WORKS";
    --tb-title-06: "Google Ads: campaigns that convert";
    --tb-title-07: "Edit videos like a PRO";
    --tb-title-08: "WordPress vs Webflow vs Framer";
    --tb-title-09: "Python for automation";
  }
  /* ═══════════════════════════════════════════════════════ */
  /* ⛔ EFFECT CODE — do not edit below                      */
  /* ═══════════════════════════════════════════════════════ */
  [data-composition-id="layout-perspective-scroll-14-tb"] {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    background: var(--tb-bg);
  }
  [data-composition-id="layout-perspective-scroll-14-tb"] * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  /* Subtle center glow */
  [data-composition-id="layout-perspective-scroll-14-tb"] .bg-glow {
    position: absolute; top: 50%; left: 52%;
    width: 900px; height: 900px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--tb-bg-glow) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Ground shadow under phone */
  [data-composition-id="layout-perspective-scroll-14-tb"] .phone-shadow {
    position: absolute;
    top: 75%; left: 52%;
    width: 500px; height: 80px;
    transform: translate(-50%, 0);
    background: radial-gradient(ellipse, rgba(0,0,0,0.45) 0%, transparent 70%);
    filter: blur(18px);
    pointer-events: none;
  }

  /* Perspective stage */
  [data-composition-id="layout-perspective-scroll-14-tb"] .persp-stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    perspective: 1200px;
    padding-left: 60px;
  }

  /* Phone frame */
  [data-composition-id="layout-perspective-scroll-14-tb"] .phone-frame {
    position: relative;
    width: 460px; height: 920px;
    background: var(--tb-phone-bg);
    border-radius: 52px;
    border: 3px solid var(--tb-phone-border);
    overflow: hidden;
    transform: rotateY(calc(var(--tb-tilt-y) * 1deg)) rotateX(calc(var(--tb-tilt-x) * 1deg));
    box-shadow:
      0 50px 100px rgba(0,0,0,0.5),
      0 20px 40px rgba(0,0,0,0.3),
      inset 0 0 0 1px rgba(255,255,255,0.06);
  }

  /* Dynamic Island */
  [data-composition-id="layout-perspective-scroll-14-tb"] .phone-island {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 36px;
    background: #000; border-radius: 20px;
    z-index: 5;
  }
  [data-composition-id="layout-perspective-scroll-14-tb"] .phone-island::after {
    content: ''; position: absolute;
    right: 28px; top: 50%; transform: translateY(-50%);
    width: 10px; height: 10px;
    background: #1a1a2e; border-radius: 50%;
  }

  /* Phone content area */
  [data-composition-id="layout-perspective-scroll-14-tb"] .phone-content {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }

  /* Scrolling feed */
  [data-composition-id="layout-perspective-scroll-14-tb"] .scroll-feed {
    position: absolute; top: 64px; left: 0; right: 0;
    padding: 16px 20px;
    background: var(--tb-phone-bg);
  }

  /* Feed header */
  [data-composition-id="layout-perspective-scroll-14-tb"] .feed-header {
    font-family: var(--tb-font); font-size: 30px; font-weight: 700;
    color: var(--tb-text); margin-bottom: 18px; padding: 0 2px;
  }

  /* Cards */
  [data-composition-id="layout-perspective-scroll-14-tb"] .feed-card {
    background: var(--tb-card-bg);
    border-radius: 16px; overflow: hidden;
    margin-bottom: 16px;
  }
  [data-composition-id="layout-perspective-scroll-14-tb"] .feed-card-thumb {
    width: 100%; aspect-ratio: 16/9;
    background-size: cover; background-position: center;
    background-color: #222;
  }
  [data-composition-id="layout-perspective-scroll-14-tb"] .feed-card-body {
    padding: 14px 16px 16px;
  }
  [data-composition-id="layout-perspective-scroll-14-tb"] .feed-card-title {
    font-family: var(--tb-font); font-size: 18px; font-weight: 600;
    color: var(--tb-text); line-height: 1.35; margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  [data-composition-id="layout-perspective-scroll-14-tb"] .feed-card-meta {
    font-family: var(--tb-font); font-size: 13px; color: var(--tb-text-muted);
  }

  /* Home indicator */
  [data-composition-id="layout-perspective-scroll-14-tb"] .phone-home {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 140px; height: 5px;
    background: rgba(255,255,255,0.18); border-radius: 3px;
    z-index: 5;
  }
</style>

<!-- Background glow -->
<div class="bg-glow"></div>

<!-- Shadow under phone -->
<div class="phone-shadow" id="bn14-shadow"></div>

<!-- Perspective stage -->
<div class="persp-stage">
  <div class="phone-frame" id="bn14-phone">
    <div class="phone-island"></div>
    <div class="phone-content">
      <div class="scroll-feed" id="bn14-feed">
        <div class="feed-header" id="bn14-header">Trending</div>
      </div>
    </div>
    <div class="phone-home"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
window.__timelines["layout-perspective-scroll-14-tb"] = (function () {
  var root = document.querySelector('[data-composition-id="layout-perspective-scroll-14-tb"]');
  var cs   = getComputedStyle(root);
  var V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};

  var header = root.querySelector("#bn14-header");
  if (V.headerText) header.textContent = V.headerText;
  if (V.bg)     root.style.setProperty("--tb-bg", V.bg);
  if (V.accent) root.style.setProperty("--tb-accent", V.accent);

  var videoIds = [];
  for (var i = 0; i < 10; i++) {
    var k = "--tb-vid-" + String(i).padStart(2, "0");
    var v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    videoIds.push(v || "dQw4w9WgXcQ");
  }
  var titles = [];
  for (var i = 0; i < 10; i++) {
    var k = "--tb-title-" + String(i).padStart(2, "0");
    var v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    titles.push(v || "Video title " + (i + 1));
  }

  var channels = [
    "Productivity Lab","Carlos Code","Marketing Lab","CreaTech",
    "Design Pro","Business Master","Ana Growth","Video Academy",
    "WebDev Hub","Python Pro"
  ];
  var views = [
    "128K","45K","312K","89K","567K","23K","198K","412K","67K","234K"
  ];

  var feed = root.querySelector("#bn14-feed");
  /* 30 cards (mod 10) — never runs out during scroll */
  for (var i = 0; i < 30; i++) {
    var idx = i % 10;
    var card = document.createElement("div");
    card.className = "feed-card";
    card.innerHTML =
      '<div class="feed-card-thumb" style="background-image:url(\'https://i.ytimg.com/vi/' + videoIds[idx] + '/hqdefault.jpg\');"></div>' +
      '<div class="feed-card-body">' +
        '<div class="feed-card-title">' + titles[idx] + '</div>' +
        '<div class="feed-card-meta">' + channels[idx] + ' · ' + views[idx] + ' views</div>' +
      '</div>';
    feed.appendChild(card);
  }

  var tl = gsap.timeline({ paused: true });
  var phoneEl  = root.querySelector("#bn14-phone");
  var feedEl   = root.querySelector("#bn14-feed");
  var shadowEl = root.querySelector("#bn14-shadow");

  /* Phone entrance */
  tl.from(phoneEl, { scale: 0.82, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.15);
  tl.from(shadowEl, { opacity: 0, scale: 0.6, duration: 0.7, ease: "power2.out" }, 0.25);

  /* Gentle floating — Y axis breathe */
  tl.to(phoneEl, { y: -10, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0.3);

  /* Subtle rotation breathing */
  tl.to(phoneEl, { rotationY: -18, duration: 3.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.4);
  tl.to(phoneEl, { rotationX: 3, duration: 4.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.3);

  /* Shadow breathes with phone */
  tl.to(shadowEl, { scaleX: 1.08, scaleY: 0.9, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0.3);

  /* Content scroll */
  tl.to(feedEl, { y: -3200, duration: 7.5, ease: "power1.inOut" }, 0.3);

  /* Duration anchor */
  tl.to({}, { duration: 8 }, 0);

  return tl;
})();
</script>
</div>
</body>
</html>
