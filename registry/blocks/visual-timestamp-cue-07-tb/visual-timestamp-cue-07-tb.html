<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  visual-timestamp-cue-07-tb
  Tareabox Hyperframes Effect
  Description: YouTube-style chapter pill slides up from bottom — shows timestamp and chapter title.
  Category: visual
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="visual-timestamp-cue-07-tb" data-composition-id="visual-timestamp-cue-07-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-timestamp-cue-07-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --ts-time:    "04:32";
      --ts-chapter: "Chapter 3";
      --ts-title:   "Setting Up Authentication";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-timestamp-cue-07-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="visual-timestamp-cue-07-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.55);
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 90%);
      pointer-events: none;
    }


    [data-composition-id="visual-timestamp-cue-07-tb"] .pill-wrap {
      position: absolute;
      bottom: 7%;
      left: 5%;
      display: flex;
      align-items: center;
      gap: 0;
      opacity: 0;
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .ts-badge {
      display: flex;
      align-items: center;
      gap: 1.4vmin;
      padding: 1.2vmin 2vmin;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 10px 0 0 10px;
      border-right: none;
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .ts-dot {
      width: 1.8vmin; height: 1.8vmin;
      border-radius: 50%;
      background: var(--tb-accent);
      flex-shrink: 0;
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .ts-time {
      font-size: clamp(21px, 3.5vmin, 27px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--tb-accent);
      letter-spacing: 0.04em;
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .ts-divider {
      width: 1px;
      align-self: stretch;
      background: rgba(255,255,255,0.20);
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .ts-info {
      display: flex;
      flex-direction: column;
      gap: 0.4vmin;
      padding: 1.2vmin 2.2vmin;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 0 10px 10px 0;
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .ts-chapter {
      font-size: clamp(15px, 2.5vmin, 27px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--tb-text-dim);
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .ts-title {
      font-size: clamp(15px, 3vmin, 23px);
      font-weight: 500;
      color: var(--tb-text);
      letter-spacing: -0.01em;
    }
    [data-composition-id="visual-timestamp-cue-07-tb"] .accent-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--tb-accent) 0%, transparent 100%);
      transform-origin: left;
      scaleX: 0;
    }
</style>

    <!--
      ASSET (horizontal) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="bg07-vid" class="bg-video" src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="vignette"></div>
    <div class="pill-wrap" id="tc07-pill">
      <div class="ts-badge">
        <div class="ts-dot" id="tc07-dot"></div>
        <span class="ts-time" id="tc07-time"></span>
      </div>
      <div class="ts-divider"></div>
      <div class="ts-info">
        <span class="ts-chapter" id="tc07-chapter"></span>
        <span class="ts-title"   id="tc07-title"></span>
      </div>
    </div>
    <div class="accent-line" id="tc07-line"></div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["visual-timestamp-cue-07-tb"] = (function () {
      const root    = document.querySelector('[data-composition-id="visual-timestamp-cue-07-tb"]');
      const cs      = getComputedStyle(root);
      const pill    = root.querySelector("#tc07-pill");
      const dot     = root.querySelector("#tc07-dot");
      const line    = root.querySelector("#tc07-line");

      root.querySelector("#tc07-time").textContent    = cs.getPropertyValue("--ts-time").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#tc07-chapter").textContent = cs.getPropertyValue("--ts-chapter").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#tc07-title").textContent   = cs.getPropertyValue("--ts-title").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      gsap.set(line, { scaleX: 0 });
      tl.to(line, { scaleX: 1, duration: 0.5, ease: "expo.out" }, 0.05);

      gsap.set(pill, { opacity: 0, y: 18 });
      tl.to(pill, { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 0.2);

      tl.to(dot, { scale: 1.3, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 }, 0.55);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
