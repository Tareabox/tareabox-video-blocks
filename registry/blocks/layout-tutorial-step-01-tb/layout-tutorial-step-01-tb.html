<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-tutorial-step-01-tb
  Tareabox Hyperframes Effect
  Description: Step card with large number, title, subtitle, and progress dots — for tutorial step-by-step sequences.
  Category: layout
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-tutorial-step-01-tb" data-composition-id="layout-tutorial-step-01-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-tutorial-step-01-tb"] {
      --tb-bg:           #080c14;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --step-current: "03";
      --step-total:   "5";
      --step-title:   "Setting Up Your Environment";
      --step-sub:     "Install dependencies and configure your project";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-tutorial-step-01-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-tutorial-step-01-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-tutorial-step-01-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 0 13%;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .step-label {
      font-size: clamp(16px, 3.5vmin, 30px);
      font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--tb-accent);
      margin-bottom: 1.5vmin;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .number-row {
      display: flex; align-items: baseline; gap: 0.15em;
      margin-bottom: 3.5vmin;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .step-number {
      font-size: clamp(80px, 15vmin, 180px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .step-total {
      font-size: clamp(36px, 8vmin, 60px);
      font-weight: 300;
      color: var(--tb-text-dim);
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .divider {
      width: 0; height: 3px;
      background: var(--tb-accent);
      margin-bottom: 3vmin;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .step-title {
      font-size: clamp(36px, 8vmin, 60px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--tb-text);
      max-width: 70%;
      margin-bottom: 2vmin;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .step-sub {
      font-size: clamp(19px, 3vmin, 32px);
      font-weight: 400;
      color: var(--tb-text-dim);
      max-width: 60%;
      line-height: 1.5;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .dots {
      position: absolute;
      bottom: 7%; left: 13%;
      display: flex; gap: 1.2vmin; align-items: center;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .dot {
      width: 1vmin; height: 1vmin; border-radius: 50%;
      background: var(--tb-text-dim);
    }
    [data-composition-id="layout-tutorial-step-01-tb"] .dot.active {
      background: var(--tb-accent);
      width: 2.5vmin; border-radius: 0.5vmin;
    }
</style>

    <div class="stage">
      <div class="step-label" id="ts01-label">Step</div>
      <div class="number-row">
        <div class="step-number" id="ts01-num"></div>
        <div class="step-total" id="ts01-total"></div>
      </div>
      <div class="divider" id="ts01-div"></div>
      <div class="step-title" id="ts01-title"></div>
      <div class="step-sub"   id="ts01-sub"></div>
    </div>
    <div class="dots" id="ts01-dots"></div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-tutorial-step-01-tb"] = (function () {
      const root   = document.querySelector('[data-composition-id="layout-tutorial-step-01-tb"]');
      const cs     = getComputedStyle(root);
      const label  = root.querySelector("#ts01-label");
      const numEl  = root.querySelector("#ts01-num");
      const totEl  = root.querySelector("#ts01-total");
      const divEl  = root.querySelector("#ts01-div");
      const titleEl= root.querySelector("#ts01-title");
      const subEl  = root.querySelector("#ts01-sub");
      const dotsEl = root.querySelector("#ts01-dots");

      const current = parseInt(cs.getPropertyValue("--step-current").trim().replace(/["']/g,"")) || 3;
      const total   = parseInt(cs.getPropertyValue("--step-total").trim().replace(/["']/g,""))   || 5;

      numEl.textContent  = String(current).padStart(2,"0");
      totEl.textContent  = " / " + total;
      titleEl.textContent = cs.getPropertyValue("--step-title").trim().replace(/^["']|["']$/g,"");
      subEl.textContent   = cs.getPropertyValue("--step-sub").trim().replace(/^["']|["']$/g,"");

      for (let i = 1; i <= total; i++) {
        const d = document.createElement("div");
        d.className = "dot" + (i === current ? " active" : "");
        dotsEl.appendChild(d);
      }

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      tl.to(label,  { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 0.1);
      tl.from(numEl, { x: -60, duration: 0.55, ease: "expo.out" }, 0.2);
      tl.to(numEl,  { opacity: 1, duration: 0.25 }, 0.2);
      tl.to(totEl,  { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.45);
      tl.to(divEl,  { width: "40%", duration: 0.5, ease: "power3.out" }, 0.5);
      tl.to(titleEl,{ opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 0.65);
      tl.from(titleEl,{ y: 20, duration: 0.45, ease: "power2.out" }, 0.65);
      tl.to(subEl,  { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.85);
      tl.from(subEl,{ y: 15, duration: 0.4, ease: "power2.out" }, 0.85);
      tl.to(dotsEl, { opacity: 1, duration: 0.4, ease: "power2.out" }, 1.0);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
