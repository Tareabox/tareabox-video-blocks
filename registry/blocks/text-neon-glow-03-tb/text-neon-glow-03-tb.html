<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-neon-glow-03-tb
  Tareabox Hyperframes Effect
  Description: Words materialize with a pulsing neon glow, staggered word by word.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-neon-glow-03-tb" data-composition-id="text-neon-glow-03-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-neon-glow-03-tb"] {
      --tb-bg:           #080810;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #ec4899);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --line1: "BUILD FAST";
      --line2: "SHIP FASTER";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-neon-glow-03-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-neon-glow-03-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-neon-glow-03-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.12em;
    }
    [data-composition-id="text-neon-glow-03-tb"] .line {
      font-size: clamp(52px, 10vmin, 120px);
      font-weight: 900;
      color: var(--tb-text);
      letter-spacing: -0.04em;
      line-height: 1;
      text-align: center;
      opacity: 0;
      overflow: hidden;
    }
    [data-composition-id="text-neon-glow-03-tb"] .line.glow {
      text-shadow:
        0 0 20px var(--tb-accent),
        0 0 60px color-mix(in srgb, var(--tb-accent) 60%, transparent),
        0 0 120px color-mix(in srgb, var(--tb-accent) 30%, transparent);
      color: color-mix(in srgb, var(--tb-accent) 15%, #ffffff);
    }
    [data-composition-id="text-neon-glow-03-tb"] .ambient {
      position: absolute;
      width: 60%; height: 50%;
      top: 25%; left: 20%;
      border-radius: 50%;
      background: radial-gradient(ellipse, color-mix(in srgb, var(--tb-accent) 12%, transparent) 0%, transparent 70%);
      filter: blur(40px);
      opacity: 0;
      pointer-events: none;
    }
</style>

    <div class="ambient"></div>
    <div class="stage">
      <div class="line" id="ng03-l1"></div>
      <div class="line" id="ng03-l2"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-neon-glow-03-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-neon-glow-03-tb"]');
      const cs   = getComputedStyle(root);
      const l1   = root.querySelector("#ng03-l1");
      const l2   = root.querySelector("#ng03-l2");
      const amb  = root.querySelector(".ambient");

      l1.textContent = cs.getPropertyValue("--line1").trim().replace(/^["']|["']$/g, "");
      l2.textContent = cs.getPropertyValue("--line2").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      tl.to(amb,  { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.1);
      tl.to(l1,   { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.2);
      tl.call(() => l1.classList.add("glow"), [], 0.5);
      tl.to(l2,   { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.65);
      tl.call(() => l2.classList.add("glow"), [], 0.95);

      tl.to([l1, l2], {
        textShadow: "0 0 8px var(--tb-accent), 0 0 24px color-mix(in srgb, var(--tb-accent) 40%, transparent)",
        duration: 0.8, ease: "power1.inOut", yoyo: true, repeat: 1
      }, 1.4);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
