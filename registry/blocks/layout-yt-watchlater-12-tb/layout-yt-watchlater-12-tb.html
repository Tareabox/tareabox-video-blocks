  [data-composition-id="layout-yt-watchlater-12-tb"] .yt-video-title {

</style>

<!-- Sidebar -->

<!-- PIP video -->
<div class="pip-wrap" id="bn12h-pip">
  <video id="bn12h-pip-video"
    src="https://videos.pexels.com/video-files/6617452/6617452-hd_1920_1080_30fps.mp4"
    data-start="0" data-duration="8" data-track-index="0"
    crossorigin="anonymous"
    data-tb-asset="pip-video"
    muted playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
window.__timelines["layout-yt-watchlater-12-tb"] = (function () {
  const root = document.querySelector('[data-composition-id="layout-yt-watchlater-12-tb"]');
  const cs   = getComputedStyle(root);
  const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};

  // Apply variables
  const header = root.querySelector("#bn12h-header");
  const count  = root.querySelector("#bn12h-count");
  if (V.headerText) header.textContent = V.headerText;
  if (V.countText)  count.textContent  = V.countText;
  if (V.bg)     root.style.setProperty("--tb-bg", V.bg);
  if (V.accent) root.style.setProperty("--tb-accent", V.accent);

  // Read video IDs from CSS vars
  const videoIds = [];
  for (let i = 0; i < 20; i++) {
    const k = "--tb-vid-" + String(i).padStart(2, "0");
    const v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    videoIds.push(v || "dQw4w9WgXcQ");
  }
  // Read titles from CSS vars
  const titles = [];
  for (let i = 0; i < 20; i++) {
    const k = "--tb-title-" + String(i).padStart(2, "0");
    const v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    titles.push(v || "Video title " + (i + 1));
  }

  const channels = [
    "Productivity Lab","Carlos Code","Marketing Lab","CreaTech",
    "Design Pro","Business Master","Ana Growth","Video Academy",
    "WebDev Hub","Python Pro","Podcast Pro","YT Strategy",
    "Canva Tips","AI Hub","Commerce Lab","Adobe Guru",
    "Data Master","AI Tools","Social Pro","NoCode Academy"
  ];
  const durations = [
    "45:21","1:12:03","38:47","52:18","3:04:15","41:33","1:28:44","29:06",
    "55:12","2:15:38","1:05:22","48:17","35:44","1:42:19","2:08:33",
    "58:41","44:27","1:15:08","33:56","1:55:20"
  ];
  const views = [
    "128K","45K","312K","89K","567K","23K","198K","412K",
    "67K","234K","156K","78K","345K","890K","34K",
    "123K","456K","67K","210K","43K"
  ];

  const container = root.querySelector("#bn12h-ytScroll");
  for (let i = 0; i < 20; i++) {
    const row = document.createElement("div");
    row.className = "yt-video-row";
    row.innerHTML =
      '<div class="yt-thumb" style="background-image: url(\'https://i.ytimg.com/vi/' + videoIds[i] + '/hqdefault.jpg\');">' +
        '<div class="yt-thumb-dur">' + durations[i] + '</div>' +
      '</div>' +
      '<div class="yt-video-info">' +
        '<div class="yt-video-title">' + titles[i] + '</div>' +
        '<div class="yt-video-channel">' + channels[i] + '</div>' +
        '<div class="yt-video-meta">' + views[i] + ' views · ' + Math.floor(1 + i * 0.7) + ' weeks ago</div>' +
      '</div>';
    container.appendChild(row);
  }

  // Timeline
  const tl = gsap.timeline({ paused: true });
  const scrollEl = root.querySelector("#bn12h-ytScroll");
  const pipEl    = root.querySelector("#bn12h-pip");

  // PIP entrance: scale in
  tl.from(pipEl, { scale: 0.8, opacity: 0, duration: 0.4, ease: "back.out(1.4)" }, 0.3);

  // PIP subtle float
  tl.to(pipEl, { y: -6, duration: 1.8, ease: "sine.inOut", repeat: 3, yoyo: true }, 1);

  // 0-1s: static pause to register the layout
  // 1-4s: slow scroll (viewer reads)
  tl.to(scrollEl, { y: -800, duration: 3, ease: "power1.out" }, 1);
  // 4-7.5s: fast scroll (too many videos)
  tl.to(scrollEl, { y: -3200, duration: 3.5, ease: "power2.in" }, 4);

  // Fade out last 0.3s
  tl.to(root, { opacity: 0, duration: 0.3, ease: "power2.in" }, 7.7);

  // Hold to total duration
  tl.to({}, { duration: 8 }, 0);
  return tl;
})();
</script>
