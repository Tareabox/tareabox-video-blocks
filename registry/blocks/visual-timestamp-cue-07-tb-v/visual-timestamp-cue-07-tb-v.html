<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  visual-timestamp-cue-07-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — YouTube-style chapter pill slides up from bottom — shows timestamp and chapter title.
  Category: visual
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"tsTime","type":"string","label":"Timestamp","default":"04:32"},
  {"id":"tsChapter","type":"string","label":"Chapter","default":"Chapter 3"},
  {"id":"tsTitle","type":"string","label":"Title","default":"Setting Up Authentication"},
  {"id":"accent","type":"color","label":"Accent color","default":"#10b981"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#09090b"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="visual-timestamp-cue-07-tb-v" data-composition-id="visual-timestamp-cue-07-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-timestamp-cue-07-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --ts-time:    "04:32";
      --ts-chapter: "Chapter 3";
      --ts-title:   "Setting Up Authentication";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-timestamp-cue-07-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="visual-timestamp-cue-07-tb-v"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.55);
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 90%);
      pointer-events: none;
    }


    [data-composition-id="visual-timestamp-cue-07-tb-v"] .pill-wrap {
      position: absolute;
      bottom: 9%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: stretch;
      gap: 0;
      opacity: 0;
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .ts-badge {
      display: flex;
      align-items: center;
      gap: 2vmin;
      padding: 2.2vmin 3vmin;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 14px 0 0 14px;
      border-right: none;
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .ts-dot {
      width: 2.6vmin; height: 2.6vmin;
      border-radius: 50%;
      background: var(--tb-accent);
      flex-shrink: 0;
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .ts-time {
      font-size: clamp(28px, 4.6vmin, 44px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--tb-accent);
      letter-spacing: 0.04em;
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .ts-divider {
      width: 1px;
      align-self: stretch;
      background: rgba(255,255,255,0.20);
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .ts-info {
      display: flex;
      flex-direction: column;
      gap: 0.6vmin;
      padding: 2.2vmin 3vmin;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 0 14px 14px 0;
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .ts-chapter {
      font-size: clamp(20px, 3.4vmin, 36px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--tb-text-dim);
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .ts-title {
      font-size: clamp(22px, 4vmin, 38px);
      font-weight: 500;
      color: var(--tb-text);
      letter-spacing: -0.01em;
    }
    [data-composition-id="visual-timestamp-cue-07-tb-v"] .accent-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--tb-accent) 0%, transparent 100%);
      transform-origin: left;
      scaleX: 0;
    }
</style>

    <!--
      ASSET (vertical) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="bg07v-vid" class="bg-video" src="https://videos.pexels.com/video-files/8048324/8048324-hd_1280_720_50fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="vignette"></div>
    <div class="pill-wrap" id="tc07v-pill">
      <div class="ts-badge">
        <div class="ts-dot" id="tc07v-dot"></div>
        <span class="ts-time" id="tc07v-time"></span>
      </div>
      <div class="ts-divider"></div>
      <div class="ts-info">
        <span class="ts-chapter" id="tc07v-chapter"></span>
        <span class="ts-title"   id="tc07v-title"></span>
      </div>
    </div>
    <div class="accent-line" id="tc07v-line"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["visual-timestamp-cue-07-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="visual-timestamp-cue-07-tb-v"]');
      const cs      = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--ts-time",    V.tsTime);
      setStr("--ts-chapter", V.tsChapter);
      setStr("--ts-title",   V.tsTitle);
      setRaw("--tb-accent",  V.accent);
      setRaw("--tb-bg",      V.bg);

      const pill    = root.querySelector("#tc07v-pill");
      const dot     = root.querySelector("#tc07v-dot");
      const line    = root.querySelector("#tc07v-line");

      root.querySelector("#tc07v-time").textContent    = cs.getPropertyValue("--ts-time").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#tc07v-chapter").textContent = cs.getPropertyValue("--ts-chapter").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#tc07v-title").textContent   = cs.getPropertyValue("--ts-title").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      gsap.set(line, { scaleX: 0 });
      tl.to(line, { scaleX: 1, duration: 0.5, ease: "expo.out" }, 0.05);

      gsap.set(pill, { opacity: 0, y: 18 });
      tl.to(pill, { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 0.2);

      tl.to(dot, { scale: 1.3, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 }, 0.55);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
