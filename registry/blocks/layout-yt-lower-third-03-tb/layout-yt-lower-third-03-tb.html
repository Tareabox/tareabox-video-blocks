<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-yt-lower-third-03-tb
  Tareabox Hyperframes Effect
  Description: Full face cam with animated lower-third name card — accent bar wipes in, name and role slide up.
  Category: layout
  Duration: 5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-yt-lower-third-03-tb" data-composition-id="layout-yt-lower-third-03-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-lower-third-03-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #f97316);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --lt-name:      "Mary You";
      --lt-role:      "Founder · tareabox.com";
      --lt-topic:     "YouTube Pack v1";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-lower-third-03-tb"] {
      position: relative; width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-lower-third-03-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-yt-lower-third-03-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 22%;
    }
    [data-composition-id="layout-yt-lower-third-03-tb"] .bottom-grad {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    }

    /* Lower third container */
    [data-composition-id="layout-yt-lower-third-03-tb"] .lt-wrap {
      position: absolute;
      bottom: 7%; left: 4%;
      display: flex;
      align-items: stretch;
      gap: 0;
      overflow: hidden;
    }
    [data-composition-id="layout-yt-lower-third-03-tb"] .lt-accent {
      width: 7px;
      border-radius: 3px;
      background: var(--tb-accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--tb-accent) 70%, transparent);
      margin-right: 2.5vmin;
      flex-shrink: 0;
      transform-origin: bottom;
    }
    [data-composition-id="layout-yt-lower-third-03-tb"] .lt-text {
      display: flex; flex-direction: column;
      justify-content: center;
      gap: 1vmin;
      padding: 1.2vmin 0;
    }
    [data-composition-id="layout-yt-lower-third-03-tb"] .lt-name {
      font-size: clamp(40px, 5vmin, 68px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--tb-text);
      opacity: 0;
      text-shadow: 0 2px 18px rgba(0,0,0,0.6);
    }
    [data-composition-id="layout-yt-lower-third-03-tb"] .lt-role {
      font-size: clamp(20px, 2.4vmin, 32px);
      font-weight: 500;
      color: var(--tb-accent);
      letter-spacing: 0.02em;
      opacity: 0;
      text-shadow: 0 2px 14px rgba(0,0,0,0.5);
    }

    /* Topic badge top right */
    [data-composition-id="layout-yt-lower-third-03-tb"] .topic-badge {
      position: absolute;
      top: 5%; right: 3.5%;
      display: flex; align-items: center; gap: 1.6vmin;
      background: rgba(9,9,11,0.85);
      border: 1px solid rgba(255,255,255,0.18);
      border-left: 4px solid var(--tb-accent);
      border-radius: 10px;
      padding: 1.8vmin 3vmin;
      backdrop-filter: blur(14px);
      opacity: 0;
    }
    [data-composition-id="layout-yt-lower-third-03-tb"] .topic-text {
      font-size: clamp(20px, 2.2vmin, 30px);
      font-weight: 700;
      color: var(--tb-text);
      letter-spacing: -0.005em;
    }
</style>


    <!--
      ASSET (horizontal) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="yl03-vid"
           class="bg-video"
           src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
           data-start="0" data-duration="5" data-track-index="0"
           muted playsinline></video>

    <div class="bottom-grad"></div>

    <div class="lt-wrap">
      <div class="lt-accent" id="yl03-bar"></div>
      <div class="lt-text">
        <span class="lt-name" id="yl03-name"></span>
        <span class="lt-role" id="yl03-role"></span>
      </div>
    </div>

    <div class="topic-badge" id="yl03-topic">
      <span class="topic-text" id="yl03-topic-text"></span>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-lower-third-03-tb"] = (function () {
      const root  = document.querySelector('[data-composition-id="layout-yt-lower-third-03-tb"]');
      const cs    = getComputedStyle(root);
      const bar   = root.querySelector("#yl03-bar");
      const name  = root.querySelector("#yl03-name");
      const role  = root.querySelector("#yl03-role");
      const topic = root.querySelector("#yl03-topic");

      root.querySelector("#yl03-name").textContent       = cs.getPropertyValue("--lt-name").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#yl03-role").textContent       = cs.getPropertyValue("--lt-role").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#yl03-topic-text").textContent = cs.getPropertyValue("--lt-topic").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });

      gsap.set(bar, { scaleY: 0 });

      tl.to(topic, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.2);
      tl.from(topic, { x: 20, duration: 0.35, ease: "power2.out" }, 0.2);

      tl.to(bar, { scaleY: 1, duration: 0.4, ease: "expo.out" }, 0.45);

      tl.to(name, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.62);
      tl.from(name, { x: -18, duration: 0.35, ease: "power2.out" }, 0.62);

      tl.to(role, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.78);
      tl.from(role, { x: -14, duration: 0.3, ease: "power2.out" }, 0.78);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
