<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Pack Natalie
  conversationapp-ios-notif-12-tb-v (vertical 1080x1920)
  Vertical 9:16 — iOS lock-screen notification banner · 3.5 seconds
-->
<html lang="en" data-composition-variables='[
  {"id":"noApp","type":"string","label":"App name","default":"Tareabox"},
  {"id":"noTime","type":"string","label":"Time","default":"now"},
  {"id":"noTitle","type":"string","label":"Title","default":"New pack ready to render"},
  {"id":"noBody","type":"string","label":"Body","default":"tareabox-pack-natalie · 52 layouts staged for export"},
  {"id":"accent","type":"color","label":"Accent color","default":"#007AFF"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#1a2027"}
]'>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-ios-notif-12-tb-v" data-composition-id="conversationapp-ios-notif-12-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3.5">
<style>
    /* 🎨 CUSTOMIZE HERE */
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] {
      --tb-accent: var(--tb-brand-accent, #007AFF);
      --tb-bg: #1a2027;
      --tb-text: #ffffff;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);
      --no-app:   "Tareabox";
      --no-time:  "now";
      --no-title: "New pack ready to render";
      --no-body:  "tareabox-pack-natalie · 52 layouts staged for export";

      --no-icon-img: url("../assets/tb-media/tb-tareabox-logo.png");
    }
    /* ⛔ EFFECT CODE */
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: #0a0a0c;
      overflow: hidden;
      font-family: var(--tb-font-display);
      display: flex; align-items: center; justify-content: center;
      padding: 0 4%;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .bg-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.32) saturate(0.9);
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .notif { position: relative; z-index: 1; }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .notif {
      width: 92%;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 40px;
      padding: 4.5vmin 5vmin;
      display: flex; align-items: flex-start; gap: 2.6vmin;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      transform: translateY(-110%);
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .icon {
      width: 14vmin; height: 14vmin; border-radius: 3.4vmin;
      background-image: var(--no-icon-img);
      background-size: cover;
      background-position: center;
      background-color: #fff;
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .body {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 0.6vmin;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .top-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .app {
      font-size: clamp(26px, 3vmin, 40px);
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .time {
      font-size: clamp(22px, 2.6vmin, 34px);
      color: rgba(255,255,255,0.7);
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .title {
      font-size: clamp(36px, 4.4vmin, 58px);
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb-v"] .text {
      font-size: clamp(28px, 3.4vmin, 46px);
      color: rgba(255,255,255,0.85);
      line-height: 1.35;
    }
</style>

    <img class="bg-photo" src="https://images.pexels.com/photos/27940302/pexels-photo-27940302.jpeg?auto=compress&cs=tinysrgb&w=1920" crossorigin="anonymous" alt="" />
    <div class="notif" id="no12v-notif">
      <div class="icon"></div>
      <div class="body">
        <div class="top-row">
          <span class="app" id="no12v-app"></span>
          <span class="time" id="no12v-time"></span>
        </div>
        <div class="title" id="no12v-title"></div>
        <div class="text" id="no12v-body"></div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-ios-notif-12-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-ios-notif-12-tb-v"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--no-app",   V.noApp);
      setStr("--no-time",  V.noTime);
      setStr("--no-title", V.noTitle);
      setStr("--no-body",  V.noBody);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      $("#no12v-app").textContent   = G("--no-app");
      $("#no12v-time").textContent  = G("--no-time");
      $("#no12v-title").textContent = G("--no-title");
      $("#no12v-body").textContent  = G("--no-body");
      const tl = gsap.timeline({ paused: true });
      tl.to($("#no12v-notif"), { y: "0%", duration: 0.55, ease: "back.out(1.4)" }, 0.15);
      tl.to({}, { duration: 3.5 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
