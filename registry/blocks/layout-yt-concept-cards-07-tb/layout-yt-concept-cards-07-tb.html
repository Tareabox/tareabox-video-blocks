<html lang="en" data-composition-variables='[

<head>
  <!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-yt-concept-cards-07-tb
  Tareabox Hyperframes Effect
  Description: Big title with accent word + 4 numbered concept cards staggered in row + face cam PiP top-right. Inspired by tutorial overview slides.
  Category: layout
  Duration: 6 seconds
  REQUIRES: gsap (CDN)
-->
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-yt-concept-cards-07-tb" data-composition-id="layout-yt-concept-cards-07-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="6">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-concept-cards-07-tb"] {
      --tb-bg:           #0b1220;
      --tb-text:         #fafafa;
      --tb-text-dim:     #a8b3c7;
      --tb-accent:       var(--tb-brand-accent, #38bdf8);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --cc-eyebrow: "What's inside";
      --cc-pre:     "The Four";
      --cc-accent:  "C's.";
      --cc-lead:    "Four traits that turn a topic into a tutorial that converts.";

      --cc-1-num:    "01";
      --cc-1-title:  "Cam";
      --cc-1-body:   "Face cam compositions that frame you, not crowd you.";
      --cc-2-num:    "02";
      --cc-2-title:  "Cuts";
      --cc-2-body:   "Smooth scene transitions hide the cut, every time.";
      --cc-3-num:    "03";
      --cc-3-title:  "Cards";
      --cc-3-body:   "Concept blocks that actually read on a 5-inch phone.";
      --cc-4-num:    "04";
      --cc-4-title:  "Closure";
      --cc-4-body:   "Endings that drive the click on the next video.";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-concept-cards-07-tb"] {
      position: relative; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 30% 20%, #0f1a30 0%, #060912 75%);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Subtle radial accent glow */
    [data-composition-id="layout-yt-concept-cards-07-tb"] .glow {
      position: absolute;
      width: 60%; height: 60%;
      top: -10%; left: -10%;
      background: radial-gradient(circle, color-mix(in srgb, var(--tb-accent) 18%, transparent) 0%, transparent 60%);
      pointer-events: none;
    }

    /* PiP top-right — vertical/portrait orientation */
    [data-composition-id="layout-yt-concept-cards-07-tb"] .pip-wrap {
      position: absolute;
      top: 6%; right: 3%;
      width: 17%;
      aspect-ratio: 9/13;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.20);
      box-shadow:
        0 12px 44px rgba(0,0,0,0.6),
        0 0 28px color-mix(in srgb, var(--tb-accent) 28%, transparent);
      opacity: 0;
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .pip-video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 18%;
    }

    /* Eyebrow above title */
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-eyebrow {
      position: absolute;
      top: 9%; left: 5%;
      display: inline-flex;
      align-items: center;
      gap: 1.2vmin;
      padding: 0.9vmin 2vmin;
      background: color-mix(in srgb, var(--tb-accent) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 50%, transparent);
      border-radius: 999px;
      font-size: clamp(16px, 1.7vmin, 22px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-eyebrow::before {
      content: "";
      width: 1.2vmin; height: 1.2vmin;
      border-radius: 50%;
      background: var(--tb-accent);
      box-shadow: 0 0 8px color-mix(in srgb, var(--tb-accent) 80%, transparent);
    }

    /* Title — much bigger, fills more vertical space */
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-wrap {
      position: absolute;
      top: 17%; left: 5%;
      max-width: 75%;
      display: flex;
      align-items: baseline;
      gap: 3vmin;
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-pre,
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-accent {
      font-size: clamp(96px, 14vmin, 200px);
      font-weight: 900;
      letter-spacing: -0.045em;
      line-height: 0.9;
      overflow: hidden;
      display: inline-block;
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-pre span,
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-accent span {
      display: inline-block;
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-pre span {
      color: #ffffff;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-accent span {
      color: var(--tb-accent);
      text-shadow: 0 0 40px color-mix(in srgb, var(--tb-accent) 50%, transparent);
    }

    /* Title underline accent — bigger */
    [data-composition-id="layout-yt-concept-cards-07-tb"] .title-underline {
      position: absolute;
      top: 36%; left: 5%;
      width: 10vmin; height: 6px;
      background: var(--tb-accent);
      border-radius: 3px;
      box-shadow: 0 0 18px color-mix(in srgb, var(--tb-accent) 80%, transparent);
      transform: scaleX(0);
      transform-origin: left;
    }

    /* Lead / subtitle — fills the middle space */
    [data-composition-id="layout-yt-concept-cards-07-tb"] .lead {
      position: absolute;
      top: 41%; left: 5%;
      max-width: 60%;
      font-size: clamp(22px, 2.8vmin, 38px);
      font-weight: 400;
      color: var(--tb-text-dim);
      line-height: 1.3;
      letter-spacing: -0.005em;
      opacity: 0;
    }

    /* Cards row — bigger, brought up, stronger contrast */
    [data-composition-id="layout-yt-concept-cards-07-tb"] .cards-row {
      position: absolute;
      bottom: 7%;
      left: 5%;
      right: 5%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2.4vmin;
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .card {
      position: relative;
      background: linear-gradient(155deg,
        color-mix(in srgb, var(--tb-accent) 12%, rgba(0,0,0,0.4)) 0%,
        rgba(255,255,255,0.04) 60%);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 22%, rgba(255,255,255,0.10));
      border-radius: 18px;
      padding: 3vmin 2.8vmin 3.2vmin;
      display: flex; flex-direction: column;
      gap: 1.6vmin;
      backdrop-filter: blur(10px);
      opacity: 0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 8px 24px rgba(0,0,0,0.4);
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .card::before {
      content: "";
      position: absolute;
      top: 0; left: 2.8vmin;
      width: 28%; height: 3px;
      background: var(--tb-accent);
      border-radius: 0 0 2px 2px;
      box-shadow: 0 0 10px color-mix(in srgb, var(--tb-accent) 70%, transparent);
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .card-num {
      font-size: clamp(18px, 2vmin, 28px);
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--tb-accent);
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .card-title {
      font-size: clamp(28px, 3.6vmin, 50px);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #ffffff;
      line-height: 1.0;
    }
    [data-composition-id="layout-yt-concept-cards-07-tb"] .card-body {
      font-size: clamp(15px, 1.7vmin, 22px);
      font-weight: 400;
      color: var(--tb-text-dim);
      line-height: 1.45;
    }
</style>


    <div class="glow"></div>

    <!-- PiP face cam top-right -->
    <div class="pip-wrap" id="cc07-pip">
      <!--
        ASSET (horizontal) — demo from Pexels (free license, attribution in README).
        To use your own footage, replace the `src` with one of these:
          Public URL:   src="https://yourdomain.com/your-video.mp4"
          Local path:   src="../assets/tb-media/your-video.mp4"
                        (the `..` walks up from compositions/ to the project root)
      -->
      <video id="cc07-face"
             class="pip-video"
             src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
             data-start="0" data-duration="6" data-track-index="0"
             muted playsinline></video>
    </div>

    <!-- Eyebrow -->
    <div class="title-eyebrow" id="cc07-eyebrow"></div>

    <!-- Title -->
    <div class="title-wrap">
      <h1 class="title-pre"><span id="cc07-pre"></span></h1>
      <h1 class="title-accent"><span id="cc07-accent"></span></h1>
    </div>
    <div class="title-underline" id="cc07-underline"></div>

    <!-- Lead / subtitle -->
    <div class="lead" id="cc07-lead"></div>

    <!-- Cards -->
    <div class="cards-row">
      <div class="card" id="cc07-c1">
        <span class="card-num"  id="cc07-c1-num"></span>
        <span class="card-title" id="cc07-c1-title"></span>
        <span class="card-body"  id="cc07-c1-body"></span>
      </div>
      <div class="card" id="cc07-c2">
        <span class="card-num"  id="cc07-c2-num"></span>
        <span class="card-title" id="cc07-c2-title"></span>
        <span class="card-body"  id="cc07-c2-body"></span>
      </div>
      <div class="card" id="cc07-c3">
        <span class="card-num"  id="cc07-c3-num"></span>
        <span class="card-title" id="cc07-c3-title"></span>
        <span class="card-body"  id="cc07-c3-body"></span>
      </div>
      <div class="card" id="cc07-c4">
        <span class="card-num"  id="cc07-c4-num"></span>
        <span class="card-title" id="cc07-c4-title"></span>
        <span class="card-body"  id="cc07-c4-body"></span>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-concept-cards-07-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="layout-yt-concept-cards-07-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (sel) => root.querySelector(sel);

      /* Native HyperFrames variables → override CSS custom properties */
      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setRaw("--tb-accent", V.accent);
      setStr("--cc-eyebrow", V.eyebrow);
      setStr("--cc-pre", V.titlePre);
      setStr("--cc-accent", V.titleAccent);
      setStr("--cc-lead", V.lead);
      setStr("--cc-1-num", V.card1Num); setStr("--cc-1-title", V.card1Title); setStr("--cc-1-body", V.card1Body);
      setStr("--cc-2-num", V.card2Num); setStr("--cc-2-title", V.card2Title); setStr("--cc-2-body", V.card2Body);
      setStr("--cc-3-num", V.card3Num); setStr("--cc-3-title", V.card3Title); setStr("--cc-3-body", V.card3Body);
      setStr("--cc-4-num", V.card4Num); setStr("--cc-4-title", V.card4Title); setStr("--cc-4-body", V.card4Body);

      $("#cc07-eyebrow").textContent = cs.getPropertyValue("--cc-eyebrow").trim().replace(/^["']|["']$/g,"");
      $("#cc07-pre").textContent     = cs.getPropertyValue("--cc-pre").trim().replace(/^["']|["']$/g,"");
      $("#cc07-accent").textContent  = cs.getPropertyValue("--cc-accent").trim().replace(/^["']|["']$/g,"");
      $("#cc07-lead").textContent    = cs.getPropertyValue("--cc-lead").trim().replace(/^["']|["']$/g,"");

      [1,2,3,4].forEach((i) => {
        $("#cc07-c"+i+"-num").textContent   = cs.getPropertyValue("--cc-"+i+"-num").trim().replace(/^["']|["']$/g,"");
        $("#cc07-c"+i+"-title").textContent = cs.getPropertyValue("--cc-"+i+"-title").trim().replace(/^["']|["']$/g,"");
        $("#cc07-c"+i+"-body").textContent  = cs.getPropertyValue("--cc-"+i+"-body").trim().replace(/^["']|["']$/g,"");
      });

      const TOTAL = 6;
      const tl = gsap.timeline({ paused: true });

      const pip  = $("#cc07-pip");
      const eye  = $("#cc07-eyebrow");
      const pre  = $("#cc07-pre");
      const acc  = $("#cc07-accent");
      const ul   = $("#cc07-underline");
      const lead = $("#cc07-lead");
      const cards = [$("#cc07-c1"), $("#cc07-c2"), $("#cc07-c3"), $("#cc07-c4")];

      /* PiP entrance — scale + fade */
      gsap.set(pip, { scale: 0.85, y: -10 });
      tl.to(pip, { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(1.5)" }, 0.2);

      /* Eyebrow pops in first */
      tl.to(eye, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.3);
      tl.from(eye, { y: -8, duration: 0.35, ease: "power2.out" }, 0.3);

      /* Title words slide up from overflow */
      tl.from(pre, { y: "100%", duration: 0.6, ease: "expo.out" }, 0.5);
      tl.from(acc, { y: "100%", duration: 0.6, ease: "expo.out" }, 0.65);

      /* Underline */
      tl.to(ul, { scaleX: 1, duration: 0.5, ease: "expo.out" }, 1.0);

      /* Lead fades in */
      tl.to(lead, { opacity: 1, duration: 0.45, ease: "power2.out" }, 1.15);
      tl.from(lead, { y: 12, duration: 0.45, ease: "power2.out" }, 1.15);

      /* Cards stagger in */
      gsap.set(cards, { y: 36 });
      tl.to(cards, {
        opacity: 1, y: 0,
        duration: 0.6,
        ease: "power3.out",
        stagger: 0.14
      }, 1.45);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
