<!doctype html>

<html lang="en" data-composition-variables='[
  {"id":"igName","type":"string","label":"Username","default":"nataliedigital"},
  {"id":"igTime","type":"string","label":"Activity","default":"Active 1m ago"},
  {"id":"igMsg","type":"string","label":"DM message","default":"saw your reel — that pack is insane 🔥 how did you make it?"},
  {"id":"accent","type":"color","label":"Accent color","default":"#E1306C"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#000000"}
]'>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-instagram-dm-11-tb-v" data-composition-id="conversationapp-instagram-dm-11-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="4">
<style>
    /* 🎨 CUSTOMIZE HERE */
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] {
      --tb-accent: var(--tb-brand-accent, #E1306C);
      --tb-bg: #000; --tb-text: #fafafa; --tb-text-dim: #a8a8a8;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --ig-name: "nataliedigital";
      --ig-time: "Active 1m ago";
      --ig-msg:  "saw your reel — that pack is insane 🔥 how did you make it?";

      --ig-avatar-img: url("../assets/tb-media/tb-natalie-digital-avatar.png");
    }
    /* ⛔ EFFECT CODE */
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
      display: flex; align-items: center; justify-content: center;
      padding: 0 4%;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .card {
      width: 92%;
      background: #1c1c1c;
      border-radius: 24px;
      padding: 4vmin;
      display: flex; flex-direction: column;
      gap: 3vmin;
      opacity: 0;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .head {
      display: flex; align-items: center; gap: 2.4vmin;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .ring {
      width: 14vmin; height: 14vmin;
      border-radius: 50%;
      padding: 0.5vmin;
      background: conic-gradient(from 0deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .avatar {
      width: 100%; height: 100%; border-radius: 50%;
      background-image: var(--ig-avatar-img);
      background-size: cover;
      background-position: center;
      background-color: #1c1c1c;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .who {
      display: flex; flex-direction: column; gap: 0.5vmin;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .name {
      font-size: clamp(34px, 4.2vmin, 56px);
      font-weight: 700; color: var(--tb-text);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .time {
      font-size: clamp(22px, 2.8vmin, 36px);
      color: var(--tb-text-dim);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .msg {
      font-size: clamp(34px, 4.4vmin, 60px);
      color: var(--tb-text);
      line-height: 1.4;
      padding: 3vmin 3.4vmin;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      border-radius: 24px;
      border-bottom-left-radius: 6px;
      align-self: flex-start;
      max-width: 96%;
      opacity: 0;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .meta {
      display: flex; align-items: center; gap: 1.2vmin;
      color: var(--tb-text-dim);
      font-size: clamp(16px, 1.9vmin, 24px);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb-v"] .meta svg {
      width: clamp(18px, 2.2vmin, 28px); height: clamp(18px, 2.2vmin, 28px);
      stroke: currentColor; fill: none; stroke-width: 2;
    }
</style>

    <div class="card" id="ig11v-card">
      <div class="head">
        <div class="ring"><div class="avatar"></div></div>
        <div class="who">
          <span class="name" id="ig11v-name"></span>
          <span class="time" id="ig11v-time"></span>
        </div>
      </div>
      <div class="msg" id="ig11v-msg"></div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        <span>Direct Message</span>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-instagram-dm-11-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-instagram-dm-11-tb-v"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--ig-name", V.igName);
      setStr("--ig-time", V.igTime);
      setStr("--ig-msg",  V.igMsg);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      $("#ig11v-name").textContent = G("--ig-name");
      $("#ig11v-time").textContent = G("--ig-time");
      $("#ig11v-msg").textContent  = G("--ig-msg");

      const tl = gsap.timeline({ paused: true });
      const card = $("#ig11v-card"), msg = $("#ig11v-msg");
      gsap.set(card, { y: 30, scale: 0.94 });
      tl.to(card, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 0.2);
      gsap.set(msg, { x: -20, scale: 0.92 });
      tl.to(msg, { opacity: 1, x: 0, scale: 1, duration: 0.45, ease: "back.out(1.5)" }, 0.7);
      tl.to({}, { duration: 4 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
