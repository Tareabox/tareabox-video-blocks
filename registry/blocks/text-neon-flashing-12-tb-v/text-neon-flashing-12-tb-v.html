<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-neon-flashing-12-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Text flickers on like a neon sign powering up, then stabilizes with a steady glow.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"headline","type":"string","label":"Headline","default":"OPEN 24H"},
  {"id":"label","type":"string","label":"Label","default":"NEON SIGN"},
  {"id":"accent","type":"color","label":"Accent color","default":"#ec4899"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#06060e"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-neon-flashing-12-tb-v" data-composition-id="text-neon-flashing-12-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3.5">
<style>
    [data-composition-id="text-neon-flashing-12-tb-v"] {
      --tb-bg:           #06060e;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #ec4899);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "OPEN 24H";
      --label:    "NEON SIGN";
    }
    [data-composition-id="text-neon-flashing-12-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-neon-flashing-12-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-neon-flashing-12-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 6%;
      gap: 26px;
    }
    [data-composition-id="text-neon-flashing-12-tb-v"] .label {
      font-size: clamp(18px, 2.2vmin, 28px);
      font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--tb-accent); opacity: 0;
      overflow: hidden;
    }
    [data-composition-id="text-neon-flashing-12-tb-v"] .headline {
      font-size: clamp(96px, 13vmin, 160px);
      font-weight: 900; letter-spacing: 0.04em;
      color: var(--tb-accent);
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      overflow: hidden;
    }
    [data-composition-id="text-neon-flashing-12-tb-v"] .glow-bg {
      position: absolute; width: 80%; height: 40%;
      top: 30%; left: 10%;
      border-radius: 50%;
      background: radial-gradient(ellipse, color-mix(in srgb, var(--tb-accent) 8%, transparent) 0%, transparent 70%);
      filter: blur(60px);
      opacity: 0;
    }
</style>

    <div class="glow-bg" id="nf12v-glow"></div>
    <div class="stage">
      <div class="label" id="nf12v-label"></div>
      <h1 class="headline" id="nf12v-head"></h1>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-neon-flashing-12-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-neon-flashing-12-tb-v"]');
      const cs      = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--headline",  V.headline);
      setStr("--label",     V.label);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const headEl  = root.querySelector("#nf12v-head");
      const labelEl = root.querySelector("#nf12v-label");
      const glowEl  = root.querySelector("#nf12v-glow");

      headEl.textContent  = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      labelEl.textContent = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");

      /* Dynamic font fit per HyperFrames skill (SKILL.md:366) */
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        const __MAX_W = 1080 * 0.88;
        [headEl, labelEl].forEach((__el) => {
          try {
            const __cs = getComputedStyle(__el);
            const __ff = (__cs.fontFamily.split(",")[0] || "Geist").replace(/["\']/g,"").trim();
            const __fw = parseInt(__cs.fontWeight) || 700;
            if (!__el.textContent) return;
            const __fit = window.__hyperframes.fitTextFontSize(__el.textContent, {
              maxWidth: __MAX_W, fontFamily: __ff, fontWeight: __fw,
            });
            if (__fit) __el.style.fontSize = __fit + "px";
          } catch (e) {}
        });
      }

      const accent = cs.getPropertyValue("--tb-accent").trim();
      const TOTAL  = 3.5;
      const tl     = gsap.timeline({ paused: true });

      const flickers = [
        [0.1, 0.06], [0.22, 0.05], [0.32, 0.08],
        [0.48, 0.04], [0.55, 0.06], [0.68, 0.04],
        [0.76, 0.05], [0.85, 0.04], [0.93, 0.06],
      ];
      flickers.forEach(([t, d]) => {
        tl.to(headEl, { opacity: 0.7, duration: d * 0.4, ease: "none" }, t);
        tl.to(headEl, { opacity: 0,   duration: d * 0.6, ease: "none" }, t + d * 0.4);
      });

      tl.to(headEl,  { opacity: 1, duration: 0.15, ease: "none" }, 1.1);
      tl.to(glowEl,  { opacity: 1, duration: 0.5,  ease: "power2.out" }, 1.1);
      tl.to(labelEl, { opacity: 1, duration: 0.35, ease: "power2.out" }, 1.3);

      tl.to(headEl, {
        textShadow: `0 0 10px ${accent}, 0 0 30px ${accent}88, 0 0 70px ${accent}44`,
        duration: 0.6, ease: "power1.inOut", yoyo: true, repeat: 2
      }, 1.5);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
