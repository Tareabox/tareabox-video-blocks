<html lang="en">

<body>
<div id="conversationapp-instagram-dm-11-tb" data-composition-id="conversationapp-instagram-dm-11-tb"
       data-width="1920" data-height="1080"

<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE ──────────────────────────────────── */

      --tb-bg: #000; --tb-text: #fafafa; --tb-text-dim: #a8a8a8;

      /* Foto de perfil — local (ship con el pack) */
      --ig-avatar-img: url("../assets/tb-media/tb-natalie-digital-avatar.png");
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE — No tocar a menos que sepas lo que hacés */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="conversationapp-instagram-dm-11-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .card {
      width: 78%;
      background: #1c1c1c;
      border-radius: 18px;
      padding: 2.4vmin;
      display: flex; flex-direction: column;
      gap: 2vmin;
      opacity: 0;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .head {
      display: flex; align-items: center; gap: 1.6vmin;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .ring {
      width: 10vmin; height: 10vmin;
      border-radius: 50%;
      padding: 0.4vmin;
      background: conic-gradient(from 0deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .avatar {
      width: 100%; height: 100%; border-radius: 50%;
      background-image: var(--ig-avatar-img);
      background-size: cover;
      background-position: center;
      background-color: #1c1c1c;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .who {
      display: flex; flex-direction: column; gap: 0.3vmin;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .name {
      font-size: clamp(28px, 3.2vmin, 44px);
      font-weight: 700; color: var(--tb-text);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .time {
      font-size: clamp(20px, 2.2vmin, 30px);
      color: var(--tb-text-dim);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .msg {
      font-size: clamp(28px, 3.4vmin, 48px);
      color: var(--tb-text);
      line-height: 1.4;
      padding: 2vmin 2.4vmin;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      max-width: 92%;
      opacity: 0;
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .meta {
      display: flex; align-items: center; gap: 1vmin;
      color: var(--tb-text-dim);
      font-size: clamp(12px, 1.4vmin, 18px);
    }
    [data-composition-id="conversationapp-instagram-dm-11-tb"] .meta svg {
      width: clamp(14px, 1.7vmin, 22px); height: clamp(14px, 1.7vmin, 22px);
      stroke: currentColor; fill: none; stroke-width: 2;
    }
</style>

    <div class="card" id="ig11-card">
      <div class="head">
        <div class="ring"><div class="avatar"></div></div>
        <div class="who">
          <span class="name" id="ig11-name"></span>
          <span class="time" id="ig11-time"></span>
        </div>
      </div>
      <div class="msg" id="ig11-msg"></div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        <span>Direct Message</span>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-instagram-dm-11-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-instagram-dm-11-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");
      $("#ig11-name").textContent = G("--ig-name");
      $("#ig11-time").textContent = G("--ig-time");
      $("#ig11-msg").textContent  = G("--ig-msg");

      const tl = gsap.timeline({ paused: true });
      const card = $("#ig11-card"), msg = $("#ig11-msg");
      gsap.set(card, { y: 30, scale: 0.94 });
      tl.to(card, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 0.2);
      gsap.set(msg, { x: -20, scale: 0.92 });
      tl.to(msg, { opacity: 1, x: 0, scale: 1, duration: 0.45, ease: "back.out(1.5)" }, 0.7);
      tl.to({}, { duration: 4 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
