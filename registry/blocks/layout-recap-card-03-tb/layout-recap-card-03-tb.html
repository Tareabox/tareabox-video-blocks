<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-recap-card-03-tb
  Tareabox Hyperframes Effect
  Description: Key Takeaways card — header badge plus 3 bullet items staggering in one by one.
  Category: layout
  Duration: 4 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-recap-card-03-tb" data-composition-id="layout-recap-card-03-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="4">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-recap-card-03-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --card-title: "Key Takeaways";
      --item1: "Always validate inputs at the boundary layer";
      --item2: "Keep components small and single-purpose";
      --item3: "Test behavior, not implementation details";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-recap-card-03-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-recap-card-03-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-recap-card-03-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="layout-recap-card-03-tb"] .card {
      width: 62%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.09);
      padding: 6% 7%;
      display: flex; flex-direction: column; gap: 4%;
    }
    [data-composition-id="layout-recap-card-03-tb"] .card-header {
      display: flex; align-items: center; gap: 2%;
      margin-bottom: 1%;
      opacity: 0;
    }
    [data-composition-id="layout-recap-card-03-tb"] .header-badge {
      padding: 0.4vmin 1.1vmin;
      border-radius: 6px;
      background: color-mix(in srgb, var(--tb-accent) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 35%, transparent);
      font-size: clamp(15px, 2.5vmin, 27px);
      font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--tb-accent);
    }
    [data-composition-id="layout-recap-card-03-tb"] .card-title {
      font-size: clamp(23px, 3vmin, 36px);
      font-weight: 700; letter-spacing: -0.02em;
      color: var(--tb-text);
    }
    [data-composition-id="layout-recap-card-03-tb"] .divider {
      width: 0; height: 1px;
      background: rgba(255,255,255,0.20);
      margin-bottom: 1%;
    }
    [data-composition-id="layout-recap-card-03-tb"] .item {
      display: flex; align-items: flex-start; gap: 3%;
      opacity: 0;
    }
    [data-composition-id="layout-recap-card-03-tb"] .item-dot {
      flex-shrink: 0;
      margin-top: 0.7vmin;
      width: 0.7vmin; height: 0.7vmin;
      border-radius: 50%;
      background: var(--tb-accent);
    }
    [data-composition-id="layout-recap-card-03-tb"] .item-text {
      font-size: clamp(23px, 3vmin, 32px);
      font-weight: 400;
      line-height: 1.55;
      color: var(--tb-text-dim);
    }
</style>

    <div class="stage">
      <div class="card">
        <div class="card-header" id="rc03-header">
          <span class="header-badge">recap</span>
          <span class="card-title" id="rc03-title"></span>
        </div>
        <div class="divider" id="rc03-div"></div>
        <div class="item" id="rc03-i1"><div class="item-dot"></div><div class="item-text" id="rc03-t1"></div></div>
        <div class="item" id="rc03-i2"><div class="item-dot"></div><div class="item-text" id="rc03-t2"></div></div>
        <div class="item" id="rc03-i3"><div class="item-dot"></div><div class="item-text" id="rc03-t3"></div></div>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-recap-card-03-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="layout-recap-card-03-tb"]');
      const cs   = getComputedStyle(root);
      root.querySelector("#rc03-title").textContent = cs.getPropertyValue("--card-title").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#rc03-t1").textContent    = cs.getPropertyValue("--item1").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#rc03-t2").textContent    = cs.getPropertyValue("--item2").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#rc03-t3").textContent    = cs.getPropertyValue("--item3").trim().replace(/^["']|["']$/g,"");

      const header = root.querySelector("#rc03-header");
      const div    = root.querySelector("#rc03-div");
      const items  = [root.querySelector("#rc03-i1"), root.querySelector("#rc03-i2"), root.querySelector("#rc03-i3")];

      const TOTAL = 4;
      const tl = gsap.timeline({ paused: true });

      tl.to(header, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.15);
      tl.from(header,{ y: 12, duration: 0.4, ease: "expo.out" }, 0.15);
      tl.to(div,    { width: "100%", duration: 0.5, ease: "power2.inOut" }, 0.45);
      items.forEach((item, i) => {
        tl.to(item,  { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.7 + i * 0.35);
        tl.from(item,{ y: 14, duration: 0.35, ease: "expo.out" }, 0.7 + i * 0.35);
      });

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
