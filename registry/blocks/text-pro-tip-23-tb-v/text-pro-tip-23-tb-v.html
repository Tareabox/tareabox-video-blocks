<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-pro-tip-23-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Typography-only pro tip — badge slides in, tip text reveals line by line with a glowing left accent bar.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"tipBadge","type":"string","label":"Badge","default":"Pro Tip"},
  {"id":"tipHeading","type":"string","label":"Heading","default":"Use keyboard shortcuts to speed up your workflow"},
  {"id":"tipBody","type":"string","label":"Body","default":"Press Cmd+K to open the command palette. From there you can navigate to any file, run any action, and trigger most features without ever touching the mouse."},
  {"id":"accent","type":"color","label":"Accent color","default":"#facc15"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#09090b"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-pro-tip-23-tb-v" data-composition-id="text-pro-tip-23-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    [data-composition-id="text-pro-tip-23-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --tip-badge:   "Pro Tip";
      --tip-heading: "Use keyboard shortcuts to speed up your workflow";
      --tip-body:    "Press Cmd+K to open the command palette. From there you can navigate to any file, run any action, and trigger most features without ever touching the mouse.";
    }
    [data-composition-id="text-pro-tip-23-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-pro-tip-23-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-pro-tip-23-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      padding: 0 8%;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .content {
      display: flex; gap: 0;
      width: 100%;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .glow-bar {
      width: 4px;
      border-radius: 2px;
      flex-shrink: 0;
      margin-right: 5vmin;
      background: var(--tb-accent);
      box-shadow: 0 0 14px color-mix(in srgb, var(--tb-accent) 70%, transparent),
                  0 0 32px color-mix(in srgb, var(--tb-accent) 35%, transparent);
      transform-origin: top;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .text-block {
      display: flex; flex-direction: column; gap: 3.5vmin;
      flex: 1;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .badge {
      display: inline-flex; align-items: center; gap: 1.4vmin;
      padding: 0.7vmin 1.8vmin;
      border-radius: 8px;
      background: color-mix(in srgb, var(--tb-accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 40%, transparent);
      font-size: clamp(22px, 3.6vmin, 42px);
      font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--tb-accent);
      width: fit-content;
      opacity: 0;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .badge svg {
      width: 2vmin; height: 2vmin;
      stroke: var(--tb-accent);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .tip-heading {
      font-size: clamp(36px, 6.5vmin, 78px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.18;
      color: var(--tb-text);
      opacity: 0;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .tip-body {
      font-size: clamp(24px, 4vmin, 46px);
      font-weight: 400;
      line-height: 1.5;
      color: var(--tb-text-dim);
      opacity: 0;
    }
    [data-composition-id="text-pro-tip-23-tb-v"] .bg-glow {
      position: absolute;
      left: 4%; top: 25%; bottom: 25%;
      width: 35%;
      border-radius: 50%;
      background: radial-gradient(ellipse, color-mix(in srgb, var(--tb-accent) 5%, transparent) 0%, transparent 70%);
      filter: blur(45px);
      opacity: 0;
      pointer-events: none;
    }
</style>

    <div class="bg-glow"  id="pt23v-glow"></div>
    <div class="stage">
      <div class="content">
        <div class="glow-bar" id="pt23v-bar"></div>
        <div class="text-block">
          <div class="badge" id="pt23v-badge">
            <svg viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="6"/>
              <line x1="8" y1="7" x2="8" y2="11"/>
              <circle cx="8" cy="5" r="0.5" fill="currentColor" stroke="none"/>
            </svg>
            <span id="pt23v-badge-text"></span>
          </div>
          <div class="tip-heading" id="pt23v-heading"></div>
          <div class="tip-body"    id="pt23v-body"></div>
        </div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-pro-tip-23-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="text-pro-tip-23-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--tip-badge",   V.tipBadge);
      setStr("--tip-heading", V.tipHeading);
      setStr("--tip-body",    V.tipBody);
      setRaw("--tb-accent",   V.accent);
      setRaw("--tb-bg",       V.bg);

      root.querySelector("#pt23v-badge-text").textContent = cs.getPropertyValue("--tip-badge").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#pt23v-heading").textContent    = cs.getPropertyValue("--tip-heading").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#pt23v-body").textContent       = cs.getPropertyValue("--tip-body").trim().replace(/^["']|["']$/g,"");

      const bar     = root.querySelector("#pt23v-bar");
      const badge   = root.querySelector("#pt23v-badge");
      const heading = root.querySelector("#pt23v-heading");
      const body    = root.querySelector("#pt23v-body");
      const glow    = root.querySelector("#pt23v-glow");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      gsap.set(bar, { scaleY: 0 });

      tl.to(glow, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.05);
      tl.to(bar, { scaleY: 1, duration: 0.5, ease: "expo.out" }, 0.15);
      tl.to(badge, { opacity: 1, duration: 0.3, ease: "back.out(2)" }, 0.25);
      tl.from(badge, { scale: 0.8, x: -10, duration: 0.3, ease: "back.out(2)" }, 0.25);
      tl.to(heading, { opacity: 1, duration: 0.45, ease: "power2.out" }, 0.45);
      tl.from(heading, { y: 16, duration: 0.45, ease: "power2.out" }, 0.45);
      tl.to(body, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);
      tl.from(body, { y: 12, duration: 0.4, ease: "power2.out" }, 0.7);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
