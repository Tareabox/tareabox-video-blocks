<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-gravity-drop-15-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Words crash down from above frame with a snappy gravity fall and bounce landing.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"line1","type":"string","label":"Line 1","default":"GRAVITY"},
  {"id":"line2","type":"string","label":"Line 2 (accent)","default":"PULLS"},
  {"id":"line3","type":"string","label":"Line 3","default":"EVERYTHING"},
  {"id":"accent","type":"color","label":"Accent color","default":"#2563eb"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#080c14"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-gravity-drop-15-tb-v" data-composition-id="text-gravity-drop-15-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    [data-composition-id="text-gravity-drop-15-tb-v"] {
      --tb-bg:           #080c14;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --line1: "GRAVITY";
      --line2: "PULLS";
      --line3: "EVERYTHING";
    }
    [data-composition-id="text-gravity-drop-15-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-gravity-drop-15-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-gravity-drop-15-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 6%;
      gap: 8px;
    }
    [data-composition-id="text-gravity-drop-15-tb-v"] .word {
      font-size: clamp(80px, 13vmin, 165px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--tb-text);
      white-space: nowrap;
    }
    [data-composition-id="text-gravity-drop-15-tb-v"] .word.accent {
      color: var(--tb-accent);
    }
    [data-composition-id="text-gravity-drop-15-tb-v"] .impact-line {
      width: 90%;
      height: 6px;
      background: var(--tb-accent);
      transform-origin: center;
      transform: scaleX(0);
      margin-top: 18px;
    }
</style>

    <div class="stage">
      <div class="word" id="gd15v-w1"></div>
      <div class="word accent" id="gd15v-w2"></div>
      <div class="word" id="gd15v-w3"></div>
      <div class="impact-line" id="gd15v-line"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-gravity-drop-15-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="text-gravity-drop-15-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--line1",     V.line1);
      setStr("--line2",     V.line2);
      setStr("--line3",     V.line3);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const w1   = root.querySelector("#gd15v-w1");
      const w2   = root.querySelector("#gd15v-w2");
      const w3   = root.querySelector("#gd15v-w3");
      const line = root.querySelector("#gd15v-line");

      w1.textContent = cs.getPropertyValue("--line1").trim().replace(/^["']|["']$/g, "");
      w2.textContent = cs.getPropertyValue("--line2").trim().replace(/^["']|["']$/g, "");
      w3.textContent = cs.getPropertyValue("--line3").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      tl.from(w1, { y: -1200, duration: 0.75, ease: "bounce.out" }, 0.05);
      tl.from(w2, { y: -1200, duration: 0.75, ease: "bounce.out" }, 0.28);
      tl.from(w3, { y: -1200, duration: 0.75, ease: "bounce.out" }, 0.51);

      tl.to(line, { scaleX: 1, duration: 0.3, ease: "power4.out" }, 1.25);

      tl.to(line, { scaleX: 1.08, duration: 0.12, ease: "power2.out", yoyo: true, repeat: 1 }, 1.4);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
