<!doctype html>

  © 2026 Natalie Digital · tareabox.com · Tareabox Pack Natalie
  conversationapp-tweet-quote-16-tb-v (vertical 1080x1920)
  Vertical 9:16 — Twitter quote-tweet card · 4 seconds

<html lang="en" data-composition-variables='[
  {"id":"tqName","type":"string","label":"Display name","default":"Natalie Digital"},
  {"id":"tqHandle","type":"string","label":"Handle","default":"@nataliedigital"},
  {"id":"tqMsg","type":"string","label":"Top tweet","default":"this is the cleanest layout pack I have seen in 2026 →"},
  {"id":"qtName","type":"string","label":"Quoted name","default":"Tareabox"},
  {"id":"qtHandle","type":"string","label":"Quoted handle","default":"@tareabox"},
  {"id":"qtTime","type":"string","label":"Quoted time","default":"Aug 4"},
  {"id":"qtMsg","type":"string","label":"Quoted tweet","default":"Just shipped 52 video layouts that turn topics into tutorials. One CONFIG block per scene. Render in 4 minutes."},
  {"id":"accent","type":"color","label":"Accent color","default":"#1d9bf0"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0f1419"}
]'>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-tweet-quote-16-tb-v" data-composition-id="conversationapp-tweet-quote-16-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="4">
<style>
    /* 🎨 CUSTOMIZE HERE */
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] {
      --tb-bg: #0f1419; --tb-text: #e7e9ea; --tb-text-dim: #71767b;
      --tb-accent: var(--tb-brand-accent, #1d9bf0);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --tq-name:    "Natalie Digital";
      --tq-handle:  "@nataliedigital";
      --tq-msg:     "this is the cleanest layout pack I've seen in 2026 →";

      --tq-avatar-img: url("../assets/tb-media/tb-natalie-digital-avatar.png");

      --qt-name:    "Tareabox";
      --qt-handle:  "@tareabox";
      --qt-time:    "Aug 4";
      --qt-msg:     "Just shipped 52 video layouts that turn topics into tutorials. One CONFIG block per scene. Render in 4 minutes.";

      --qt-avatar-img: url("../assets/tb-media/tb-tareabox-logo.png");
    }
    /* ⛔ EFFECT CODE */
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
      display: flex; align-items: center; justify-content: center;
      padding: 0 4%;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .card {
      width: 92%;
      background: #0f1419;
      border: 1px solid #2f3336;
      border-radius: 28px;
      padding: 5vmin 5vmin;
      display: flex; flex-direction: column;
      gap: 4vmin;
      opacity: 0;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .head {
      display: flex; gap: 2.6vmin;
      align-items: center;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .avatar {
      width: 13vmin; height: 13vmin; border-radius: 50%;
      background-image: var(--tq-avatar-img);
      background-size: cover;
      background-position: center;
      background-color: #fff;
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .who {
      display: flex; flex-direction: column; gap: 0.5vmin;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .name {
      font-size: clamp(34px, 4.4vmin, 60px);
      font-weight: 800; color: var(--tb-text);
      letter-spacing: -0.01em;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .handle {
      font-size: clamp(24px, 3vmin, 38px);
      color: var(--tb-text-dim);
      font-weight: 500;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .body {
      font-size: clamp(36px, 4.6vmin, 62px);
      font-weight: 600;
      color: var(--tb-text);
      line-height: 1.35;
      letter-spacing: -0.01em;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .quote {
      border: 1px solid #2f3336;
      border-radius: 22px;
      padding: 4vmin 4vmin;
      display: flex; flex-direction: column;
      gap: 2vmin;
      opacity: 0;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .quote-head {
      display: flex; align-items: center; gap: 2vmin;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .quote-avatar {
      width: 8vmin; height: 8vmin; border-radius: 50%;
      background-image: var(--qt-avatar-img);
      background-size: cover;
      background-position: center;
      background-color: #fff;
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .quote-meta {
      font-size: clamp(24px, 3vmin, 38px);
      color: var(--tb-text);
      font-weight: 500;
    }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .quote-meta strong { font-weight: 800; }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .quote-meta span { color: var(--tb-text-dim); margin-left: 0.6vmin; font-weight: 400; }
    [data-composition-id="conversationapp-tweet-quote-16-tb-v"] .quote-text {
      font-size: clamp(28px, 3.4vmin, 46px);
      color: var(--tb-text);
      line-height: 1.4;
      font-weight: 400;
    }
</style>

    <div class="card" id="tq16v-card">
      <div class="head">
        <div class="avatar"></div>
        <div class="who">
          <span class="name" id="tq16v-name"></span>
          <span class="handle" id="tq16v-handle"></span>
        </div>
      </div>
      <div class="body" id="tq16v-msg"></div>
      <div class="quote" id="tq16v-quote">
        <div class="quote-head">
          <div class="quote-avatar"></div>
          <div class="quote-meta"><strong id="tq16v-qt-name"></strong><span><span id="tq16v-qt-handle"></span> · <span id="tq16v-qt-time"></span></span></div>
        </div>
        <div class="quote-text" id="tq16v-qt-msg"></div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-tweet-quote-16-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-tweet-quote-16-tb-v"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--tq-name",   V.tqName);
      setStr("--tq-handle", V.tqHandle);
      setStr("--tq-msg",    V.tqMsg);
      setStr("--qt-name",   V.qtName);
      setStr("--qt-handle", V.qtHandle);
      setStr("--qt-time",   V.qtTime);
      setStr("--qt-msg",    V.qtMsg);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      $("#tq16v-name").textContent     = G("--tq-name");
      $("#tq16v-handle").textContent   = G("--tq-handle");
      $("#tq16v-msg").textContent      = G("--tq-msg");
      $("#tq16v-qt-name").textContent  = G("--qt-name");
      $("#tq16v-qt-handle").textContent= G("--qt-handle");
      $("#tq16v-qt-time").textContent  = G("--qt-time");
      $("#tq16v-qt-msg").textContent   = G("--qt-msg");

      const tl = gsap.timeline({ paused: true });
      const card = $("#tq16v-card"), q = $("#tq16v-quote");
      gsap.set(card, { y: 30, scale: 0.94 });
      tl.to(card, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 0.2);
      gsap.set(q, { y: 12, scale: 0.97 });
      tl.to(q, { opacity: 1, y: 0, scale: 1, duration: 0.45, ease: "power3.out" }, 0.85);
      tl.to({}, { duration: 4 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
