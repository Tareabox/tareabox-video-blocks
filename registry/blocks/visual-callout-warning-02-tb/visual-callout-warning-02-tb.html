<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  visual-callout-warning-02-tb
  Tareabox Hyperframes Effect
  Description: Warning callout card — red glass border, SVG triangle icon, slides in from top-right.
  Category: visual
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="visual-callout-warning-02-tb" data-composition-id="visual-callout-warning-02-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-callout-warning-02-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #ef4444);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --warn-title: "Don't skip this step";
      --warn-body:  "Running migrations out of order will corrupt your database schema.";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-callout-warning-02-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="visual-callout-warning-02-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="visual-callout-warning-02-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.55);
    }
    [data-composition-id="visual-callout-warning-02-tb"] .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 90%);
      pointer-events: none;
    }


    [data-composition-id="visual-callout-warning-02-tb"] .card {
      position: absolute;
      top: 8%; right: 6%;
      width: 36%;
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--tb-accent) 35%, rgba(255,255,255,0.06));
      background: color-mix(in srgb, var(--tb-accent) 5%, rgba(9,9,11,0.96));
      padding: 4% 5%;
      display: flex; flex-direction: column; gap: 8%;
    }
    [data-composition-id="visual-callout-warning-02-tb"] .badge-row {
      display: flex; align-items: center; gap: 4%;
    }
    [data-composition-id="visual-callout-warning-02-tb"] .badge {
      padding: 0.35vmin 1vmin;
      border-radius: 5px;
      background: color-mix(in srgb, var(--tb-accent) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 40%, transparent);
      font-size: clamp(16px, 3.5vmin, 30px);
      font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--tb-accent);
    }
    [data-composition-id="visual-callout-warning-02-tb"] .icon {
      width: 2.4vmin; height: 2.4vmin; flex-shrink: 0;
      color: var(--tb-accent);
    }
    [data-composition-id="visual-callout-warning-02-tb"] .warn-title {
      font-size: clamp(23px, 3vmin, 32px);
      font-weight: 600; letter-spacing: -0.01em; line-height: 1.3;
      color: var(--tb-text);
    }
    [data-composition-id="visual-callout-warning-02-tb"] .warn-body {
      font-size: clamp(15px, 3.5vmin, 35px);
      font-weight: 400; line-height: 1.55;
      color: var(--tb-text-dim);
    }
</style>

    <!--
      ASSET (horizontal) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="bg02-vid" class="bg-video" src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="vignette"></div>
    <div class="card" id="cw02-card">
      <div class="badge-row">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span class="badge">Warning</span>
      </div>
      <div class="warn-title" id="cw02-title"></div>
      <div class="warn-body"  id="cw02-body"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["visual-callout-warning-02-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="visual-callout-warning-02-tb"]');
      const cs   = getComputedStyle(root);
      const card = root.querySelector("#cw02-card");
      root.querySelector("#cw02-title").textContent = cs.getPropertyValue("--warn-title").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#cw02-body").textContent  = cs.getPropertyValue("--warn-body").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });
      gsap.set(card, { opacity: 0, y: -36, x: 20 });
      tl.to(card, { opacity: 1, y: 0, x: 0, duration: 0.5, ease: "expo.out" }, 0.15);
      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
