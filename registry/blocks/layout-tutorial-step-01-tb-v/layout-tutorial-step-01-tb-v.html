<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-tutorial-step-01-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Step card with large number, title, subtitle, and progress dots — for tutorial step-by-step sequences.
  Category: layout
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"stepCurrent","type":"string","label":"Current step","default":"03"},
  {"id":"stepTotal","type":"string","label":"Total steps","default":"5"},
  {"id":"stepTitle","type":"string","label":"Step title","default":"Setting Up Your Environment"},
  {"id":"stepSub","type":"string","label":"Step subtitle","default":"Install dependencies and configure your project"},
  {"id":"accent","type":"color","label":"Accent color","default":"#2563eb"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#080c14"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-tutorial-step-01-tb-v" data-composition-id="layout-tutorial-step-01-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-tutorial-step-01-tb-v"] {
      --tb-bg:           #080c14;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --step-current: "03";
      --step-total:   "5";
      --step-title:   "Setting Up Your Environment";
      --step-sub:     "Install dependencies and configure your project";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-tutorial-step-01-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-tutorial-step-01-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 0 7%;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .step-label {
      font-size: clamp(22px, 3.6vmin, 38px);
      font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--tb-accent);
      margin-bottom: 2vmin;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .number-row {
      display: flex; align-items: baseline; gap: 0.15em;
      margin-bottom: 4vmin;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .step-number {
      font-size: clamp(120px, 22vmin, 240px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .step-total {
      font-size: clamp(46px, 9vmin, 78px);
      font-weight: 300;
      color: var(--tb-text-dim);
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .divider {
      width: 0; height: 4px;
      background: var(--tb-accent);
      margin-bottom: 4vmin;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .step-title {
      font-size: clamp(46px, 7.4vmin, 84px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.12;
      color: var(--tb-text);
      max-width: 100%;
      margin-bottom: 3vmin;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .step-sub {
      font-size: clamp(26px, 3.8vmin, 44px);
      font-weight: 400;
      color: var(--tb-text-dim);
      max-width: 95%;
      line-height: 1.5;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .dots {
      position: absolute;
      bottom: 8%; left: 7%;
      display: flex; gap: 1.6vmin; align-items: center;
      opacity: 0;
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .dot {
      width: 1.6vmin; height: 1.6vmin; border-radius: 50%;
      background: var(--tb-text-dim);
    }
    [data-composition-id="layout-tutorial-step-01-tb-v"] .dot.active {
      background: var(--tb-accent);
      width: 4vmin; border-radius: 0.8vmin;
    }
</style>

    <div class="stage">
      <div class="step-label" id="ts01v-label">Step</div>
      <div class="number-row">
        <div class="step-number" id="ts01v-num"></div>
        <div class="step-total" id="ts01v-total"></div>
      </div>
      <div class="divider" id="ts01v-div"></div>
      <div class="step-title" id="ts01v-title"></div>
      <div class="step-sub"   id="ts01v-sub"></div>
    </div>
    <div class="dots" id="ts01v-dots"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-tutorial-step-01-tb-v"] = (function () {
      const root   = document.querySelector('[data-composition-id="layout-tutorial-step-01-tb-v"]');
      const cs     = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--step-current", V.stepCurrent);
      setStr("--step-total",   V.stepTotal);
      setStr("--step-title",   V.stepTitle);
      setStr("--step-sub",     V.stepSub);
      setRaw("--tb-accent",    V.accent);
      setRaw("--tb-bg",        V.bg);

      const label  = root.querySelector("#ts01v-label");
      const numEl  = root.querySelector("#ts01v-num");
      const totEl  = root.querySelector("#ts01v-total");
      const divEl  = root.querySelector("#ts01v-div");
      const titleEl= root.querySelector("#ts01v-title");
      const subEl  = root.querySelector("#ts01v-sub");
      const dotsEl = root.querySelector("#ts01v-dots");

      const current = parseInt(cs.getPropertyValue("--step-current").trim().replace(/["']/g,"")) || 3;
      const total   = parseInt(cs.getPropertyValue("--step-total").trim().replace(/["']/g,""))   || 5;

      numEl.textContent  = String(current).padStart(2,"0");
      totEl.textContent  = " / " + total;
      titleEl.textContent = cs.getPropertyValue("--step-title").trim().replace(/^["']|["']$/g,"");
      subEl.textContent   = cs.getPropertyValue("--step-sub").trim().replace(/^["']|["']$/g,"");

      for (let i = 1; i <= total; i++) {
        const d = document.createElement("div");
        d.className = "dot" + (i === current ? " active" : "");
        dotsEl.appendChild(d);
      }

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      tl.to(label,  { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 0.1);
      tl.from(numEl, { x: -60, duration: 0.55, ease: "expo.out" }, 0.2);
      tl.to(numEl,  { opacity: 1, duration: 0.25 }, 0.2);
      tl.to(totEl,  { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.45);
      tl.to(divEl,  { width: "40%", duration: 0.5, ease: "power3.out" }, 0.5);
      tl.to(titleEl,{ opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 0.65);
      tl.from(titleEl,{ y: 20, duration: 0.45, ease: "power2.out" }, 0.65);
      tl.to(subEl,  { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.85);
      tl.from(subEl,{ y: 15, duration: 0.4, ease: "power2.out" }, 0.85);
      tl.to(dotsEl, { opacity: 1, duration: 0.4, ease: "power2.out" }, 1.0);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
