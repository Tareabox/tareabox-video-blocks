<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-typewriter-dark-01-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Headline types out character by character; usable solo on dark bg
               OR as an overlay on top of a video/image (set bg to "transparent").
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"headline","type":"string","label":"Headline","default":"Your headline here"},
  {"id":"label","type":"string","label":"Eyebrow label","default":"Typewriter"},
  {"id":"accent","type":"color","label":"Accent color","default":"#06b6d4"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\" to overlay on video/image)","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-typewriter-dark-01-tb-v" data-composition-id="text-typewriter-dark-01-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-dark-01-tb-v"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #06b6d4);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline:        "Your headline here";
      --label:           "Typewriter";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-dark-01-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-typewriter-dark-01-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-typewriter-dark-01-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 14% 7%; gap: 3vmin;
    
      z-index: 2;
    }
    [data-composition-id="text-typewriter-dark-01-tb-v"] .label {
      font-size: clamp(14px, 2vmin, 22px);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    /* Vertical: bigger headline cap — vertical canvas suits larger text */
    [data-composition-id="text-typewriter-dark-01-tb-v"] .headline {
      font-size: clamp(48px, 10vmin, 130px);
      font-weight: 800;
      color: var(--tb-text);
      line-height: 1.08;
      letter-spacing: -0.03em;
      text-align: center;
      max-width: 88%;
      overflow: hidden;
      /* Text shadow keeps text legible when used as overlay on video/image */
      text-shadow: 0 2px 18px rgba(0,0,0,0.75), 0 0 2px rgba(0,0,0,0.85);
    }
    [data-composition-id="text-typewriter-dark-01-tb-v"] .label {
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }
    [data-composition-id="text-typewriter-dark-01-tb-v"] .cursor {
      display: inline-block;
      width: 0.06em; height: 0.88em;
      background: var(--tb-accent);
      margin-left: 0.06em;
      vertical-align: text-bottom;
      transform: translateY(0.05em);
      box-shadow: 0 0 16px var(--tb-accent);
    }
    [data-composition-id="text-typewriter-dark-01-tb-v"] .cursor.blink {
      animation: tw-d01v-blink 0.55s steps(2, end) infinite;
    }
    @keyframes tw-d01v-blink { 50% { opacity: 0; } }
    [data-composition-id="text-typewriter-dark-01-tb-v"] .vignette {
      position: absolute; inset: 0; pointer-events: none;
      /* Subtle vignette — works on dark bg AND on video/image overlays */
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.35) 100%);
    }
    [data-composition-id="text-typewriter-dark-01-tb-v"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.45;
    }
</style>

    <!--
      ASSET (horizontal/vertical) — demo from Pexels (free license).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
    -->
    <video class="bg-video"
           src="https://videos.pexels.com/video-files/14904130/14904130-hd_1920_1080_30fps.mp4"
           crossorigin="anonymous" data-tb-asset="background"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="stage">
      <div class="label"></div>
      <h1 class="headline"><span class="typed"></span><span class="cursor"></span></h1>
    </div>
    <div class="vignette"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-typewriter-dark-01-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-typewriter-dark-01-tb-v"]');
      const typedEl = root.querySelector(".typed");
      const cursor  = root.querySelector(".cursor");
      const labelEl = root.querySelector(".label");
      const cs      = getComputedStyle(root);

      /* Native HyperFrames variables → override CSS custom properties */
      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--headline", V.headline);
      setStr("--label",    V.label);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const text    = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label   = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      const TOTAL   = 3;
      const TYPE_D  = 1.8;

      root.querySelector(".headline").setAttribute("aria-label", text);
      labelEl.textContent = label;
      typedEl.textContent = "";

      const tl = gsap.timeline({ paused: true });
      const counter = { v: 0 };

      tl.to(labelEl, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0.1);
      /* Dynamic font fit per HyperFrames skill (SKILL.md:366) — shrink only
         Pre-fit using FULL text (typewriter types into the pre-sized element) */
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        try {
          const __cs = getComputedStyle(typedEl);
          const __cur = parseFloat(__cs.fontSize);
          const __pw  = typedEl.parentElement.getBoundingClientRect().width || 0;
          if (__pw >= 40) {
            const __ff  = (__cs.fontFamily.split(",")[0] || "Geist").replace(/["']/g,"").trim();
            const __fw  = parseInt(__cs.fontWeight) || 700;
            const __fit = window.__hyperframes.fitTextFontSize(text, {
              maxWidth: __pw * 0.96, fontFamily: __ff, fontWeight: __fw,
            });
            if (__fit && __fit < __cur) typedEl.style.fontSize = __fit + "px";
          }
        } catch (e) {}
      }

      tl.to(counter, {
        v: text.length, duration: TYPE_D, ease: "none",
        snap: { v: 1 },
        onUpdate: () => { typedEl.textContent = text.slice(0, Math.floor(counter.v)); }
      }, 0.3);
      tl.call(() => cursor.classList.add("blink"), [], 0.3 + TYPE_D);
      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
