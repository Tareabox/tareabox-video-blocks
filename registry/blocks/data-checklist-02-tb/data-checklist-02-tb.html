<!doctype html>
<html lang="en" data-composition-variables='[
  {"id":"listTitle","type":"string","label":"List title","default":"Before you deploy"},
  {"id":"item1","type":"string","label":"Item 1","default":"Run the test suite"},
  {"id":"item2","type":"string","label":"Item 2","default":"Set production env vars"},
  {"id":"item3","type":"string","label":"Item 3","default":"Enable rate limiting"},
  {"id":"item4","type":"string","label":"Item 4","default":"Review CORS origins"},
  {"id":"accent","type":"color","label":"Accent color","default":"#10b981"}
]'>
<head>
  <!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  data-checklist-02-tb
  Tareabox Hyperframes Effect
  Description: Checklist card — 4 items slide in and check off with animated SVG checkmarks.
  Category: data
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="data-checklist-02-tb" data-composition-id="data-checklist-02-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="data-checklist-02-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --list-title: "Before you deploy";
      --item-1:     "Run the test suite";
      --item-2:     "Set production env vars";
      --item-3:     "Enable rate limiting";
      --item-4:     "Review CORS origins";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="data-checklist-02-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="data-checklist-02-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="data-checklist-02-tb"] .card {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44%;
      border-radius: 16px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.20);
      padding: 5% 6%;
      display: flex; flex-direction: column; gap: 4%;
    }
    [data-composition-id="data-checklist-02-tb"] .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2%;
    }
    [data-composition-id="data-checklist-02-tb"] .card-title {
      font-size: clamp(23px, 4vmin, 40px);
      font-weight: 600; letter-spacing: -0.02em;
      color: var(--tb-text);
    }
    [data-composition-id="data-checklist-02-tb"] .card-badge {
      font-size: clamp(15px, 3.5vmin, 30px);
      font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--tb-accent);
      background: color-mix(in srgb, var(--tb-accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 30%, transparent);
      padding: 0.3vmin 1vmin; border-radius: 4px;
    }
    [data-composition-id="data-checklist-02-tb"] .divider {
      height: 1px;
      background: rgba(255,255,255,0.18);
      margin-bottom: 1%;
    }
    [data-composition-id="data-checklist-02-tb"] .item {
      display: flex; align-items: center; gap: 3%;
      padding: 1.8% 0;
      opacity: 0;
    }
    [data-composition-id="data-checklist-02-tb"] .checkbox {
      width: 2.6vmin; height: 2.6vmin;
      border-radius: 6px;
      border: 1.5px solid color-mix(in srgb, var(--tb-accent) 50%, rgba(255,255,255,0.15));
      background: color-mix(in srgb, var(--tb-accent) 8%, transparent);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }
    [data-composition-id="data-checklist-02-tb"] .checkbox svg {
      width: 60%; height: 60%;
      stroke: var(--tb-accent);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
    }
    [data-composition-id="data-checklist-02-tb"] .item-text {
      font-size: clamp(15px, 3.2vmin, 30px);
      font-weight: 400;
      color: var(--tb-text-dim);
      line-height: 1.4;
    }
</style>

    <div class="card" id="cl02-card">
      <div class="card-header">
        <span class="card-title" id="cl02-title"></span>
        <span class="card-badge">Checklist</span>
      </div>
      <div class="divider"></div>
      <div id="cl02-items"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["data-checklist-02-tb"] = (function () {
      const root  = document.querySelector('[data-composition-id="data-checklist-02-tb"]');
      const cs    = getComputedStyle(root);
      const card  = root.querySelector("#cl02-card");
      const list  = root.querySelector("#cl02-items");

      /* Native HyperFrames variables → override CSS custom properties */
      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--list-title", V.listTitle);
      setStr("--item-1", V.item1);
      setStr("--item-2", V.item2);
      setStr("--item-3", V.item3);
      setStr("--item-4", V.item4);
      setRaw("--tb-accent", V.accent);

      root.querySelector("#cl02-title").textContent = cs.getPropertyValue("--list-title").trim().replace(/^["']|["']$/g,"");

      const itemKeys = ["--item-1","--item-2","--item-3","--item-4"];
      const itemEls = [];
      const checkEls = [];

      itemKeys.forEach(k => {
        const val = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g,"");
        if (!val) return;
        const row = document.createElement("div");
        row.className = "item";

        const box = document.createElement("div");
        box.className = "checkbox";
        const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
        svg.setAttribute("viewBox","0 0 12 12");
        const path = document.createElementNS("http://www.w3.org/2000/svg","polyline");
        path.setAttribute("points","2,6 5,9 10,3");
        svg.appendChild(path);
        box.appendChild(svg);

        const txt = document.createElement("span");
        txt.className = "item-text";
        txt.textContent = val;

        row.appendChild(box);
        row.appendChild(txt);
        list.appendChild(row);
        itemEls.push(row);
        checkEls.push(svg.querySelector("polyline"));
      });

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      gsap.set(card, { opacity: 0, y: 20 });
      tl.to(card, { opacity: 1, y: 0, duration: 0.45, ease: "expo.out" }, 0.1);

      itemEls.forEach((el, i) => {
        const t = 0.4 + i * 0.28;
        tl.to(el, { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, t);
        tl.from(el, { x: -20, duration: 0.35, ease: "power2.out" }, t);
        tl.to(checkEls[i], { strokeDashoffset: 0, duration: 0.3, ease: "power2.out" }, t + 0.22);
      });

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
