<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
window.__timelines["layout-yt-watchlater-grid-13-tb"] = (function () {
  const root = document.querySelector('[data-composition-id="layout-yt-watchlater-grid-13-tb"]');
  const cs   = getComputedStyle(root);
  const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};

  const header = root.querySelector("#bn13h-header");
  const count  = root.querySelector("#bn13h-count");
  if (V.headerText) header.textContent = V.headerText;
  if (V.countText)  count.textContent  = V.countText;
  if (V.bg)     root.style.setProperty("--tb-bg", V.bg);
  if (V.accent) root.style.setProperty("--tb-accent", V.accent);
  const videoIds = [];
  for (let i = 0; i < 60; i++) {
    const k = "--tb-vid-" + String(i % 20).padStart(2, "0");
    const v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    videoIds.push(v || "dQw4w9WgXcQ");
  }
  const titles = [];
  for (let i = 0; i < 60; i++) {
    const k = "--tb-title-" + String(i % 20).padStart(2, "0");
    const v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    titles.push(v || "Video title " + (i + 1));
  }

  const channels = [
    "Productivity Lab","Carlos Code","Marketing Lab","CreaTech",
    "Design Pro","Business Master","Ana Growth","Video Academy",
    "WebDev Hub","Python Pro","Podcast Pro","YT Strategy",
    "Canva Tips","AI Hub","Commerce Lab","Adobe Guru",
    "Data Master","AI Tools","Social Pro","NoCode Academy"
  ];
  const durations = [
    "45:21","1:12:03","38:47","52:18","3:04:15","41:33","1:28:44","29:06",
    "55:12","2:15:38","1:05:22","48:17","35:44","1:42:19","2:08:33",
    "58:41","44:27","1:15:08","33:56","1:55:20"
  ];
  const views = [
    "128K","45K","312K","89K","567K","23K","198K","412K",
    "67K","234K","156K","78K","345K","890K","34K",
    "123K","456K","67K","210K","43K"
  ];

  const grid = root.querySelector("#bn13h-grid");
  for (let i = 0; i < 60; i++) {
    var vi = i % 20;
    const card = document.createElement("div");
    card.className = "yt-card";
    card.innerHTML =
      '<div class="yt-thumb" style="background-image: url(\'https://i.ytimg.com/vi/' + videoIds[vi] + '/hqdefault.jpg\');">' +
        '<div class="yt-thumb-dur">' + durations[vi] + '</div>' +
      '</div>' +
      '<div class="yt-card-info">' +
        '<div class="yt-card-title">' + titles[vi] + '</div>' +
        '<div class="yt-card-channel">' + channels[vi] + '</div>' +
        '<div class="yt-card-meta">' + views[vi] + ' views · ' + Math.floor(1 + vi * 0.7) + ' weeks ago</div>' +
      '</div>';
    grid.appendChild(card);
  }

  const tl = gsap.timeline({ paused: true });
  const scrollEl = root.querySelector("#bn13h-ytScroll");

  // Scroll thumbnails up — no fade, no black, always showing cards
  tl.to(scrollEl, { y: -2800, duration: 7.7, ease: "power1.inOut" }, 0.3);

  tl.to({}, { duration: 8 }, 0);
  return tl;
})();
</script>
