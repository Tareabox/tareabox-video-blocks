<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  visual-callout-tip-01-tb
  Tareabox Hyperframes Effect
  Description: Pro Tip callout card — glass border, yellow badge, slides up from bottom for tutorial overlays.
  Category: visual
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="visual-callout-tip-01-tb" data-composition-id="visual-callout-tip-01-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-callout-tip-01-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --tip-title: "Use keyboard shortcuts";
      --tip-body:  "Press Cmd+K to open the command palette from anywhere in the app.";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-callout-tip-01-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="visual-callout-tip-01-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="visual-callout-tip-01-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.55);
    }
    [data-composition-id="visual-callout-tip-01-tb"] .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 90%);
      pointer-events: none;
    }


    [data-composition-id="visual-callout-tip-01-tb"] .card {
      position: absolute;
      bottom: 9%; left: 6%;
      width: 36%;
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--tb-accent) 30%, rgba(255,255,255,0.20));
      background: color-mix(in srgb, var(--tb-accent) 4%, rgba(9,9,11,0.95));
      padding: 4% 5%;
      display: flex; flex-direction: column; gap: 8%;
    }
    [data-composition-id="visual-callout-tip-01-tb"] .badge-row {
      display: flex; align-items: center; gap: 5%;
    }
    [data-composition-id="visual-callout-tip-01-tb"] .badge {
      padding: 0.35vmin 1vmin;
      border-radius: 5px;
      background: color-mix(in srgb, var(--tb-accent) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 40%, transparent);
      font-size: clamp(16px, 3.5vmin, 30px);
      font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--tb-accent);
    }
    [data-composition-id="visual-callout-tip-01-tb"] .icon {
      width: 2.2vmin; height: 2.2vmin; flex-shrink: 0;
      color: var(--tb-accent);
    }
    [data-composition-id="visual-callout-tip-01-tb"] .tip-title {
      font-size: clamp(23px, 3vmin, 32px);
      font-weight: 600; letter-spacing: -0.01em; line-height: 1.3;
      color: var(--tb-text);
    }
    [data-composition-id="visual-callout-tip-01-tb"] .tip-body {
      font-size: clamp(15px, 3.5vmin, 35px);
      font-weight: 400; line-height: 1.55;
      color: var(--tb-text-dim);
    }
</style>

    <!--
      ASSET (horizontal) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="bg01-vid" class="bg-video" src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="vignette"></div>
    <div class="card" id="ct01-card">
      <div class="badge-row">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span class="badge">Pro Tip</span>
      </div>
      <div class="tip-title" id="ct01-title"></div>
      <div class="tip-body"  id="ct01-body"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["visual-callout-tip-01-tb"] = (function () {
      const root  = document.querySelector('[data-composition-id="visual-callout-tip-01-tb"]');
      const cs    = getComputedStyle(root);
      const card  = root.querySelector("#ct01-card");
      root.querySelector("#ct01-title").textContent = cs.getPropertyValue("--tip-title").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#ct01-body").textContent  = cs.getPropertyValue("--tip-body").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });
      gsap.set(card, { opacity: 0, y: 40 });
      tl.to(card, { opacity: 1, y: 0, duration: 0.55, ease: "expo.out" }, 0.15);
      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
