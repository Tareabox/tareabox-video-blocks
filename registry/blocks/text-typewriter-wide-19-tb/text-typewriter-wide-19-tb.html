<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-typewriter-wide-19-tb
  Tareabox Hyperframes Effect
  Description: All-caps wide-tracking typewriter with a blinking underscore cursor and accent bar reveal.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-typewriter-wide-19-tb" data-composition-id="text-typewriter-wide-19-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-wide-19-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #f97316);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --line1: "SHIP";
      --line2: "IT NOW";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-wide-19-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-typewriter-wide-19-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-typewriter-wide-19-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 0 12%;
      gap: 12px;
    }
    [data-composition-id="text-typewriter-wide-19-tb"] .row {
      display: flex; align-items: baseline; gap: 0;
    }
    [data-composition-id="text-typewriter-wide-19-tb"] .text-line {
      font-size: clamp(60px, 11.5vmin, 138px);
      font-weight: 900;
      letter-spacing: 0.14em;
      line-height: 1;
      text-transform: uppercase;
      color: var(--tb-text);
      overflow: hidden;
      white-space: nowrap;
    }
    [data-composition-id="text-typewriter-wide-19-tb"] .text-line.accent {
      color: var(--tb-accent);
    }
    [data-composition-id="text-typewriter-wide-19-tb"] .cursor {
      display: inline-block;
      width: 0.55em; height: 0.12em;
      background: var(--tb-accent);
      margin-left: 0.06em;
      vertical-align: baseline;
      margin-bottom: 0.08em;
      opacity: 1;
    }
    [data-composition-id="text-typewriter-wide-19-tb"] .accent-bar {
      height: 5px;
      background: var(--tb-accent);
      width: 0;
      margin-top: 4px;
    }
</style>

    <div class="stage">
      <div class="row">
        <div class="text-line" id="tw19-l1"></div>
        <div class="cursor" id="tw19-cursor1"></div>
      </div>
      <div class="row">
        <div class="text-line accent" id="tw19-l2"></div>
        <div class="cursor" id="tw19-cursor2" style="opacity:0"></div>
      </div>
      <div class="accent-bar" id="tw19-bar"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-typewriter-wide-19-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-typewriter-wide-19-tb"]');
      const cs   = getComputedStyle(root);
      const l1El = root.querySelector("#tw19-l1");
      const l2El = root.querySelector("#tw19-l2");
      const cur1 = root.querySelector("#tw19-cursor1");
      const cur2 = root.querySelector("#tw19-cursor2");
      const bar  = root.querySelector("#tw19-bar");

      const text1 = cs.getPropertyValue("--line1").trim().replace(/^["']|["']$/g, "");
      const text2 = cs.getPropertyValue("--line2").trim().replace(/^["']|["']$/g, "");

      const TOTAL    = 3;
      const speed1   = 0.11;
      const dur1     = text1.length * speed1;
      const speed2   = 0.1;
      const dur2     = text2.length * speed2;
      const start2   = 0.15 + dur1 + 0.1;

      const tl = gsap.timeline({ paused: true });
      const c1 = { v: 0 }, c2 = { v: 0 };

      // Line 1 types in
      tl.to(c1, {
        v: text1.length, duration: dur1, ease: "none",
        snap: { v: 1 },
        onUpdate: () => { l1El.textContent = text1.slice(0, Math.round(c1.v)); }
      }, 0.15);

      // Cursor 1 blink while typing line 1
      tl.to(cur1, { opacity: 0, duration: 0.18, ease: "none", repeat: Math.ceil(dur1 / 0.36), yoyo: true }, 0.15);

      // Line 2 starts after line 1 finishes
      tl.set(cur2, { opacity: 1 }, start2);
      tl.set(cur1, { opacity: 0 }, start2);

      tl.to(c2, {
        v: text2.length, duration: dur2, ease: "none",
        snap: { v: 1 },
        onUpdate: () => { l2El.textContent = text2.slice(0, Math.round(c2.v)); }
      }, start2);

      tl.to(cur2, { opacity: 0, duration: 0.18, ease: "none", repeat: Math.ceil(dur2 / 0.36), yoyo: true }, start2);

      // Accent bar slides in after both lines done
      const barStart = start2 + dur2 + 0.1;
      tl.to(bar, { width: "76%", duration: 0.5, ease: "power3.out" }, barStart);
      tl.set(cur2, { opacity: 0 }, barStart);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
