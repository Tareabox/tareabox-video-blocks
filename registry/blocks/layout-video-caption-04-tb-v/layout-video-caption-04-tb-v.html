<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-video-caption-04-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Full-bleed talking head with a glass caption bar at the bottom — speaker name, role, and quote text.
  Category: layout
  Duration: 5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"captionName","type":"string","label":"Speaker name","default":"Natalie Digital"},
  {"id":"captionRole","type":"string","label":"Speaker role","default":"Product Designer"},
  {"id":"captionQuote","type":"string","label":"Quote","default":"The best interfaces are the ones you don't notice."},
  {"id":"accent","type":"color","label":"Accent color","default":"#06b6d4"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#000000"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-video-caption-04-tb-v" data-composition-id="layout-video-caption-04-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-video-caption-04-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #06b6d4);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --caption-name:  "Natalie Digital";
      --caption-role:  "Product Designer";
      --caption-quote: "The best interfaces are the ones you don't notice.";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-video-caption-04-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-video-caption-04-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-video-caption-04-tb-v"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 25%;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .bottom-grad {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .caption-bar {
      position: absolute;
      bottom: 11%; left: 5%; right: 5%;
      border-radius: 22px;
      background: rgba(9,9,11,0.72);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 5.5% 6.5%;
      display: flex; flex-direction: column; gap: 3.4vmin;
      opacity: 0;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .speaker-row {
      display: flex; align-items: center; gap: 2.5vmin;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .accent-dot {
      width: 2.8vmin; height: 2.8vmin;
      border-radius: 50%;
      background: var(--tb-accent);
      box-shadow: 0 0 16px color-mix(in srgb, var(--tb-accent) 70%, transparent);
      flex-shrink: 0;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .speaker-info {
      display: flex; flex-direction: column; gap: 0.4vmin;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .speaker-name {
      font-size: clamp(34px, 4.2vmin, 56px);
      font-weight: 800;
      letter-spacing: -0.015em;
      color: var(--tb-text);
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .speaker-role {
      font-size: clamp(22px, 2.8vmin, 36px);
      font-weight: 500;
      color: var(--tb-accent);
      letter-spacing: 0.02em;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .divider {
      height: 1px;
      background: rgba(255,255,255,0.12);
      transform-origin: left;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .quote-text {
      font-size: clamp(32px, 4vmin, 52px);
      font-weight: 600;
      line-height: 1.35;
      color: var(--tb-text);
      letter-spacing: -0.015em;
      opacity: 0;
    }
    [data-composition-id="layout-video-caption-04-tb-v"] .accent-line {
      position: absolute;
      left: 0; top: 10%; bottom: 10%;
      width: 3px;
      background: var(--tb-accent);
      border-radius: 0 2px 2px 0;
      box-shadow: 0 0 12px color-mix(in srgb, var(--tb-accent) 60%, transparent);
      transform-origin: top;
    }
</style>


    <!--
      ASSET (vertical) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="vc04v-vid"
           class="bg-video"
           src="https://videos.pexels.com/video-files/7514462/7514462-hd_1920_1080_25fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
           data-start="0" data-duration="5" data-track-index="0"
           muted playsinline></video>

    <div class="bottom-grad"></div>

    <div class="caption-bar" id="vc04v-bar">
      <div class="accent-line" id="vc04v-line"></div>
      <div class="speaker-row">
        <div class="accent-dot"></div>
        <div class="speaker-info">
          <span class="speaker-name" id="vc04v-name"></span>
          <span class="speaker-role" id="vc04v-role"></span>
        </div>
      </div>
      <div class="divider" id="vc04v-div"></div>
      <div class="quote-text" id="vc04v-quote"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-video-caption-04-tb-v"] = (function () {
      const root  = document.querySelector('[data-composition-id="layout-video-caption-04-tb-v"]');
      const cs    = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--caption-name",  V.captionName);
      setStr("--caption-role",  V.captionRole);
      setStr("--caption-quote", V.captionQuote);
      setRaw("--tb-accent",     V.accent);
      setRaw("--tb-bg",         V.bg);

      const bar   = root.querySelector("#vc04v-bar");
      const line  = root.querySelector("#vc04v-line");
      const div   = root.querySelector("#vc04v-div");
      const quote = root.querySelector("#vc04v-quote");

      root.querySelector("#vc04v-name").textContent  = cs.getPropertyValue("--caption-name").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#vc04v-role").textContent  = cs.getPropertyValue("--caption-role").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#vc04v-quote").textContent = cs.getPropertyValue("--caption-quote").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });

      gsap.set(line, { scaleY: 0 });
      gsap.set(div,  { scaleX: 0 });

      tl.to(bar, { opacity: 1, duration: 0.5, ease: "expo.out" }, 0.4);
      tl.from(bar, { y: 30, duration: 0.5, ease: "expo.out" }, 0.4);

      tl.to(line, { scaleY: 1, duration: 0.4, ease: "expo.out" }, 0.6);
      tl.to(div,  { opacity: 1, scaleX: 1, duration: 0.4, ease: "expo.out" }, 0.7);

      tl.to(quote, { opacity: 1, duration: 0.45, ease: "power2.out" }, 0.85);
      tl.from(quote, { y: 14, duration: 0.45, ease: "power2.out" }, 0.85);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
