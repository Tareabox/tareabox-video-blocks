<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Pack Natalie
  conversationapp-tweet-08-tb · Single tweet card overlay · 4 seconds
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-tweet-08-tb" data-composition-id="conversationapp-tweet-08-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="4">
<style>
    /* 🎨 CUSTOMIZE HERE */
    [data-composition-id="conversationapp-tweet-08-tb"] {
      --tb-bg: #0f1419; --tb-text: #e7e9ea; --tb-text-dim: #71767b;
      --tb-accent: var(--tb-brand-accent, #1d9bf0);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --tw-name:    "Tareabox";
      --tw-handle:  "@tareabox";
      --tw-time:    "2h";
      --tw-body:    "Just shipped 52 video layouts that turn topics into tutorials. Pick one, edit one CONFIG block, render. That's it.";
      --tw-replies: "284";
      --tw-rt:      "1.2K";
      --tw-likes:   "9.4K";

      /* Avatar oficial tareabox.com (local, ship con el pack) */
      --tw-avatar-img: url("../assets/tb-media/tb-tareabox-logo.png");
    }
    /* ⛔ EFFECT CODE */
    [data-composition-id="conversationapp-tweet-08-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="conversationapp-tweet-08-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }
    [data-composition-id="conversationapp-tweet-08-tb"] .card {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 78%;
      background: #0f1419;
      border: 1px solid #2f3336;
      border-radius: 22px;
      padding: 4.5vmin 5vmin;
      display: flex; flex-direction: column;
      gap: 2.6vmin;
      opacity: 0;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .head {
      display: flex; align-items: flex-start; gap: 2.2vmin;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .avatar {
      width: 8vmin; height: 8vmin; border-radius: 50%;
      background-image: var(--tw-avatar-img);
      background-size: cover;
      background-position: center;
      background-color: #fff;
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .who {
      display: flex; flex-direction: column; gap: 0.4vmin;
      flex: 1;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .name-row {
      display: flex; align-items: center; gap: 0.8vmin;
      font-size: clamp(28px, 3.2vmin, 44px);
      font-weight: 800; color: var(--tb-text);
      letter-spacing: -0.01em;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .verified {
      width: clamp(22px, 2.6vmin, 36px); height: clamp(22px, 2.6vmin, 36px);
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .handle {
      font-size: clamp(20px, 2.4vmin, 32px);
      color: var(--tb-text-dim); font-weight: 400;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .body {
      font-size: clamp(28px, 3.4vmin, 48px);
      font-weight: 500;
      color: var(--tb-text); line-height: 1.4;
      letter-spacing: -0.005em;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .stats {
      display: flex; gap: 5vmin;
      padding-top: 2.2vmin;
      border-top: 1px solid #2f3336;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .stat {
      display: flex; align-items: center; gap: 1vmin;
      color: var(--tb-text-dim);
      font-size: clamp(20px, 2.2vmin, 30px);
      font-weight: 500;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .stat svg {
      width: clamp(24px, 2.6vmin, 36px); height: clamp(24px, 2.6vmin, 36px);
      stroke: currentColor; fill: none; stroke-width: 2;
    }
    [data-composition-id="conversationapp-tweet-08-tb"] .stat.like svg { stroke: #f91880; }
    [data-composition-id="conversationapp-tweet-08-tb"] .stat.like { color: #f91880; }
</style>

    <div class="card" id="tw08-card">
      <div class="head">
        <div class="avatar"></div>
        <div class="who">
          <div class="name-row">
            <span id="tw08-name"></span>
            <svg class="verified" viewBox="0 0 24 24" fill="#1d9bf0"><path d="M22.5 12.5l-2-1.4.8-2.3-2.4-.6-.6-2.4-2.3.8-1.4-2-2 1.4-2-1.4-1.4 2-2.3-.8-.6 2.4-2.4.6.8 2.3-2 1.4 2 1.4-.8 2.3 2.4.6.6 2.4 2.3-.8 1.4 2 2-1.4 2 1.4 1.4-2 2.3.8.6-2.4 2.4-.6-.8-2.3 2-1.4zM10.5 17l-4-4 1.4-1.4 2.6 2.6 6.6-6.6 1.4 1.4L10.5 17z"/></svg>
          </div>
          <span class="handle"><span id="tw08-handle"></span> · <span id="tw08-time"></span></span>
        </div>
      </div>
      <div class="body" id="tw08-body"></div>
      <div class="stats">
        <div class="stat">
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg>
          <span id="tw08-replies"></span>
        </div>
        <div class="stat">
          <svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <span id="tw08-rt"></span>
        </div>
        <div class="stat like">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#f91880"/></svg>
          <span id="tw08-likes"></span>
        </div>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-tweet-08-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-tweet-08-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      $("#tw08-name").textContent    = cs.getPropertyValue("--tw-name").trim().replace(/^["']|["']$/g,"");
      $("#tw08-handle").textContent  = cs.getPropertyValue("--tw-handle").trim().replace(/^["']|["']$/g,"");
      $("#tw08-time").textContent    = cs.getPropertyValue("--tw-time").trim().replace(/^["']|["']$/g,"");
      $("#tw08-body").textContent    = cs.getPropertyValue("--tw-body").trim().replace(/^["']|["']$/g,"");
      $("#tw08-replies").textContent = cs.getPropertyValue("--tw-replies").trim().replace(/^["']|["']$/g,"");
      $("#tw08-rt").textContent      = cs.getPropertyValue("--tw-rt").trim().replace(/^["']|["']$/g,"");
      $("#tw08-likes").textContent   = cs.getPropertyValue("--tw-likes").trim().replace(/^["']|["']$/g,"");

      const tl = gsap.timeline({ paused: true });
      const card = $("#tw08-card");
      gsap.set(card, { y: 30, scale: 0.94 });
      tl.to(card, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 0.2);
      tl.to({}, { duration: 4 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
