<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-yt-lower-third-03-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Full face cam with animated lower-third name card — accent bar wipes in, name and role slide up.
  Category: layout
  Duration: 5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"ltName","type":"string","label":"Name","default":"Mateo Vázquez"},
  {"id":"ltRole","type":"string","label":"Role","default":"Founder · tareabox.com"},
  {"id":"ltTopic","type":"string","label":"Topic badge","default":"YouTube Pack v1"},
  {"id":"accent","type":"color","label":"Accent color","default":"#f97316"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#000000"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-yt-lower-third-03-tb-v" data-composition-id="layout-yt-lower-third-03-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-lower-third-03-tb-v"] {
      --tb-bg:           #000;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #f97316);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --lt-name:      "Mateo Vázquez";
      --lt-role:      "Founder · tareabox.com";
      --lt-topic:     "YouTube Pack v1";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-lower-third-03-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-yt-lower-third-03-tb-v"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 22%;
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .bottom-grad {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .top-grad {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 18%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
    }

    /* Lower third — wider, lower */
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .lt-wrap {
      position: absolute;
      bottom: 10%; left: 5%; right: 5%;
      display: flex;
      align-items: stretch;
      gap: 0;
      overflow: hidden;
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .lt-accent {
      width: 10px;
      border-radius: 4px;
      background: var(--tb-accent);
      box-shadow: 0 0 22px color-mix(in srgb, var(--tb-accent) 75%, transparent);
      margin-right: 3vmin;
      flex-shrink: 0;
      transform-origin: bottom;
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .lt-text {
      display: flex; flex-direction: column;
      justify-content: center;
      gap: 1.4vmin;
      padding: 1.4vmin 0;
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .lt-name {
      font-size: clamp(48px, 7vmin, 96px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--tb-text);
      opacity: 0;
      text-shadow: 0 2px 22px rgba(0,0,0,0.7);
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .lt-role {
      font-size: clamp(24px, 3.2vmin, 42px);
      font-weight: 500;
      color: var(--tb-accent);
      letter-spacing: 0.02em;
      opacity: 0;
      text-shadow: 0 2px 16px rgba(0,0,0,0.6);
    }

    /* Topic badge — top center */
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .topic-badge {
      position: absolute;
      top: 5%; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 1.6vmin;
      background: rgba(9,9,11,0.9);
      border: 1px solid rgba(255,255,255,0.20);
      border-left: 5px solid var(--tb-accent);
      border-radius: 12px;
      padding: 2vmin 3.4vmin;
      backdrop-filter: blur(14px);
      opacity: 0;
    }
    [data-composition-id="layout-yt-lower-third-03-tb-v"] .topic-text {
      font-size: clamp(22px, 2.8vmin, 38px);
      font-weight: 700;
      color: var(--tb-text);
      letter-spacing: -0.005em;
    }
</style>


    <!--
      ASSET (vertical) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="yl03v-vid"
           class="bg-video"
           src="https://videos.pexels.com/video-files/8048324/8048324-hd_1280_720_50fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
           data-start="0" data-duration="5" data-track-index="0"
           muted playsinline></video>

    <div class="top-grad"></div>
    <div class="bottom-grad"></div>

    <div class="lt-wrap">
      <div class="lt-accent" id="yl03v-bar"></div>
      <div class="lt-text">
        <span class="lt-name" id="yl03v-name"></span>
        <span class="lt-role" id="yl03v-role"></span>
      </div>
    </div>

    <div class="topic-badge" id="yl03v-topic">
      <span class="topic-text" id="yl03v-topic-text"></span>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-lower-third-03-tb-v"] = (function () {
      const root  = document.querySelector('[data-composition-id="layout-yt-lower-third-03-tb-v"]');
      const cs    = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--lt-name",  V.ltName);
      setStr("--lt-role",  V.ltRole);
      setStr("--lt-topic", V.ltTopic);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const bar   = root.querySelector("#yl03v-bar");
      const name  = root.querySelector("#yl03v-name");
      const role  = root.querySelector("#yl03v-role");
      const topic = root.querySelector("#yl03v-topic");

      root.querySelector("#yl03v-name").textContent       = cs.getPropertyValue("--lt-name").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#yl03v-role").textContent       = cs.getPropertyValue("--lt-role").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#yl03v-topic-text").textContent = cs.getPropertyValue("--lt-topic").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });

      gsap.set(bar, { scaleY: 0 });

      tl.to(topic, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.2);
      tl.from(topic, { y: -16, duration: 0.35, ease: "power2.out" }, 0.2);

      tl.to(bar, { scaleY: 1, duration: 0.4, ease: "expo.out" }, 0.45);

      tl.to(name, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.62);
      tl.from(name, { x: -18, duration: 0.35, ease: "power2.out" }, 0.62);

      tl.to(role, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.78);
      tl.from(role, { x: -14, duration: 0.3, ease: "power2.out" }, 0.78);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
