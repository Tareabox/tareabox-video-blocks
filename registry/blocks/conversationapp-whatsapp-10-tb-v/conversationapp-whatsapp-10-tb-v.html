<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-whatsapp-10-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-whatsapp-10-tb-v"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--wa-name",   V.name);
      setStr("--wa-status", V.status);
      setStr("--wa-1", V.msg1); setStr("--wa-2", V.msg2); setStr("--wa-3", V.msg3);
      setStr("--wa-4", V.msg4); setStr("--wa-5", V.msg5);
      setStr("--wa-old-1", V.oldMsg1); setStr("--wa-old-2", V.oldMsg2); setStr("--wa-old-3", V.oldMsg3);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      $("#wa10v-name").textContent     = G("--wa-name");
      $("#wa10v-status").textContent   = G("--wa-status");
      $("#wa10v-b1-text").textContent  = G("--wa-1");
      $("#wa10v-b2-text").textContent  = G("--wa-2");
      $("#wa10v-b3-text").textContent  = G("--wa-3");
      $("#wa10v-b4-text").textContent  = G("--wa-4");
      $("#wa10v-b5-text").textContent  = G("--wa-5");
      $("#wa10v-old-1-text").textContent = G("--wa-old-1");
      $("#wa10v-old-2-text").textContent = G("--wa-old-2");
      $("#wa10v-old-3-text").textContent = G("--wa-old-3");
      [1,2,3,4,5].forEach(i => $("#wa10v-t"+i).textContent = G("--wa-time-"+i));

      const tl = gsap.timeline({ paused: true });

      ["#wa10v-date-old", "#wa10v-old-b1", "#wa10v-old-b2", "#wa10v-old-b3"].forEach((sel, i) => {
        gsap.set(sel, { opacity: 0.45, y: 0, scale: 1 });
      });

      const dp = $("#wa10v-date");
      gsap.set(dp, { y: -8, scale: 0.9 });
      tl.to(dp, { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: "back.out(2)" }, 0.15);

      const bubbleTimes = [0.5, 1.15, 1.85, 2.35, 3.9];
      [1,2,3,4,5].forEach((i, idx) => {
        const b = $("#wa10v-b"+i);
        const at = bubbleTimes[idx];
        gsap.set(b, { y: 30, scale: 0.85 });
        tl.to(b, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.8)" }, at);
      });

      const st1 = $("#wa10v-st1");
      gsap.set(st1, { y: 24, scale: 0.6, rotation: -6 });
      tl.to(st1, { opacity: 1, y: 0, scale: 1, rotation: 0, duration: 0.5, ease: "back.out(2.4)" }, 1.55);
      tl.to(st1, { rotation: 4, duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.05);

      const st2 = $("#wa10v-st2");
      gsap.set(st2, { y: 24, scale: 0.6, rotation: 5 });
      tl.to(st2, { opacity: 1, y: 0, scale: 1, rotation: 0, duration: 0.5, ease: "back.out(2.4)" }, 2.7);
      tl.to(st2, { rotation: -4, duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut" }, 3.2);

      const tt = $("#wa10v-typing");
      gsap.set(tt, { y: 18, scale: 0.9 });
      tl.to(tt, { opacity: 1, y: 0, scale: 1, duration: 0.3, ease: "back.out(1.8)" }, 2.95);
      const dots = tt.querySelectorAll(".typing-dot");
      dots.forEach((d, i) => {
        tl.to(d, { y: -3, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 4 }, 3.15 + i * 0.06);
      });
      tl.to(tt, { opacity: 0, y: 10, scale: 0.85, duration: 0.25, ease: "power2.in" }, 3.7);

      tl.to({}, { duration: 6 }, 0);
      return tl;
    })();
  </script>
