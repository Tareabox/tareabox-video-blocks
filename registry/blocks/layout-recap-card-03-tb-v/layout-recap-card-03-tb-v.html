<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-recap-card-03-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Key Takeaways card — header badge plus 3 bullet items staggering in one by one.
  Category: layout
  Duration: 4 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"cardTitle","type":"string","label":"Card title","default":"Key Takeaways"},
  {"id":"item1","type":"string","label":"Item 1","default":"Always validate inputs at the boundary layer"},
  {"id":"item2","type":"string","label":"Item 2","default":"Keep components small and single-purpose"},
  {"id":"item3","type":"string","label":"Item 3","default":"Test behavior, not implementation details"},
  {"id":"accent","type":"color","label":"Accent color","default":"#facc15"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#09090b"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-recap-card-03-tb-v" data-composition-id="layout-recap-card-03-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="4">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-recap-card-03-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --card-title: "Key Takeaways";
      --item1: "Always validate inputs at the boundary layer";
      --item2: "Keep components small and single-purpose";
      --item3: "Test behavior, not implementation details";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-recap-card-03-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-recap-card-03-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-recap-card-03-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0 6%;
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .card {
      width: 100%;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.09);
      padding: 8% 7%;
      display: flex; flex-direction: column; gap: 5%;
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .card-header {
      display: flex; flex-direction: column; align-items: flex-start; gap: 3vmin;
      margin-bottom: 1%;
      opacity: 0;
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .header-badge {
      padding: 0.8vmin 1.6vmin;
      border-radius: 8px;
      background: color-mix(in srgb, var(--tb-accent) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 35%, transparent);
      font-size: clamp(22px, 3vmin, 36px);
      font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--tb-accent);
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .card-title {
      font-size: clamp(38px, 5.4vmin, 64px);
      font-weight: 700; letter-spacing: -0.02em;
      color: var(--tb-text);
      line-height: 1.15;
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .divider {
      width: 0; height: 1px;
      background: rgba(255,255,255,0.20);
      margin-bottom: 1%;
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .item {
      display: flex; align-items: flex-start; gap: 3.5vmin;
      opacity: 0;
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .item-dot {
      flex-shrink: 0;
      margin-top: 1.2vmin;
      width: 1.2vmin; height: 1.2vmin;
      border-radius: 50%;
      background: var(--tb-accent);
    }
    [data-composition-id="layout-recap-card-03-tb-v"] .item-text {
      font-size: clamp(28px, 3.8vmin, 44px);
      font-weight: 400;
      line-height: 1.5;
      color: var(--tb-text-dim);
    }
</style>

    <div class="stage">
      <div class="card">
        <div class="card-header" id="rc03v-header">
          <span class="header-badge">recap</span>
          <span class="card-title" id="rc03v-title"></span>
        </div>
        <div class="divider" id="rc03v-div"></div>
        <div class="item" id="rc03v-i1"><div class="item-dot"></div><div class="item-text" id="rc03v-t1"></div></div>
        <div class="item" id="rc03v-i2"><div class="item-dot"></div><div class="item-text" id="rc03v-t2"></div></div>
        <div class="item" id="rc03v-i3"><div class="item-dot"></div><div class="item-text" id="rc03v-t3"></div></div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-recap-card-03-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="layout-recap-card-03-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--card-title", V.cardTitle);
      setStr("--item1",      V.item1);
      setStr("--item2",      V.item2);
      setStr("--item3",      V.item3);
      setRaw("--tb-accent",  V.accent);
      setRaw("--tb-bg",      V.bg);

      root.querySelector("#rc03v-title").textContent = cs.getPropertyValue("--card-title").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#rc03v-t1").textContent    = cs.getPropertyValue("--item1").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#rc03v-t2").textContent    = cs.getPropertyValue("--item2").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#rc03v-t3").textContent    = cs.getPropertyValue("--item3").trim().replace(/^["']|["']$/g,"");

      const header = root.querySelector("#rc03v-header");
      const div    = root.querySelector("#rc03v-div");
      const items  = [root.querySelector("#rc03v-i1"), root.querySelector("#rc03v-i2"), root.querySelector("#rc03v-i3")];

      const TOTAL = 4;
      const tl = gsap.timeline({ paused: true });

      tl.to(header, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.15);
      tl.from(header,{ y: 12, duration: 0.4, ease: "expo.out" }, 0.15);
      tl.to(div,    { width: "100%", duration: 0.5, ease: "power2.inOut" }, 0.45);
      items.forEach((item, i) => {
        tl.to(item,  { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.7 + i * 0.35);
        tl.from(item,{ y: 14, duration: 0.35, ease: "expo.out" }, 0.7 + i * 0.35);
      });

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
