<!doctype html>
<html lang="en" data-composition-variables='[
  {"id":"name","type":"string","label":"Contact name","default":"Alex"},
  {"id":"msg1","type":"string","label":"Message 1 (incoming)","default":"Hey did you see the new pack?"},
  {"id":"msg2","type":"string","label":"Message 2 (outgoing)","default":"no link?"},
  {"id":"msg3","type":"string","label":"Message 3 (incoming)","default":"tareabox.com — 52 layouts"},
  {"id":"msg4","type":"string","label":"Message 4 (incoming)","default":"ready to render"},
  {"id":"msg5","type":"string","label":"Message 5 (outgoing)","default":"shut up. taking my money 🤝"},
  {"id":"accent","type":"color","label":"Accent color","default":"#007AFF"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#ffffff"}
]'>
<head>
  <!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Pack Natalie
  conversationapp-imessage-09-tb-v (vertical 1080x1920) · iMessage chat with proper iOS tails · 6 seconds
  Refs: Samuel Kraft (samuelkraft.com/blog/ios-chat-bubbles-css)
  -->
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&display=block" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-imessage-09-tb-v" data-composition-id="conversationapp-imessage-09-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="6">
<style>
    /* 🎨 CUSTOMIZE HERE */
    [data-composition-id="conversationapp-imessage-09-tb-v"] {
      --tb-accent: var(--tb-brand-accent, #007AFF);
      --tb-bg: #ffffff;
      --tb-text: #000;
      --tb-text-dim: rgba(60,60,67,0.6);
      --tb-sent: #0b93f6;
      --tb-received: #e5e5ea;
      --tb-blue: #007aff;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --im-name:  "Alex";
      --im-1: "Hey did you see the new pack?";          --im-1-side: "in";
      --im-2: "no link?";                                --im-2-side: "out";
      --im-3: "tareabox.com — 52 layouts";              --im-3-side: "in";
      --im-4: "ready to render";                         --im-4-side: "in";
      --im-5: "shut up. taking my money 🤝";             --im-5-side: "out";
    }
    /* ⛔ EFFECT CODE */
    [data-composition-id="conversationapp-imessage-09-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2a2a2e 0%, #0a0a0c 100%);
      overflow: hidden;
      font-family: var(--tb-font-display);
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* iPhone frame — vertical: width-anchored, fills ~92% of width */
    [data-composition-id="conversationapp-imessage-09-tb-v"] .phone {
      position: relative;
      width: 92%;
      aspect-ratio: 9/19.5;
      max-height: 96%;
      background: #1a1a1c;
      border-radius: 5.5vmin;
      padding: 0.9vmin;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10),
        0 30px 90px rgba(0,0,0,0.75),
        0 12px 30px rgba(0,0,0,0.5);
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .btn-side {
      position: absolute; background: #0e0e10; border-radius: 2px;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .btn-mute   { left: -0.5vmin; top: 12%; width: 0.5vmin; height: 4%; }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .btn-vol-up { left: -0.5vmin; top: 19%; width: 0.5vmin; height: 7%; }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .btn-vol-dn { left: -0.5vmin; top: 28%; width: 0.5vmin; height: 7%; }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .btn-power  { right: -0.5vmin; top: 22%; width: 0.5vmin; height: 11%; }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .screen {
      width: 100%; height: 100%;
      border-radius: 4.6vmin;
      overflow: hidden;
      background: var(--tb-bg);
      display: flex; flex-direction: column;
      position: relative;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .island {
      position: absolute;
      top: 1.4vmin; left: 50%;
      transform: translateX(-50%);
      width: 30%; height: 3vmin;
      background: #000;
      border-radius: 2vmin;
      z-index: 10;
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4vmin 3vmin 0.6vmin;
      font-size: clamp(18px, 2.3vmin, 30px);
      font-weight: 700;
      color: #000;
      background: #ffffff;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .status-icons { display: flex; gap: 0.5vmin; align-items: center; }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .status-icons svg {
      width: clamp(14px, 1.8vmin, 22px); height: clamp(14px, 1.8vmin, 22px);
      fill: #000;
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .im-header {
      padding: 0.4vmin 2vmin 1.4vmin;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      background: rgba(247,247,247,0.92);
      backdrop-filter: blur(20px);
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .back svg {
      width: clamp(18px, 2.6vmin, 32px); height: clamp(18px, 2.6vmin, 32px);
      stroke: var(--tb-blue); stroke-width: 2.5; fill: none;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .center {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.4vmin; flex: 1;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .avatar {
      width: 6.4vmin; height: 6.4vmin; border-radius: 50%;
      background: linear-gradient(135deg, #5856d6 0%, #ff2d55 100%);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700;
      font-size: clamp(30px, 3.8vmin, 50px);
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .name-row {
      display: flex; align-items: center; gap: 0.4vmin;
      font-size: clamp(18px, 2.3vmin, 30px);
      color: var(--tb-text);
      font-weight: 500;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .name-row svg {
      width: clamp(11px, 1.4vmin, 18px); height: clamp(11px, 1.4vmin, 18px);
      stroke: var(--tb-text-dim); stroke-width: 2.5; fill: none;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .ft svg {
      width: clamp(18px, 2.6vmin, 32px); height: clamp(18px, 2.6vmin, 32px);
      stroke: var(--tb-blue); stroke-width: 2; fill: none;
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .messages {
      flex: 1;
      padding: 2.2vmin 2.4vmin 2.6vmin;
      display: flex; flex-direction: column;
      justify-content: flex-start;
      gap: 0.6vmin;
      overflow: hidden;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .time-stamp {
      align-self: center;
      color: var(--tb-text-dim);
      font-size: clamp(22px, 2.6vmin, 34px);
      font-weight: 500;
      margin: 0.6vmin 0 1vmin;
      opacity: 0;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .time-stamp strong { color: var(--tb-text); font-weight: 700; }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble {
      position: relative;
      max-width: 78%;
      margin-bottom: 1.6vmin;
      padding: 1.6vmin 2.4vmin;
      line-height: 1.25;
      word-wrap: break-word;
      border-radius: 3.2vmin;
      font-size: clamp(40px, 5vmin, 64px);
      opacity: 0;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.tail::before,
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.tail::after {
      position: absolute;
      bottom: 0;
      height: 3.2vmin;
      content: "";
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.tail::before {
      width: 2.4vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.tail::after {
      width: 3.2vmin;
      background-color: var(--tb-bg);
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.out {
      align-self: flex-end;
      color: white;
      background: var(--tb-sent);
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.out.tail::before {
      right: -0.9vmin;
      background-color: var(--tb-sent);
      border-bottom-left-radius: 2vmin 1.8vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.out.tail::after {
      right: -3.2vmin;
      border-bottom-left-radius: 1.3vmin;
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.in {
      align-self: flex-start;
      color: black;
      background: var(--tb-received);
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.in.tail::before {
      left: -0.9vmin;
      background-color: var(--tb-received);
      border-bottom-right-radius: 2vmin 1.8vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.in.tail::after {
      left: -3.2vmin;
      border-bottom-right-radius: 1.3vmin;
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.stacked {
      margin-bottom: 0.3vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.stacked::before,
    [data-composition-id="conversationapp-imessage-09-tb-v"] .bubble.stacked::after {
      opacity: 0;
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .typing {
      align-self: flex-start;
      background: var(--tb-received);
      padding: 1.8vmin 2.2vmin;
      border-radius: 3.2vmin;
      display: flex; gap: 0.8vmin; align-items: center;
      opacity: 0;
      position: relative;
      margin-bottom: 1.6vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .typing::before,
    [data-composition-id="conversationapp-imessage-09-tb-v"] .typing::after {
      content: "";
      position: absolute;
      bottom: 0; height: 3.2vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .typing::before {
      left: -0.9vmin; width: 2.4vmin;
      background: var(--tb-received);
      border-bottom-right-radius: 2vmin 1.8vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .typing::after {
      left: -3.2vmin; width: 3.2vmin;
      background: var(--tb-bg);
      border-bottom-right-radius: 1.3vmin;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .typing-dot {
      width: 1.4vmin; height: 1.4vmin;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .delivered {
      align-self: flex-end;
      color: var(--tb-text-dim);
      font-size: clamp(20px, 2.2vmin, 30px);
      font-weight: 500;
      margin-top: 0.4vmin;
      letter-spacing: 0.02em;
      opacity: 0;
    }

    [data-composition-id="conversationapp-imessage-09-tb-v"] .im-input {
      display: flex; align-items: center; gap: 1vmin;
      padding: 1vmin 1.6vmin 2vmin;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      background: #ffffff;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .plus {
      width: 5vmin; height: 5vmin; border-radius: 50%;
      background: #f1f1f3;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .plus svg {
      width: clamp(16px, 2.2vmin, 28px); height: clamp(16px, 2.2vmin, 28px);
      stroke: rgba(0,0,0,0.45); stroke-width: 2; fill: none;
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .text-pill {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(0,0,0,0.18);
      border-radius: 999px;
      padding: 1vmin 1.8vmin;
      display: flex; align-items: center; justify-content: space-between;
      font-size: clamp(20px, 2.5vmin, 32px);
      color: var(--tb-text-dim);
    }
    [data-composition-id="conversationapp-imessage-09-tb-v"] .text-pill svg {
      width: clamp(15px, 1.9vmin, 26px); height: clamp(15px, 1.9vmin, 26px);
      stroke: rgba(0,0,0,0.45); stroke-width: 2; fill: none;
    }
</style>

    <div class="phone">
      <div class="btn-side btn-mute"></div>
      <div class="btn-side btn-vol-up"></div>
      <div class="btn-side btn-vol-dn"></div>
      <div class="btn-side btn-power"></div>

      <div class="screen">
        <div class="island"></div>

        <div class="status-bar">
          <span>9:41</span>
          <span class="status-icons">
            <svg viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
            <svg viewBox="0 0 16 12"><path d="M8 3.5c2.4 0 4.6 0.9 6.3 2.4l1.2-1.2C13.4 2.7 10.8 1.5 8 1.5S2.6 2.7 0.5 4.7l1.2 1.2C3.4 4.4 5.6 3.5 8 3.5zm0 2.5c1.6 0 3.1 0.6 4.2 1.6l1.2-1.2C12 4.9 10 4 8 4S4 4.9 2.6 6.4l1.2 1.2C4.9 6.6 6.4 6 8 6zm0 3a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>
            <svg viewBox="0 0 24 12"><rect x="0" y="0" width="22" height="12" rx="2.5" fill="none" stroke="#000" stroke-width="1"/><rect x="22.5" y="3.5" width="1.5" height="5" rx="0.6"/><rect x="2" y="2" width="18" height="8" rx="1.2"/></svg>
          </span>
        </div>

        <div class="im-header">
          <div class="back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
          <div class="center">
            <div class="avatar" id="im09v-avatar">A</div>
            <div class="name-row">
              <span id="im09v-name"></span>
              <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>
          <div class="ft">
            <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </div>
        </div>

        <div class="messages" id="im09v-messages">
          <div class="time-stamp" id="im09v-stamp"><strong>iMessage</strong> · Today 9:41</div>
          <div class="bubble in tail"  id="im09v-b1"></div>
          <div class="bubble out tail" id="im09v-b2"></div>
          <div class="bubble in stacked" id="im09v-b3"></div>
          <div class="bubble in tail"  id="im09v-b4"></div>
          <div class="typing" id="im09v-typing">
            <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
          </div>
          <div class="bubble out tail" id="im09v-b5"></div>
          <div class="delivered" id="im09v-delivered">Delivered</div>
        </div>

        <div class="im-input">
          <div class="plus"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
          <div class="text-pill">
            <span>iMessage</span>
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
        </div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-imessage-09-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-imessage-09-tb-v"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--im-name", V.name);
      setStr("--im-1", V.msg1); setStr("--im-2", V.msg2); setStr("--im-3", V.msg3);
      setStr("--im-4", V.msg4); setStr("--im-5", V.msg5);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      $("#im09v-name").textContent     = G("--im-name");
      $("#im09v-avatar").textContent   = G("--im-name").charAt(0);
      $("#im09v-b1").textContent       = G("--im-1");
      $("#im09v-b2").textContent       = G("--im-2");
      $("#im09v-b3").textContent       = G("--im-3");
      $("#im09v-b4").textContent       = G("--im-4");
      $("#im09v-b5").textContent       = G("--im-5");

      const tl = gsap.timeline({ paused: true });

      tl.to($("#im09v-stamp"), { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.1);

      const bubbleTimes = [0.5, 1.15, 1.65, 2.15, 3.6];
      [1,2,3,4,5].forEach((i, idx) => {
        const b = $("#im09v-b"+i);
        const at = bubbleTimes[idx];
        gsap.set(b, { y: 30, scale: 0.85 });
        tl.to(b, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.8)" }, at);
      });

      const tt = $("#im09v-typing");
      gsap.set(tt, { y: 18, scale: 0.9 });
      tl.to(tt, { opacity: 1, y: 0, scale: 1, duration: 0.3, ease: "back.out(1.8)" }, 2.65);
      const dots = tt.querySelectorAll(".typing-dot");
      dots.forEach((d, i) => {
        tl.to(d, { y: -3, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 4 }, 2.85 + i * 0.06);
      });
      tl.to(tt, { opacity: 0, y: 10, scale: 0.85, duration: 0.25, ease: "power2.in" }, 3.4);

      tl.to($("#im09v-delivered"), { opacity: 1, duration: 0.3, ease: "power2.out" }, 4.3);

      tl.to({}, { duration: 6 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
