<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-chapter-reveal-21-tb
  Tareabox Hyperframes Effect
  Description: Chapter number badge + large title reveal with a sliding accent line.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-chapter-reveal-21-tb" data-composition-id="text-chapter-reveal-21-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-chapter-reveal-21-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --chapter-num:      "03";
      --chapter-eyebrow:  "Chapter";
      --chapter-title:    "State Management";
      --chapter-subtitle: "Handling complex UI state without losing your mind";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-chapter-reveal-21-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-chapter-reveal-21-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-chapter-reveal-21-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      padding: 0 10%;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .content {
      display: flex; flex-direction: column; gap: 3vmin;
      max-width: 70%;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .eyebrow-row {
      display: flex; align-items: center; gap: 2vmin;
      opacity: 0;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .eyebrow {
      font-size: clamp(18px, 3vmin, 32px);
      font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--tb-accent);
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .chapter-num {
      font-size: clamp(18px, 3vmin, 32px);
      font-weight: 700; letter-spacing: 0.22em;
      color: var(--tb-accent);
      background: color-mix(in srgb, var(--tb-accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 35%, transparent);
      padding: 0.3vmin 1.2vmin; border-radius: 5px;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .accent-bar {
      width: 5vmin; height: 2px;
      background: var(--tb-accent);
      border-radius: 2px;
      transform-origin: left;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .title-wrap {
      overflow: hidden;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .title {
      font-size: clamp(48px, 8vmin, 100px);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--tb-text);
      line-height: 1.05;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .subtitle {
      font-size: clamp(18px, 2.5vmin, 32px);
      font-weight: 400;
      color: var(--tb-text-dim);
      line-height: 1.5;
      max-width: 90%;
      opacity: 0;
    }
    [data-composition-id="text-chapter-reveal-21-tb"] .num-bg {
      position: absolute;
      right: 6%;
      top: 50%;
      transform: translateY(-50%);
      font-size: clamp(180px, 32vmin, 420px);
      font-weight: 900;
      letter-spacing: -0.06em;
      color: color-mix(in srgb, var(--tb-accent) 18%, transparent);
      line-height: 1;
      user-select: none;
      opacity: 0;
    }
</style>

    <div class="num-bg" id="cr21-numbg"></div>
    <div class="stage">
      <div class="content">
        <div class="eyebrow-row" id="cr21-eyebrow">
          <span class="eyebrow"     id="cr21-ew"></span>
          <div  class="accent-bar"  id="cr21-bar"></div>
          <span class="chapter-num" id="cr21-num"></span>
        </div>
        <div class="title-wrap">
          <div class="title" id="cr21-title"></div>
        </div>
        <div class="subtitle" id="cr21-sub"></div>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-chapter-reveal-21-tb"] = (function () {
      const root  = document.querySelector('[data-composition-id="text-chapter-reveal-21-tb"]');
      const cs    = getComputedStyle(root);

      const num = cs.getPropertyValue("--chapter-num").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#cr21-ew").textContent    = cs.getPropertyValue("--chapter-eyebrow").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#cr21-num").textContent   = num;
      root.querySelector("#cr21-title").textContent = cs.getPropertyValue("--chapter-title").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#cr21-sub").textContent   = cs.getPropertyValue("--chapter-subtitle").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#cr21-numbg").textContent = num;

      const eyebrow = root.querySelector("#cr21-eyebrow");
      const bar     = root.querySelector("#cr21-bar");
      const title   = root.querySelector("#cr21-title");
      const sub     = root.querySelector("#cr21-sub");
      const numbg   = root.querySelector("#cr21-numbg");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      gsap.set(bar, { scaleX: 0 });
      tl.to(numbg, { opacity: 1, duration: 0.7, ease: "power2.out" }, 0.05);
      tl.from(numbg, { scale: 1.15, duration: 0.7, ease: "power2.out" }, 0.05);

      tl.to(eyebrow, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.2);
      tl.from(eyebrow, { x: -16, duration: 0.35, ease: "power2.out" }, 0.2);
      tl.to(bar, { scaleX: 1, duration: 0.4, ease: "expo.out" }, 0.3);

      tl.from(title, { y: "100%", duration: 0.55, ease: "expo.out" }, 0.42);

      tl.to(sub, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.75);
      tl.from(sub, { y: 12, duration: 0.4, ease: "power2.out" }, 0.75);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
