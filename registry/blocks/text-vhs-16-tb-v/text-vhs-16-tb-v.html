<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-vhs-16-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Text materializes with VHS-style RGB channel separation and scanline overlay, then stabilizes.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"headline","type":"string","label":"Headline","default":"REWIND"},
  {"id":"label","type":"string","label":"Label","default":"PLAY ▶ VHS"},
  {"id":"accent","type":"color","label":"Accent color","default":"#4ade80"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#020a04"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-vhs-16-tb-v" data-composition-id="text-vhs-16-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3.5">
<style>
    [data-composition-id="text-vhs-16-tb-v"] {
      --tb-bg:           #020a04;
      --tb-text:         #b0ffb8;
      --tb-text-dim:     #4ade80;
      --tb-accent:       var(--tb-brand-accent, #4ade80);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "REWIND";
      --label:    "PLAY ▶ VHS";
    }
    [data-composition-id="text-vhs-16-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-vhs-16-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-vhs-16-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 6%;
      gap: 28px;
    
      z-index: 6;
    }
    [data-composition-id="text-vhs-16-tb-v"] .label {
      font-size: clamp(18px, 2.2vmin, 28px);
      font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-vhs-16-tb-v"] .headline {
      font-size: clamp(110px, 14vmin, 180px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--tb-text);
      text-align: center;
      white-space: nowrap;
      opacity: 0;
    }
    [data-composition-id="text-vhs-16-tb-v"] .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      opacity: 0.7;
    
      z-index: 5;
    }
    [data-composition-id="text-vhs-16-tb-v"] .vignette {
      /* Empty — vignette now rendered as SVG feGaussianBlur (no CSS gradient = no banding) */
      display: none;
    }
    [data-composition-id="text-vhs-16-tb-v"] .noise-bar {
      position: absolute;
      left: 0; right: 0;
      height: 8px;
      background: rgba(180,255,200,0.25);
      top: 50%;
      opacity: 0;
    }
    [data-composition-id="text-vhs-16-tb-v"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
</style>

    <!--
      ASSET (horizontal/vertical) — demo from Pexels (free license).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
    -->
    <video class="bg-video"
           src="https://videos.pexels.com/video-files/28682064/12451981_1920_1080_30fps.mp4"
           crossorigin="anonymous" data-tb-asset="background"
           data-start="0" data-duration="3.5" data-track-index="0"
           muted playsinline></video>

    <div class="scanlines"></div>
    <svg class="vignette-svg" viewBox="0 0 1080 1920" preserveAspectRatio="none"
         style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4">
      <defs>
        <filter id="vhs-vig-text-vhs-16-tb-v" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="140" />
        </filter>
      </defs>
      <!-- Frame con hueco central, blureado heavy → vignette smooth sin banding -->
      <path d="M 0,0 L 1080,0 L 1080,1920 L 0,1920 Z M 194,345 L 886,345 L 886,1575 L 194,1575 Z"
            fill="black" fill-rule="evenodd" opacity="0.85"
            filter="url(#vhs-vig-text-vhs-16-tb-v)" />
    </svg>
    <div class="noise-bar" id="vhs16v-bar"></div>
    <div class="stage">
      <div class="label" id="vhs16v-label"></div>
      <div class="headline" id="vhs16v-head"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-vhs-16-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-vhs-16-tb-v"]');
      const cs      = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--headline",  V.headline);
      setStr("--label",     V.label);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const headEl  = root.querySelector("#vhs16v-head");
      const labelEl = root.querySelector("#vhs16v-label");
      const barEl   = root.querySelector("#vhs16v-bar");

      headEl.textContent  = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      labelEl.textContent = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");

      /* Dynamic font fit per HyperFrames skill (SKILL.md:366) */
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        const __MAX_W = 1080 * 0.88;
        [headEl, labelEl].forEach((__el) => {
          try {
            const __cs = getComputedStyle(__el);
            const __ff = (__cs.fontFamily.split(",")[0] || "Geist").replace(/["\']/g,"").trim();
            const __fw = parseInt(__cs.fontWeight) || 700;
            if (!__el.textContent) return;
            const __fit = window.__hyperframes.fitTextFontSize(__el.textContent, {
              maxWidth: __MAX_W, fontFamily: __ff, fontWeight: __fw,
            });
            if (__fit) __el.style.fontSize = __fit + "px";
          } catch (e) {}
        });
      }

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      tl.to(barEl, { opacity: 1, top: "0%", duration: 0, ease: "none" }, 0.1);
      tl.to(barEl, { top: "100%", duration: 0.35, ease: "none" }, 0.1);
      tl.to(barEl, { opacity: 0, duration: 0 }, 0.45);

      tl.fromTo(headEl,
        { opacity: 1, textShadow: "-14px 0 rgba(255,20,60,0.85), 14px 0 rgba(0,255,200,0.85)", x: -4 },
        { opacity: 1, textShadow: "0px 0 rgba(255,20,60,0), 0px 0 rgba(0,255,200,0)", x: 0, duration: 0.8, ease: "power2.out" },
        0.35);
      tl.set(headEl, { opacity: 1 }, 0.35);

      tl.to(labelEl, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);

      tl.to(headEl, { x: -6, textShadow: "-8px 0 rgba(255,20,60,0.7), 8px 0 rgba(0,255,200,0.7)", duration: 0, ease: "none" }, 1.5);
      tl.to(headEl, { x: 0, textShadow: "none", duration: 0.07, ease: "none" }, 1.52);

      tl.to(headEl, { x: 4, textShadow: "6px 0 rgba(255,20,60,0.6), -6px 0 rgba(0,255,200,0.6)", duration: 0, ease: "none" }, 2.3);
      tl.to(headEl, { x: 0, textShadow: "none", duration: 0.05, ease: "none" }, 2.34);

      tl.to(barEl, { opacity: 0.8, top: "20%", duration: 0, ease: "none" }, 2.6);
      tl.to(barEl, { top: "85%", duration: 0.25, ease: "none" }, 2.6);
      tl.to(barEl, { opacity: 0, duration: 0 }, 2.85);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
