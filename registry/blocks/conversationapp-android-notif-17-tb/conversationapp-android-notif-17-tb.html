<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Pack Natalie
  conversationapp-android-notif-17-tb · Android-style stacked notifications · 4 seconds
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-android-notif-17-tb" data-composition-id="conversationapp-android-notif-17-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="4">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE ──────────────────────────────────── */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="conversationapp-android-notif-17-tb"] {
      --tb-accent: var(--tb-brand-accent, #4CAF50);
      --tb-bg: #1a202c;
      --tb-text: #1a1a1a;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);
      --an-1-app: "Gmail";   --an-1-from: "Stripe"; --an-1-msg: "Payment of $897.00 from new customer";
      --an-2-app: "YouTube"; --an-2-from: "TareaboxTV"; --an-2-msg: "🔥 You hit 10K subscribers";
      --an-3-app: "Notion";  --an-3-from: "Daily review"; --an-3-msg: "3 tasks remain — check before EOD";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE — No tocar a menos que sepas lo que hacés */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="conversationapp-android-notif-17-tb"] {
      position: relative; width: 100%; height: 100%;
      background: linear-gradient(160deg, #4a5568 0%, #1a202c 100%);
      overflow: hidden;
      font-family: var(--tb-font-display);
      display: flex; align-items: center; justify-content: center;
      padding: 4vmin;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }
    [data-composition-id="conversationapp-android-notif-17-tb"] .stack {
      width: 56%;
      display: flex; flex-direction: column;
      gap: 1.4vmin;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .notif {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 1.8vmin 2vmin;
      display: flex; gap: 1.4vmin;
      box-shadow: 0 12px 36px rgba(0,0,0,0.35);
      transform: translateY(-200%) scale(0.94);
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .icon {
      width: 5vmin; height: 5vmin;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800;
      font-size: clamp(18px, 2.2vmin, 28px);
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .notif:nth-child(1) .icon { background: linear-gradient(135deg, #ea4335, #fbbc04); }
    [data-composition-id="conversationapp-android-notif-17-tb"] .notif:nth-child(2) .icon { background: #ff0000; }
    [data-composition-id="conversationapp-android-notif-17-tb"] .notif:nth-child(3) .icon { background: #000; }
    [data-composition-id="conversationapp-android-notif-17-tb"] .body {
      flex: 1; min-width: 0;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .meta {
      display: flex; align-items: center; gap: 0.8vmin;
      font-size: clamp(12px, 1.4vmin, 18px);
      color: #5f6368;
      margin-bottom: 0.3vmin;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .app { font-weight: 700; }
    [data-composition-id="conversationapp-android-notif-17-tb"] .dot {
      width: 0.5vmin; height: 0.5vmin; border-radius: 50%; background: #5f6368;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .from {
      font-size: clamp(16px, 1.9vmin, 24px);
      font-weight: 700;
      color: #202124;
      margin-bottom: 0.2vmin;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .text {
      font-size: clamp(15px, 1.7vmin, 22px);
      color: #3c4043;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    [data-composition-id="conversationapp-android-notif-17-tb"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.32) saturate(0.85);
      z-index: 0;
    }
</style>

    <!--
      ASSET (vertical/horizontal) — blurred background video (Pexels free license).
      Replace `src` with your own video. Filter blur is applied via CSS so any
      footage works — even busy ones become abstract ambient color.
    -->
    <video class="bg-video"
           src="https://videos.pexels.com/video-files/7986195/7986195-hd_1920_1080_25fps.mp4"
           crossorigin="anonymous" data-tb-asset="background-blurred"
           data-start="0" data-duration="4" data-track-index="0"
           muted playsinline></video>

    <div class="stack">
      <div class="notif" id="an17-n1">
        <div class="icon">G</div>
        <div class="body">
          <div class="meta"><span class="app" id="an17-1-app"></span><span class="dot"></span><span>now</span></div>
          <div class="from" id="an17-1-from"></div>
          <div class="text" id="an17-1-msg"></div>
        </div>
      </div>
      <div class="notif" id="an17-n2">
        <div class="icon">▶</div>
        <div class="body">
          <div class="meta"><span class="app" id="an17-2-app"></span><span class="dot"></span><span>2m</span></div>
          <div class="from" id="an17-2-from"></div>
          <div class="text" id="an17-2-msg"></div>
        </div>
      </div>
      <div class="notif" id="an17-n3">
        <div class="icon">N</div>
        <div class="body">
          <div class="meta"><span class="app" id="an17-3-app"></span><span class="dot"></span><span>5m</span></div>
          <div class="from" id="an17-3-from"></div>
          <div class="text" id="an17-3-msg"></div>
        </div>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-android-notif-17-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-android-notif-17-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");
      [1,2,3].forEach(i => {
        $("#an17-"+i+"-app").textContent  = G("--an-"+i+"-app");
        $("#an17-"+i+"-from").textContent = G("--an-"+i+"-from");
        $("#an17-"+i+"-msg").textContent  = G("--an-"+i+"-msg");
      });

      const tl = gsap.timeline({ paused: true });
      [1,2,3].forEach((i, idx) => {
        tl.to($("#an17-n"+i), {
          y: "0%", scale: 1, duration: 0.55, ease: "back.out(1.4)"
        }, 0.2 + idx * 0.25);
      });
      tl.to({}, { duration: 4 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
