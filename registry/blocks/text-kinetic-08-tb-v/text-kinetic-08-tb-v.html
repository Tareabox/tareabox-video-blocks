<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-kinetic-08-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Three bold words slam in from different directions with kinetic energy.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"word1","type":"string","label":"Word 1","default":"THINK"},
  {"id":"word2","type":"string","label":"Word 2","default":"BUILD"},
  {"id":"word3","type":"string","label":"Word 3","default":"SHIP"},
  {"id":"accent","type":"color","label":"Accent color","default":"#facc15"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-kinetic-08-tb-v" data-composition-id="text-kinetic-08-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    [data-composition-id="text-kinetic-08-tb-v"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --word1: "THINK";
      --word2: "BUILD";
      --word3: "SHIP";
    }
    [data-composition-id="text-kinetic-08-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-kinetic-08-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-kinetic-08-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      padding: 0 6%;
    }
    [data-composition-id="text-kinetic-08-tb-v"] .word {
      font-size: clamp(80px, 15vmin, 200px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.95;
      color: var(--tb-text);
      overflow: hidden;
      text-align: center;
    }
    [data-composition-id="text-kinetic-08-tb-v"] .word.accent { color: var(--tb-accent); }
    [data-composition-id="text-kinetic-08-tb-v"] .divider {
      width: 4px; height: 0;
      background: var(--tb-accent);
      margin: 14px 0;
    }
</style>

    <div class="stage">
      <div class="word" id="k08v-w1"></div>
      <div class="divider" id="k08v-div"></div>
      <div class="word accent" id="k08v-w2"></div>
      <div class="divider" id="k08v-div2"></div>
      <div class="word" id="k08v-w3"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-kinetic-08-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="text-kinetic-08-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--word1",     V.word1);
      setStr("--word2",     V.word2);
      setStr("--word3",     V.word3);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const w1   = root.querySelector("#k08v-w1");
      const w2   = root.querySelector("#k08v-w2");
      const w3   = root.querySelector("#k08v-w3");
      const divs = root.querySelectorAll(".divider");

      w1.textContent = cs.getPropertyValue("--word1").trim().replace(/^["']|["']$/g, "");
      w2.textContent = cs.getPropertyValue("--word2").trim().replace(/^["']|["']$/g, "");
      w3.textContent = cs.getPropertyValue("--word3").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true, defaults: { ease: "expo.out" } });

      tl.from(w1, { x: -120, opacity: 0, duration: 0.5 }, 0.1);
      tl.to(divs[0], { height: 32, duration: 0.25, ease: "power3.out" }, 0.4);
      tl.from(w2, { x:  120, opacity: 0, duration: 0.5 }, 0.45);
      tl.to(divs[1], { height: 32, duration: 0.25, ease: "power3.out" }, 0.75);
      tl.from(w3, { x: -120, opacity: 0, duration: 0.5 }, 0.8);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
