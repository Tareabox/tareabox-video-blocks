<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-yt-split-screen-02-tb
  Tareabox Hyperframes Effect
  Description: Face cam 38% left, screen content 62% right — classic split-screen tutorial layout with animated divider.
  Category: layout
  Duration: 5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-yt-split-screen-02-tb" data-composition-id="layout-yt-split-screen-02-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-split-screen-02-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --split-name:    "Natalie Digital";
      --split-role:    "Founder, Tareabox";
      --split-chapter: "Chapter 01 — Opening";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-split-screen-02-tb"] {
      position: relative; width: 100%; height: 100%;
      background: #09090b;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-split-screen-02-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Left panel — face cam */
    [data-composition-id="layout-yt-split-screen-02-tb"] .face-panel {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 38%;
      overflow: hidden;
      background: #060608;
    }
    [data-composition-id="layout-yt-split-screen-02-tb"] .face-video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }
    [data-composition-id="layout-yt-split-screen-02-tb"] .face-grad {
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        transparent 60%,
        rgba(9,9,11,0.9) 100%
      );
    }

    /* Right panel — screen */
    [data-composition-id="layout-yt-split-screen-02-tb"] .screen-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 62%;
      overflow: hidden;
    }
    [data-composition-id="layout-yt-split-screen-02-tb"] .screen-video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    [data-composition-id="layout-yt-split-screen-02-tb"] .screen-grad {
      position: absolute; inset: 0;
      background: linear-gradient(
        to left,
        transparent 70%,
        rgba(9,9,11,0.88) 100%
      );
    }

    /* Divider line */
    [data-composition-id="layout-yt-split-screen-02-tb"] .divider {
      position: absolute;
      top: 0; bottom: 0;
      left: 38%;
      width: 2px;
      background: linear-gradient(
        to bottom,
        transparent,
        var(--tb-accent) 30%,
        var(--tb-accent) 70%,
        transparent
      );
      box-shadow: 0 0 12px color-mix(in srgb, var(--tb-accent) 60%, transparent);
      transform-origin: center;
      opacity: 0;
    }

    /* Lower third */
    [data-composition-id="layout-yt-split-screen-02-tb"] .lower-third {
      position: absolute;
      bottom: 0; left: 0;
      width: 38%;
      padding: 4% 6% 5%;
      background: linear-gradient(to top, rgba(9,9,11,0.96) 30%, rgba(9,9,11,0.6) 70%, transparent 100%);
      display: flex; flex-direction: column; gap: 1.2vmin;
      opacity: 0;
    }
    [data-composition-id="layout-yt-split-screen-02-tb"] .lt-name {
      font-size: clamp(34px, 4.2vmin, 58px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--tb-text);
      text-shadow: 0 2px 14px rgba(0,0,0,0.5);
    }
    [data-composition-id="layout-yt-split-screen-02-tb"] .lt-role {
      font-size: clamp(18px, 2.2vmin, 28px);
      font-weight: 500;
      color: var(--tb-accent);
      letter-spacing: 0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    /* Chapter badge — top right of screen panel */
    [data-composition-id="layout-yt-split-screen-02-tb"] .chapter-badge {
      position: absolute;
      top: 5%; right: 3%;
      padding: 1.6vmin 2.8vmin;
      background: rgba(9,9,11,0.85);
      border: 1px solid rgba(255,255,255,0.20);
      border-left: 4px solid var(--tb-accent);
      border-radius: 10px;
      backdrop-filter: blur(14px);
      font-size: clamp(18px, 2vmin, 28px);
      font-weight: 700;
      color: var(--tb-text);
      letter-spacing: -0.005em;
      opacity: 0;
    }
</style>


    <!-- Face panel -->
    <div class="face-panel">
      <!--
        ASSET (horizontal) — demo from Pexels (free license, attribution in README).
        To use your own footage, replace the `src` with one of these:
          Public URL:   src="https://yourdomain.com/your-video.mp4"
          Local path:   src="../assets/tb-media/your-video.mp4"
                        (the `..` walks up from compositions/ to the project root)
      -->
      <video id="ys02-face"
             class="face-video"
             src="https://videos.pexels.com/video-files/7514466/7514466-hd_1920_1080_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
             data-start="0" data-duration="5" data-track-index="0"
             muted playsinline></video>
      <div class="face-grad"></div>
    </div>

    <!-- Screen panel -->
    <div class="screen-panel">
      <!--
        ASSET (horizontal) — demo from Pexels (free license, attribution in README).
        To use your own footage, replace the `src` with one of these:
          Public URL:   src="https://yourdomain.com/your-video.mp4"
          Local path:   src="../assets/tb-media/your-video.mp4"
                        (the `..` walks up from compositions/ to the project root)
      -->
      <video id="ys02-screen"
             class="screen-video"
             src="https://videos.pexels.com/video-files/7514466/7514466-hd_1920_1080_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
             data-start="0" data-duration="5" data-track-index="2"
             muted playsinline></video>
      <div class="screen-grad"></div>
    </div>

    <div class="divider"       id="ys02-div"></div>
    <div class="lower-third"   id="ys02-lt">
      <span class="lt-name"   id="ys02-name"></span>
      <span class="lt-role"   id="ys02-role"></span>
    </div>
    <div class="chapter-badge" id="ys02-chapter"></div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-split-screen-02-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="layout-yt-split-screen-02-tb"]');
      const cs   = getComputedStyle(root);
      const div  = root.querySelector("#ys02-div");
      const lt   = root.querySelector("#ys02-lt");
      const ch   = root.querySelector("#ys02-chapter");

      root.querySelector("#ys02-name").textContent    = cs.getPropertyValue("--split-name").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#ys02-role").textContent    = cs.getPropertyValue("--split-role").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#ys02-chapter").textContent = cs.getPropertyValue("--split-chapter").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });

      gsap.set(div, { scaleY: 0 });
      tl.to(div, { opacity: 1, scaleY: 1, duration: 0.55, ease: "expo.out" }, 0.25);

      tl.to(lt, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.45);
      tl.from(lt, { y: 18, duration: 0.4, ease: "power2.out" }, 0.45);

      tl.to(ch, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.55);
      tl.from(ch, { x: 16, duration: 0.35, ease: "power2.out" }, 0.55);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
