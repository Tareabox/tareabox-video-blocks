<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=block" rel="stylesheet" />
</head>
<body>
<div id="conversationapp-ios-notif-12-tb" data-composition-id="conversationapp-ios-notif-12-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE ──────────────────────────────────── */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="conversationapp-ios-notif-12-tb"] {
      --tb-accent: var(--tb-brand-accent, #007AFF);
      --tb-bg: #1a2027;
      --tb-text: #ffffff;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);
      --no-app:   "Tareabox";
      --no-time:  "now";
      --no-title: "New pack ready to render";
      --no-body:  "tareabox-pack-natalie · 52 layouts staged for export";

      /* Icono oficial de tareabox.com (local, ship con el pack) */
      --no-icon-img: url("../assets/tb-media/tb-tareabox-logo.png");
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE — No tocar a menos que sepas lo que hacés */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="conversationapp-ios-notif-12-tb"] {
      position: relative; width: 100%; height: 100%;
      background: #0a0a0c;
      overflow: hidden;
      font-family: var(--tb-font-display);
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .bg-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.32) saturate(0.9);
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .notif { position: relative; z-index: 1; }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .notif {
      width: 82%;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 32px;
      padding: 3vmin 3.4vmin;
      display: flex; align-items: flex-start; gap: 1.8vmin;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      transform: translateY(-110%);
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .icon {
      width: 9vmin; height: 9vmin; border-radius: 2.2vmin;
      background-image: var(--no-icon-img);
      background-size: cover;
      background-position: center;
      background-color: #fff;
      flex-shrink: 0;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .body {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 0.4vmin;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .top-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .app {
      font-size: clamp(20px, 2.2vmin, 32px);
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .time {
      font-size: clamp(18px, 2vmin, 28px);
      color: rgba(255,255,255,0.7);
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .title {
      font-size: clamp(28px, 3.2vmin, 44px);
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    [data-composition-id="conversationapp-ios-notif-12-tb"] .text {
      font-size: clamp(22px, 2.6vmin, 36px);
      color: rgba(255,255,255,0.85);
      line-height: 1.35;
    }
</style>

    <img class="bg-photo" src="https://images.pexels.com/photos/27940302/pexels-photo-27940302.jpeg?auto=compress&cs=tinysrgb&w=1920" crossorigin="anonymous" alt="" />
    <div class="notif" id="no12-notif">
      <div class="icon"></div>
      <div class="body">
        <div class="top-row">
          <span class="app" id="no12-app"></span>
          <span class="time" id="no12-time"></span>
        </div>
        <div class="title" id="no12-title"></div>
        <div class="text" id="no12-body"></div>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["conversationapp-ios-notif-12-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="conversationapp-ios-notif-12-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g,"");
      $("#no12-app").textContent   = G("--no-app");
      $("#no12-time").textContent  = G("--no-time");
      $("#no12-title").textContent = G("--no-title");
      $("#no12-body").textContent  = G("--no-body");
      const tl = gsap.timeline({ paused: true });
      tl.to($("#no12-notif"), { y: "0%", duration: 0.55, ease: "back.out(1.4)" }, 0.15);
      tl.to({}, { duration: 3.5 }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
