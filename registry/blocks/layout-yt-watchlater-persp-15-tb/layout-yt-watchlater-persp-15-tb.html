<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
window.__timelines["layout-yt-watchlater-persp-15-tb"] = (function () {
  var root = document.querySelector('[data-composition-id="layout-yt-watchlater-persp-15-tb"]');
  var cs   = getComputedStyle(root);
  var V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};

  var header = root.querySelector("#bn15h-header");
  var count  = root.querySelector("#bn15h-count");
  if (V.headerText) header.textContent = V.headerText;
  if (V.countText)  count.textContent  = V.countText;
  if (V.bg)     root.style.setProperty("--tb-bg", V.bg);
  if (V.accent) root.style.setProperty("--tb-accent", V.accent);

  var videoIds = [];
  for (var i = 0; i < 20; i++) {
    var k = "--tb-vid-" + String(i).padStart(2, "0");
    var v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    videoIds.push(v || "dQw4w9WgXcQ");
  }
  var titles = [];
  for (var i = 0; i < 20; i++) {
    var k = "--tb-title-" + String(i).padStart(2, "0");
    var v = cs.getPropertyValue(k).trim().replace(/^["']|["']$/g, "");
    titles.push(v || "Video title " + (i + 1));
  }

  var channels = [
    "Productivity Lab","Carlos Code","Marketing Lab","CreaTech",
    "Design Pro","Business Master","Ana Growth","Video Academy",
    "WebDev Hub","Python Pro","Podcast Pro","YT Strategy",
    "Canva Tips","AI Hub","Commerce Lab","Adobe Guru",
    "Data Master","AI Tools","Social Pro","NoCode Academy"
  ];
  var durations = [
    "45:21","1:12:03","38:47","52:18","3:04:15","41:33","1:28:44","29:06",
    "55:12","2:15:38","1:05:22","48:17","35:44","1:42:19","2:08:33",
    "58:41","44:27","1:15:08","33:56","1:55:20"
  ];
  var views = [
    "128K","45K","312K","89K","567K","23K","198K","412K",
    "67K","234K","156K","78K","345K","890K","34K",
    "123K","456K","67K","210K","43K"
  ];

  var container = root.querySelector("#bn15h-ytScroll");
  for (var i = 0; i < 40; i++) {
    var idx = i % 20;
    var row = document.createElement("div");
    row.className = "yt-video-row";
    row.innerHTML =
      '<div class="yt-thumb" style="background-image: url(\'https://i.ytimg.com/vi/' + videoIds[idx] + '/hqdefault.jpg\');">' +
        '<div class="yt-thumb-dur">' + durations[idx] + '</div>' +
      '</div>' +
      '<div class="yt-video-info">' +
        '<div class="yt-video-title">' + titles[idx] + '</div>' +
        '<div class="yt-video-channel">' + channels[idx] + '</div>' +
        '<div class="yt-video-meta">' + views[idx] + ' views · ' + Math.floor(1 + i * 0.7) + ' weeks ago</div>' +
      '</div>';
    container.appendChild(row);
  }

  var tl = gsap.timeline({ paused: true });
  var screenEl = root.querySelector("#bn15h-screen");
  var scrollEl = root.querySelector("#bn15h-ytScroll");
  var pipEl    = root.querySelector("#bn15h-pip");
  var shadowEl = root.querySelector("#bn15h-shadow");

  /* Screen entrance */
  tl.from(screenEl, { scale: 0.85, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.15);
  tl.from(shadowEl, { opacity: 0, scale: 0.6, duration: 0.7, ease: "power2.out" }, 0.25);

  /* PIP entrance (flat, no perspective) */
  tl.from(pipEl, { scale: 0.8, opacity: 0, duration: 0.4, ease: "back.out(1.4)" }, 0.3);

  /* Screen gentle float + rotation breathing */
  tl.to(screenEl, { y: -8, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0.3);
  tl.to(screenEl, { rotationY: 14, duration: 3.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.4);
  tl.to(screenEl, { rotationX: 1, duration: 4.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.3);

  /* Shadow breathes */
  tl.to(shadowEl, { scaleX: 1.06, scaleY: 0.92, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0.3);

  /* PIP subtle float (flat, independent) */
  tl.to(pipEl, { y: -6, duration: 1.8, ease: "sine.inOut", repeat: 3, yoyo: true }, 1);

  /* Content scroll inside tilted screen */
  tl.to(scrollEl, { y: -800, duration: 3, ease: "power1.out" }, 1);
  tl.to(scrollEl, { y: -3200, duration: 3.5, ease: "power2.in" }, 4);

  /* Duration anchor */
  tl.to({}, { duration: 8 }, 0);

  return tl;
})();
</script>
