  {"id":"title","type":"string","label":"Title","default":"What is in the pack"},

  {"id":"label2","type":"string","label":"Row 2 label","default":"Slides"},
  {"id":"value2","type":"string","label":"Row 2 value","default":"Concept Cards, Tier List"},
  {"id":"label3","type":"string","label":"Row 3 label","default":"Code"},
  {"id":"value3","type":"string","label":"Row 3 value","default":"Code Theater, Captions"},
  {"id":"label4","type":"string","label":"Row 4 label","default":"Notes"},
  {"id":"value4","type":"string","label":"Row 4 value","default":"Sketchnote, Notebook, Before/After"},

<head>
  <!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-yt-tier-list-08-tb
  Tareabox Hyperframes Effect
  Description: Title centered top + 2-column "label → value" mapping list with accent-tinted rows + face cam PiP top-left. Tier-list / mapping tutorial style.
  Category: layout
  Duration: 6 seconds
  REQUIRES: gsap (CDN)
-->
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-yt-tier-list-08-tb" data-composition-id="layout-yt-tier-list-08-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="6">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-tier-list-08-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #a1a1aa;
      --tb-accent:       var(--tb-brand-accent, #22c55e);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --tl-eyebrow: "Tier 1";
      --tl-title:   "What's in the pack";

      --tl-1-label: "Cam";
      --tl-1-value: "PiP, Lower-third, Split, Reaction";
      --tl-2-label: "Slides";
      --tl-2-value: "Concept Cards, Tier List";
      --tl-3-label: "Code";
      --tl-3-value: "Code Theater, Captions";
      --tl-4-label: "Notes";
      --tl-4-value: "Sketchnote, Notebook, Before/After";
      --tl-5-label: "Brand";
      --tl-5-value: "Tokens-driven theming";
      --tl-6-label: "Render";
      --tl-6-value: "1080p, 4K, vertical, square";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-tier-list-08-tb"] {
      position: relative; width: 100%; height: 100%;
      background: #0a0a0c;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-tier-list-08-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Subtle grid background */
    [data-composition-id="layout-yt-tier-list-08-tb"] .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at 50% 40%, #000 0%, #000 50%, transparent 90%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 40%, #000 0%, #000 50%, transparent 90%);
    }

    /* PiP — full lateral column on the left, like Nate Herk reference */
    [data-composition-id="layout-yt-tier-list-08-tb"] .pip-wrap {
      position: absolute;
      top: 6%; bottom: 6%;
      left: 3%;
      width: 22%;
      border-radius: 22px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.22);
      box-shadow:
        0 14px 50px rgba(0,0,0,0.65),
        0 0 32px color-mix(in srgb, var(--tb-accent) 28%, transparent);
      opacity: 0;
    }
    [data-composition-id="layout-yt-tier-list-08-tb"] .pip-video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 22%;
    }

    /* Title block — anchored next to PiP, top of content column */
    [data-composition-id="layout-yt-tier-list-08-tb"] .title-block {
      position: absolute;
      top: 6%;
      left: 28%; right: 5%;
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 1.5vmin;
    }
    [data-composition-id="layout-yt-tier-list-08-tb"] .title-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 1vmin;
      padding: 0.9vmin 2vmin;
      background: color-mix(in srgb, var(--tb-accent) 22%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 45%, transparent);
      border-radius: 999px;
      font-size: clamp(16px, 1.7vmin, 22px);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="layout-yt-tier-list-08-tb"] .title-text {
      font-size: clamp(46px, 6vmin, 88px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #ffffff;
      overflow: hidden;
    }
    [data-composition-id="layout-yt-tier-list-08-tb"] .title-text span { display: inline-block; }

    /* Rows container — starts after PiP column, anchored under title */
    [data-composition-id="layout-yt-tier-list-08-tb"] .rows {
      position: absolute;
      top: 28%;
      left: 28%;
      right: 5%;
      bottom: 6%;
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 1.6vmin 1.8vmin;
      align-content: start;
    }

    [data-composition-id="layout-yt-tier-list-08-tb"] .row-label,
    [data-composition-id="layout-yt-tier-list-08-tb"] .row-value {
      border-radius: 12px;
      padding: 1.6vmin 2.4vmin;
      display: flex; align-items: center;
      opacity: 0;
    }
    [data-composition-id="layout-yt-tier-list-08-tb"] .row-label {
      background: var(--tb-accent);
      color: #0a0a0c;
      font-size: clamp(20px, 2.4vmin, 32px);
      font-weight: 800;
      letter-spacing: -0.01em;
      box-shadow: 0 0 24px color-mix(in srgb, var(--tb-accent) 25%, transparent);
    }
    [data-composition-id="layout-yt-tier-list-08-tb"] .row-value {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--tb-text);
      font-size: clamp(16px, 1.9vmin, 26px);
      font-weight: 500;
      letter-spacing: -0.005em;
    }
</style>


    <div class="grid-bg"></div>

    <!-- PiP face cam top-left -->
    <div class="pip-wrap" id="tl08-pip">
      <!--
        ASSET (horizontal) — demo from Pexels (free license, attribution in README).
        To use your own footage, replace the `src` with one of these:
          Public URL:   src="https://yourdomain.com/your-video.mp4"
          Local path:   src="../assets/tb-media/your-video.mp4"
                        (the `..` walks up from compositions/ to the project root)
      -->
      <video id="tl08-face"
             class="pip-video"
             src="https://videos.pexels.com/video-files/8048324/8048324-hd_1280_720_50fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
             data-start="0" data-duration="6" data-track-index="0"
             muted playsinline></video>
    </div>

    <!-- Title -->
    <div class="title-block">
      <div class="title-eyebrow" id="tl08-eyebrow"></div>
      <div class="title-text"><span id="tl08-title"></span></div>
    </div>

    <!-- Rows -->
    <div class="rows">
      <div class="row-label" id="tl08-l1"></div>
      <div class="row-value" id="tl08-v1"></div>
      <div class="row-label" id="tl08-l2"></div>
      <div class="row-value" id="tl08-v2"></div>
      <div class="row-label" id="tl08-l3"></div>
      <div class="row-value" id="tl08-v3"></div>
      <div class="row-label" id="tl08-l4"></div>
      <div class="row-value" id="tl08-v4"></div>
      <div class="row-label" id="tl08-l5"></div>
      <div class="row-value" id="tl08-v5"></div>
      <div class="row-label" id="tl08-l6"></div>
      <div class="row-value" id="tl08-v6"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-tier-list-08-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="layout-yt-tier-list-08-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);

      /* Native HyperFrames variables → override CSS custom properties */
      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--tl-eyebrow", V.eyebrow);
      setStr("--tl-title", V.title);
      [1,2,3,4,5,6].forEach((i) => {
        setStr("--tl-"+i+"-label", V["label"+i]);
        setStr("--tl-"+i+"-value", V["value"+i]);
      });
      setRaw("--tb-accent", V.accent);

      $("#tl08-eyebrow").textContent = cs.getPropertyValue("--tl-eyebrow").trim().replace(/^["']|["']$/g,"");
      $("#tl08-title").textContent   = cs.getPropertyValue("--tl-title").trim().replace(/^["']|["']$/g,"");

      /* Dynamic font fit per HyperFrames skill (SKILL.md:366) — shrink only */
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        [
              document.getElementById("tl08-eyebrow"),
              document.getElementById("tl08-title")
        ].forEach((__el) => {
          try {
            if (!__el || !__el.textContent || !__el.parentElement) return;
            const __cs = getComputedStyle(__el);
            const __cur = parseFloat(__cs.fontSize);
            const __pw  = __el.parentElement.getBoundingClientRect().width || 0;
            if (__pw < 40) return;
            const __ff  = (__cs.fontFamily.split(",")[0] || "Geist").replace(/["\']/g,"").trim();
            const __fw  = parseInt(__cs.fontWeight) || 700;
            const __fit = window.__hyperframes.fitTextFontSize(__el.textContent, {
              maxWidth: __pw * 0.96, fontFamily: __ff, fontWeight: __fw,
            });
            if (__fit && __fit < __cur) __el.style.fontSize = __fit + "px";
          } catch (e) {}
        });
      }

      [1,2,3,4,5,6].forEach((i) => {
        $("#tl08-l"+i).textContent = cs.getPropertyValue("--tl-"+i+"-label").trim().replace(/^["']|["']$/g,"");
        $("#tl08-v"+i).textContent = cs.getPropertyValue("--tl-"+i+"-value").trim().replace(/^["']|["']$/g,"");
      });

      const TOTAL = 6;
      const tl = gsap.timeline({ paused: true });

      const pip   = $("#tl08-pip");
      const eye   = $("#tl08-eyebrow");
      const title = $("#tl08-title");

      gsap.set(pip, { scale: 0.85, x: -10 });
      tl.to(pip, { opacity: 1, scale: 1, x: 0, duration: 0.5, ease: "back.out(1.4)" }, 0.2);

      tl.to(eye, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.4);
      tl.from(eye, { y: -10, duration: 0.35, ease: "power2.out" }, 0.4);

      tl.from(title, { y: "100%", duration: 0.6, ease: "expo.out" }, 0.55);

      /* Stagger rows — labels and values together by row */
      [1,2,3,4,5,6].forEach((i, idx) => {
        const at = 1.0 + idx * 0.18;
        tl.to($("#tl08-l"+i), { opacity: 1, duration: 0.4, ease: "power3.out" }, at);
        tl.from($("#tl08-l"+i), { x: -30, duration: 0.45, ease: "expo.out" }, at);
        tl.to($("#tl08-v"+i), { opacity: 1, duration: 0.4, ease: "power3.out" }, at + 0.08);
        tl.from($("#tl08-v"+i), { x: -20, duration: 0.45, ease: "expo.out" }, at + 0.08);
      });

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
