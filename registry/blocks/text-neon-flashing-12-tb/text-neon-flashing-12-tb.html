<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-neon-flashing-12-tb
  Tareabox Hyperframes Effect
  Description: Text flickers on like a neon sign powering up, then stabilizes with a steady glow.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-neon-flashing-12-tb" data-composition-id="text-neon-flashing-12-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-neon-flashing-12-tb"] {
      --tb-bg:           #06060e;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #ec4899);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "OPEN 24H";
      --label:    "NEON SIGN";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-neon-flashing-12-tb"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-neon-flashing-12-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-neon-flashing-12-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    [data-composition-id="text-neon-flashing-12-tb"] .label {
      font-size: clamp(10px, 1.1vmin, 13px);
      font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--tb-accent); opacity: 0;
      overflow: hidden;
    }
    [data-composition-id="text-neon-flashing-12-tb"] .headline {
      font-size: clamp(56px, 11vmin, 132px);
      font-weight: 900; letter-spacing: 0.04em;
      color: var(--tb-accent);
      text-align: center;
      opacity: 0;
      overflow: hidden;
    }
    [data-composition-id="text-neon-flashing-12-tb"] .glow-bg {
      position: absolute; width: 80%; height: 60%;
      top: 20%; left: 10%;
      border-radius: 50%;
      background: radial-gradient(ellipse, color-mix(in srgb, var(--tb-accent) 8%, transparent) 0%, transparent 70%);
      filter: blur(60px);
      opacity: 0;
    }
</style>

    <div class="glow-bg" id="nf12-glow"></div>
    <div class="stage">
      <div class="label" id="nf12-label"></div>
      <h1 class="headline" id="nf12-head"></h1>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-neon-flashing-12-tb"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-neon-flashing-12-tb"]');
      const cs      = getComputedStyle(root);
      const headEl  = root.querySelector("#nf12-head");
      const labelEl = root.querySelector("#nf12-label");
      const glowEl  = root.querySelector("#nf12-glow");

      headEl.textContent  = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      labelEl.textContent = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");

      const accent = cs.getPropertyValue("--tb-accent").trim();
      const TOTAL  = 3.5;
      const tl     = gsap.timeline({ paused: true });

      // Flicker sequence — power-up
      const flickers = [
        [0.1, 0.06], [0.22, 0.05], [0.32, 0.08],
        [0.48, 0.04], [0.55, 0.06], [0.68, 0.04],
        [0.76, 0.05], [0.85, 0.04], [0.93, 0.06],
      ];
      flickers.forEach(([t, d]) => {
        tl.to(headEl, { opacity: 0.7, duration: d * 0.4, ease: "none" }, t);
        tl.to(headEl, { opacity: 0,   duration: d * 0.6, ease: "none" }, t + d * 0.4);
      });

      // Stabilize with glow
      tl.to(headEl,  { opacity: 1, duration: 0.15, ease: "none" }, 1.1);
      tl.to(glowEl,  { opacity: 1, duration: 0.5,  ease: "power2.out" }, 1.1);
      tl.to(labelEl, { opacity: 1, duration: 0.35, ease: "power2.out" }, 1.3);

      // Subtle pulse after stable
      tl.to(headEl, {
        textShadow: `0 0 10px ${accent}, 0 0 30px ${accent}88, 0 0 70px ${accent}44`,
        duration: 0.6, ease: "power1.inOut", yoyo: true, repeat: 2
      }, 1.5);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
