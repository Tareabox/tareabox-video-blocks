<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-yt-kinetic-caption-04-tb
  Tareabox Hyperframes Effect
  Description: Full face cam with oversized kinetic statement text — big bold opinion overlay in the style of modern commentary creators.
  Category: layout
  Duration: 5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-yt-kinetic-caption-04-tb" data-composition-id="layout-yt-kinetic-caption-04-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --kc-label:      "Hot Take";
      --kc-line1:      "Your layouts";
      --kc-line2:      "are what sells.";
      --kc-sub:        "What top tutorials do differently";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] {
      position: relative; width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Video pushed to the right — left strip is clean black for text */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .bg-video {
      position: absolute;
      top: 0; bottom: 0;
      left: 38%;
      width: 62%;
      height: 100%;
      object-fit: cover;
      object-position: center 22%;
    }

    /* Soft fade where video meets the dark strip — keeps it cinematic, no harsh edge */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .overlay {
      position: absolute;
      top: 0; bottom: 0;
      left: 32%;
      width: 18%;
      background: linear-gradient(
        to right,
        #000 0%,
        rgba(0,0,0,0.55) 60%,
        rgba(0,0,0,0) 100%
      );
      pointer-events: none;
    }

    /* Kinetic text block — pinned hard left */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .kc-block {
      position: absolute;
      top: 50%; left: 2.5%;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      gap: 1vmin;
      max-width: 50%;
    }

    /* Label pill */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .kc-label {
      display: inline-flex;
      align-items: center;
      gap: 1vmin;
      background: var(--tb-accent);
      color: #09090b;
      font-size: clamp(12px, 1.2vmin, 16px);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5vmin 1.4vmin;
      border-radius: 4px;
      width: fit-content;
      opacity: 0;
    }

    /* Big statement lines */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .kc-line {
      font-size: clamp(48px, 7.5vmin, 100px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.92;
      color: var(--tb-text);
      overflow: hidden;
    }
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .kc-line span {
      display: block;
      opacity: 0;
    }
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .kc-line2 span {
      color: var(--tb-accent);
    }

    /* Sub text */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .kc-sub {
      font-size: clamp(14px, 1.6vmin, 20px);
      font-weight: 500;
      color: var(--tb-text-dim);
      letter-spacing: 0.01em;
      opacity: 0;
    }

    /* Accent bar — left edge */
    [data-composition-id="layout-yt-kinetic-caption-04-tb"] .kc-bar {
      position: absolute;
      left: calc(2.5% - 1.4vmin);
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 0;
      background: var(--tb-accent);
      border-radius: 2px;
      box-shadow: 0 0 18px color-mix(in srgb, var(--tb-accent) 70%, transparent);
    }
</style>


    <!--
      ASSET (horizontal) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="yk04-vid"
           class="bg-video"
           src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="horizontal"
           data-start="0" data-duration="5" data-track-index="0"
           muted playsinline></video>

    <div class="overlay"></div>

    <div class="kc-bar" id="yk04-bar"></div>

    <div class="kc-block">
      <div class="kc-label" id="yk04-label"></div>
      <div class="kc-line kc-line1"><span id="yk04-l1"></span></div>
      <div class="kc-line kc-line2"><span id="yk04-l2"></span></div>
      <div class="kc-sub" id="yk04-sub"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-kinetic-caption-04-tb"] = (function () {
      const root  = document.querySelector('[data-composition-id="layout-yt-kinetic-caption-04-tb"]');
      const cs    = getComputedStyle(root);
      const bar   = root.querySelector("#yk04-bar");
      const label = root.querySelector("#yk04-label");
      const l1    = root.querySelector("#yk04-l1");
      const l2    = root.querySelector("#yk04-l2");
      const sub   = root.querySelector("#yk04-sub");

      label.textContent = cs.getPropertyValue("--kc-label").trim().replace(/^["']|["']$/g,"");
      l1.textContent    = cs.getPropertyValue("--kc-line1").trim().replace(/^["']|["']$/g,"");
      l2.textContent    = cs.getPropertyValue("--kc-line2").trim().replace(/^["']|["']$/g,"");
      sub.textContent   = cs.getPropertyValue("--kc-sub").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });

      /* Bar grows from center */
      tl.to(bar, { height: "30%", duration: 0.45, ease: "expo.out" }, 0.2);

      /* Label slides in */
      tl.to(label, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.3);
      tl.from(label, { y: 10, duration: 0.3, ease: "power2.out" }, 0.3);

      /* Line 1 — clips from below its overflow container */
      tl.to(l1, { opacity: 1, duration: 0.01 }, 0.42);
      tl.from(l1, { y: "100%", duration: 0.45, ease: "expo.out" }, 0.42);

      /* Line 2 — slight stagger, accent color */
      tl.to(l2, { opacity: 1, duration: 0.01 }, 0.56);
      tl.from(l2, { y: "100%", duration: 0.45, ease: "expo.out" }, 0.56);

      /* Sub text fades */
      tl.to(sub, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.72);
      tl.from(sub, { x: -12, duration: 0.4, ease: "power2.out" }, 0.72);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
