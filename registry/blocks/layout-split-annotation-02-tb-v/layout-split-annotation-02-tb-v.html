<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-split-annotation-02-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Split-panel layout — top screen placeholder, bottom annotation card with glass border and text.
  Category: layout
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"noteTag","type":"string","label":"Note tag","default":"NOTE"},
  {"id":"noteTitle","type":"string","label":"Note title","default":"This is the key part"},
  {"id":"noteBody","type":"string","label":"Note body","default":"Pay attention to how the state updates before the render cycle completes."},
  {"id":"accent","type":"color","label":"Accent color","default":"#10b981"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#09090b"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-split-annotation-02-tb-v" data-composition-id="layout-split-annotation-02-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-split-annotation-02-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --note-tag:   "NOTE";
      --note-title: "This is the key part";
      --note-body:  "Pay attention to how the state updates before the render cycle completes.";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-split-annotation-02-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="layout-split-annotation-02-tb-v"] .layout {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      padding: 5% 5%;
      gap: 4%;
    }
    /* Top: screen placeholder */
    [data-composition-id="layout-split-annotation-02-tb-v"] .screen-panel {
      flex: 0 0 48%;
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.09);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .screen-bar {
      height: 9%;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center;
      padding: 0 3%;
      gap: 1.4%;
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .screen-dot {
      width: 2.2%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,0.26);
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .screen-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .screen-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    /* Bottom: annotation card */
    [data-composition-id="layout-split-annotation-02-tb-v"] .note-panel {
      position: relative;
      flex: 1;
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.09);
      display: flex; flex-direction: column; justify-content: center;
      padding: 7% 8%;
      gap: 4vmin;
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .note-tag {
      display: inline-flex; align-items: center;
      padding: 0.8vmin 1.6vmin;
      border-radius: 8px;
      border: 1px solid;
      border-color: color-mix(in srgb, var(--tb-accent) 40%, transparent);
      background: color-mix(in srgb, var(--tb-accent) 10%, transparent);
      font-size: clamp(20px, 2.4vmin, 32px);
      font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--tb-accent);
      width: fit-content;
      opacity: 0;
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .note-title {
      font-size: clamp(38px, 5.4vmin, 60px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--tb-text);
      opacity: 0;
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .note-divider {
      width: 0; height: 1px;
      background: rgba(255,255,255,0.24);
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .note-body {
      font-size: clamp(26px, 3.6vmin, 42px);
      font-weight: 400;
      line-height: 1.5;
      color: var(--tb-text-dim);
      opacity: 0;
    }
    [data-composition-id="layout-split-annotation-02-tb-v"] .accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 0 2px 2px 0;
      background: var(--tb-accent);
      transform: scaleY(0);
      transform-origin: top;
    }
</style>

    <div class="layout">
      <div class="screen-panel" id="sa02v-screen">
        <div class="screen-bar">
          <div class="screen-dot"></div>
          <div class="screen-dot"></div>
          <div class="screen-dot"></div>
        </div>
        <div class="screen-content">
          <!--
            ASSET (vertical) — demo from Pexels (free license, attribution in README).
            To use your own footage, replace the `src` with one of these:
              Public URL:   src="https://yourdomain.com/your-video.mp4"
              Local path:   src="../assets/tb-media/your-video.mp4"
                            (the `..` walks up from compositions/ to the project root)
          -->
          <video id="sa02v-vid"
                 class="screen-video"
                 src="https://videos.pexels.com/video-files/5940726/5940726-hd_1280_720_25fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
                 data-start="0" data-duration="3.5" data-track-index="0"
                 muted playsinline></video>
        </div>
      </div>
      <div class="note-panel" id="sa02v-note">
        <div class="accent-bar" id="sa02v-bar"></div>
        <div class="note-tag"   id="sa02v-tag"></div>
        <div class="note-title" id="sa02v-title"></div>
        <div class="note-divider" id="sa02v-div"></div>
        <div class="note-body"  id="sa02v-body"></div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-split-annotation-02-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="layout-split-annotation-02-tb-v"]');
      const cs      = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--note-tag",   V.noteTag);
      setStr("--note-title", V.noteTitle);
      setStr("--note-body",  V.noteBody);
      setRaw("--tb-accent",  V.accent);
      setRaw("--tb-bg",      V.bg);

      const screen  = root.querySelector("#sa02v-screen");
      const note    = root.querySelector("#sa02v-note");
      const bar     = root.querySelector("#sa02v-bar");
      const tagEl   = root.querySelector("#sa02v-tag");
      const titleEl = root.querySelector("#sa02v-title");
      const divEl   = root.querySelector("#sa02v-div");
      const bodyEl  = root.querySelector("#sa02v-body");

      tagEl.textContent   = cs.getPropertyValue("--note-tag").trim().replace(/^["']|["']$/g,"");
      titleEl.textContent = cs.getPropertyValue("--note-title").trim().replace(/^["']|["']$/g,"");
      bodyEl.textContent  = cs.getPropertyValue("--note-body").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      gsap.set([screen, note], { opacity: 0 });

      tl.to(screen, { opacity: 1, x: 0, duration: 0.5, ease: "expo.out" }, 0.1);
      tl.from(screen, { x: -30, duration: 0.5, ease: "expo.out" }, 0.1);

      tl.to(note, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.35);
      tl.from(note, { x: 30, duration: 0.45, ease: "expo.out" }, 0.35);

      tl.to(bar,    { scaleY: 1, duration: 0.45, ease: "power3.out" }, 0.5);
      tl.to(tagEl,  { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.6);
      tl.to(titleEl,{ opacity: 1, duration: 0.35, ease: "power2.out" }, 0.75);
      tl.to(divEl,  { width: "100%", duration: 0.4, ease: "power2.inOut" }, 0.9);
      tl.to(bodyEl, { opacity: 1, duration: 0.4, ease: "power2.out" }, 1.05);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
