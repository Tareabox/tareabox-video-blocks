<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-warp-arc-18-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Text rides a wide rainbow arc anchored below screen; apex peaks in upper middle.
  Category: text
  Duration: 9 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"headline","type":"string","label":"Headline","default":"REACH HIGHER"},
  {"id":"label","type":"string","label":"Label","default":""},
  {"id":"accent","type":"color","label":"Accent color","default":"#facc15"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0e0e10"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-warp-arc-18-tb-v" data-composition-id="text-warp-arc-18-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="8">
<style>
    [data-composition-id="text-warp-arc-18-tb-v"] {
      --tb-bg:           #0e0e10;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "REACH HIGHER";
      --label:    "";
    }
    [data-composition-id="text-warp-arc-18-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-warp-arc-18-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-warp-arc-18-tb-v"] .label {
      position: absolute;
      bottom: 6%; left: 0; right: 0;
      text-align: center;
      font-size: clamp(14px, 1.8vmin, 22px);
      font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-warp-arc-18-tb-v"] .svg-stage {
      position: absolute; inset: 0;
    }
</style>
    <div class="label" id="arc18v-label"></div>
    <svg class="svg-stage" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <!-- Wide rainbow arc anchored below screen; apex at y~150 above center -->
        <path id="arc18v-path" d="M -135,1250 A 675,675 0 0 1 1215,1250" />
      </defs>
      <path id="arc18v-guide" fill="none" stroke="white" stroke-width="2" opacity="0.07"
            d="M -135,1250 A 675,675 0 0 1 1215,1250" />
      <text id="arc18v-text" font-weight="800" font-size="120" opacity="0">
        <textPath href="#arc18v-path" id="arc18v-tp" startOffset="0%"></textPath>
      </text>
    </svg>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-warp-arc-18-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-warp-arc-18-tb-v"]');
      const cs      = getComputedStyle(root);
      const labelEl = root.querySelector("#arc18v-label");
      const pathEl  = root.querySelector("#arc18v-path");
      const guideEl = root.querySelector("#arc18v-guide");
      const textEl  = root.querySelector("#arc18v-text");
      const tpEl    = root.querySelector("#arc18v-tp");

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--headline", V.headline);
      setStr("--label",    V.label);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const headline = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label    = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      const accent   = cs.getPropertyValue("--tb-accent").trim();

      labelEl.textContent = label;
      tpEl.textContent    = headline;

      /* Dynamic font fit per HyperFrames skill (SKILL.md:366) — shrink only */
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        [
              labelEl,
              tpEl
        ].forEach((__el) => {
          try {
            if (!__el || !__el.textContent || !__el.parentElement) return;
            const __cs = getComputedStyle(__el);
            const __cur = parseFloat(__cs.fontSize);
            const __pw  = __el.parentElement.getBoundingClientRect().width || 0;
            if (__pw < 40) return;
            const __ff  = (__cs.fontFamily.split(",")[0] || "Geist").replace(/["\']/g,"").trim();
            const __fw  = parseInt(__cs.fontWeight) || 700;
            const __fit = window.__hyperframes.fitTextFontSize(__el.textContent, {
              maxWidth: __pw * 0.96, fontFamily: __ff, fontWeight: __fw,
            });
            if (__fit && __fit < __cur) __el.style.fontSize = __fit + "px";
          } catch (e) {}
        });
      }
      textEl.setAttribute("fill", accent);

      const state = { offset: 0 };
      tpEl.setAttribute("startOffset", "0%");

      const TOTAL = 8;
      const tl = gsap.timeline({ paused: true });
      tl.to(textEl,  { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.2);
      tl.to(labelEl, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.4);

      tl.to(state, {
        offset: 100,
        duration: 7.2,
        ease: "power3.inOut",
        onUpdate: () => tpEl.setAttribute("startOffset", state.offset + "%")
      }, 0.3);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
