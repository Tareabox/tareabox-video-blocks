<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  layout-yt-split-screen-02-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Face cam top 45%, screen content bottom 55% — classic split-screen tutorial layout adapted to vertical with animated divider.
  Category: layout
  Duration: 5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"splitName","type":"string","label":"Name","default":"Natalie Digital"},
  {"id":"splitRole","type":"string","label":"Role","default":"Founder, Tareabox"},
  {"id":"splitChapter","type":"string","label":"Chapter badge","default":"Chapter 01 — Opening"},
  {"id":"accent","type":"color","label":"Accent color","default":"#10b981"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#09090b"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="layout-yt-split-screen-02-tb-v" data-composition-id="layout-yt-split-screen-02-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-split-screen-02-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --split-name:    "Natalie Digital";
      --split-role:    "Founder, Tareabox";
      --split-chapter: "Chapter 01 — Opening";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="layout-yt-split-screen-02-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="layout-yt-split-screen-02-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Top panel — face cam */
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .face-panel {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      overflow: hidden;
      background: #060608;
    }
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .face-video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 22%;
    }
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .face-grad {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 65%,
        rgba(9,9,11,0.92) 100%
      );
    }

    /* Bottom panel — screen */
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .screen-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      overflow: hidden;
    }
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .screen-video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .screen-grad {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        transparent 75%,
        rgba(9,9,11,0.88) 100%
      );
    }

    /* Divider line — horizontal */
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .divider {
      position: absolute;
      left: 0; right: 0;
      top: 45%;
      height: 3px;
      background: linear-gradient(
        to right,
        transparent,
        var(--tb-accent) 25%,
        var(--tb-accent) 75%,
        transparent
      );
      box-shadow: 0 0 14px color-mix(in srgb, var(--tb-accent) 65%, transparent);
      transform-origin: center;
      opacity: 0;
    }

    /* Lower third — over face panel bottom */
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .lower-third {
      position: absolute;
      top: 30%; left: 0;
      width: 100%;
      padding: 3% 6% 4%;
      background: linear-gradient(to top, rgba(9,9,11,0.96) 30%, rgba(9,9,11,0.55) 70%, transparent 100%);
      display: flex; flex-direction: column; gap: 1.4vmin;
      opacity: 0;
    }
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .lt-name {
      font-size: clamp(38px, 5.4vmin, 72px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--tb-text);
      text-shadow: 0 2px 14px rgba(0,0,0,0.6);
    }
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .lt-role {
      font-size: clamp(20px, 2.8vmin, 36px);
      font-weight: 500;
      color: var(--tb-accent);
      letter-spacing: 0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    /* Chapter badge — top right of screen panel */
    [data-composition-id="layout-yt-split-screen-02-tb-v"] .chapter-badge {
      position: absolute;
      top: 47%; right: 5%;
      padding: 1.8vmin 3vmin;
      background: rgba(9,9,11,0.88);
      border: 1px solid rgba(255,255,255,0.22);
      border-left: 5px solid var(--tb-accent);
      border-radius: 12px;
      backdrop-filter: blur(14px);
      font-size: clamp(20px, 2.6vmin, 34px);
      font-weight: 700;
      color: var(--tb-text);
      letter-spacing: -0.005em;
      opacity: 0;
    }
</style>


    <!-- Face panel -->
    <div class="face-panel">
      <!--
        ASSET (vertical) — demo from Pexels (free license, attribution in README).
        To use your own footage, replace the `src` with one of these:
          Public URL:   src="https://yourdomain.com/your-video.mp4"
          Local path:   src="../assets/tb-media/your-video.mp4"
                        (the `..` walks up from compositions/ to the project root)
      -->
      <video id="ys02v-face"
             class="face-video"
             src="https://videos.pexels.com/video-files/7514466/7514466-hd_1920_1080_25fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
             data-start="0" data-duration="5" data-track-index="0"
             muted playsinline></video>
      <div class="face-grad"></div>
    </div>

    <!-- Screen panel -->
    <div class="screen-panel">
      <!--
        ASSET (vertical) — demo from Pexels (free license, attribution in README).
        To use your own footage, replace the `src` with one of these:
          Public URL:   src="https://yourdomain.com/your-video.mp4"
          Local path:   src="../assets/tb-media/your-video.mp4"
                        (the `..` walks up from compositions/ to the project root)
      -->
      <video id="ys02v-screen"
             class="screen-video"
             src="https://videos.pexels.com/video-files/7514466/7514466-hd_1920_1080_25fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
             data-start="0" data-duration="5" data-track-index="2"
             muted playsinline></video>
      <div class="screen-grad"></div>
    </div>

    <div class="divider"       id="ys02v-div"></div>
    <div class="lower-third"   id="ys02v-lt">
      <span class="lt-name"   id="ys02v-name"></span>
      <span class="lt-role"   id="ys02v-role"></span>
    </div>
    <div class="chapter-badge" id="ys02v-chapter"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["layout-yt-split-screen-02-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="layout-yt-split-screen-02-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--split-name",    V.splitName);
      setStr("--split-role",    V.splitRole);
      setStr("--split-chapter", V.splitChapter);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const div  = root.querySelector("#ys02v-div");
      const lt   = root.querySelector("#ys02v-lt");
      const ch   = root.querySelector("#ys02v-chapter");

      root.querySelector("#ys02v-name").textContent    = cs.getPropertyValue("--split-name").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#ys02v-role").textContent    = cs.getPropertyValue("--split-role").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#ys02v-chapter").textContent = cs.getPropertyValue("--split-chapter").trim().replace(/^["']|["']$/g,"");

      const TOTAL = 5;
      const tl = gsap.timeline({ paused: true });

      gsap.set(div, { scaleX: 0 });
      tl.to(div, { opacity: 1, scaleX: 1, duration: 0.55, ease: "expo.out" }, 0.25);

      tl.to(lt, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.45);
      tl.from(lt, { y: 18, duration: 0.4, ease: "power2.out" }, 0.45);

      tl.to(ch, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.55);
      tl.from(ch, { x: 16, duration: 0.35, ease: "power2.out" }, 0.55);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
