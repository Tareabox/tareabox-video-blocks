<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  visual-progress-bar-05-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Tutorial progress bar at the bottom — fills to a set percentage with label and counter.
  Category: visual
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"progressLabel","type":"string","label":"Label","default":"Tutorial Progress"},
  {"id":"progressSection","type":"string","label":"Section","default":"Part 3 of 5"},
  {"id":"progressPct","type":"string","label":"Percent (0-100)","default":"60"},
  {"id":"accent","type":"color","label":"Accent color","default":"#06b6d4"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#09090b"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="visual-progress-bar-05-tb-v" data-composition-id="visual-progress-bar-05-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-progress-bar-05-tb-v"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #c4c4c8;
      --tb-accent:       var(--tb-brand-accent, #06b6d4);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --progress-label:   "Tutorial Progress";
      --progress-section: "Part 3 of 5";
      --progress-pct:     60;
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="visual-progress-bar-05-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: var(--tb-bg);
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="visual-progress-bar-05-tb-v"] .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.55);
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 90%);
      pointer-events: none;
    }


    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-wrapper {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 0 5% 0;
      display: flex; flex-direction: column; gap: 2.5vmin;
      opacity: 0;
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-meta {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 6%;
      gap: 3vmin;
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-label {
      font-size: clamp(24px, 4.2vmin, 44px);
      font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--tb-text-dim);
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-right {
      display: flex; align-items: center; gap: 3vmin;
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-section {
      font-size: clamp(24px, 4.2vmin, 44px);
      font-weight: 500; letter-spacing: 0.06em;
      color: var(--tb-text-dim);
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-pct {
      font-size: clamp(24px, 4.2vmin, 44px);
      font-weight: 700;
      color: var(--tb-accent);
      font-variant-numeric: tabular-nums;
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-track {
      margin: 0 6%;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      overflow: hidden;
    }
    [data-composition-id="visual-progress-bar-05-tb-v"] .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--tb-accent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--tb-accent) 60%, transparent);
    }
</style>

    <!--
      ASSET (vertical) — demo from Pexels (free license, attribution in README).
      To use your own footage, replace the `src` with one of these:
        Public URL:   src="https://yourdomain.com/your-video.mp4"
        Local path:   src="../assets/tb-media/your-video.mp4"
                      (the `..` walks up from compositions/ to the project root)
    -->
    <video id="bg05v-vid" class="bg-video" src="https://videos.pexels.com/video-files/8048324/8048324-hd_1280_720_50fps.mp4" crossorigin="anonymous" data-tb-asset="vertical"
           data-start="0" data-duration="3" data-track-index="0"
           muted playsinline></video>
    <div class="vignette"></div>
    <div class="bar-wrapper" id="pb05v-wrap">
      <div class="bar-meta">
        <span class="bar-label"   id="pb05v-label"></span>
        <div class="bar-right">
          <span class="bar-section" id="pb05v-section"></span>
          <span class="bar-pct"     id="pb05v-pct">0%</span>
        </div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="pb05v-fill"></div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["visual-progress-bar-05-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="visual-progress-bar-05-tb-v"]');
      const cs      = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, '"' + String(val) + '"'); };
      const setRaw = (cssVar, val) => { if (val !== undefined && val !== null && val !== "") root.style.setProperty(cssVar, String(val)); };
      setStr("--progress-label",   V.progressLabel);
      setStr("--progress-section", V.progressSection);
      if (V.progressPct !== undefined && V.progressPct !== null && V.progressPct !== "") {
        root.style.setProperty("--progress-pct", String(V.progressPct));
      }
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const wrap    = root.querySelector("#pb05v-wrap");
      const fill    = root.querySelector("#pb05v-fill");
      const pctEl   = root.querySelector("#pb05v-pct");
      root.querySelector("#pb05v-label").textContent   = cs.getPropertyValue("--progress-label").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#pb05v-section").textContent = cs.getPropertyValue("--progress-section").trim().replace(/^["']|["']$/g,"");

      const target = parseFloat(cs.getPropertyValue("--progress-pct").trim()) || 60;

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });
      const state = { v: 0 };

      tl.to(wrap, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.1);
      tl.to(state, {
        v: target, duration: 1.4, ease: "power2.inOut",
        onUpdate: () => {
          const v = Math.round(state.v);
          fill.style.width = v + "%";
          pctEl.textContent = v + "%";
        }
      }, 0.4);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
