<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-elastic-11-tb
  Tareabox Hyperframes Effect
  Description: Words snap in with an elastic overshoot bounce, one after another.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-elastic-11-tb" data-composition-id="text-elastic-11-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-elastic-11-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #f97316);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --line1: "MOVE FAST";
      --line2: "BREAK LIMITS";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-elastic-11-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-elastic-11-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-elastic-11-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
    }
    [data-composition-id="text-elastic-11-tb"] .line {
      font-size: clamp(48px, 9.5vmin, 114px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      overflow: hidden;
    }
    [data-composition-id="text-elastic-11-tb"] .line:first-child { color: var(--tb-text); }
    [data-composition-id="text-elastic-11-tb"] .line:last-child  { color: var(--tb-accent); }
    [data-composition-id="text-elastic-11-tb"] .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--tb-accent);
      margin: 6px auto;
      opacity: 0; transform: scale(0);
    }
</style>

    <div class="stage">
      <div class="line" id="el11-l1"></div>
      <div class="dot"  id="el11-dot"></div>
      <div class="line" id="el11-l2"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-elastic-11-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-elastic-11-tb"]');
      const cs   = getComputedStyle(root);
      const l1   = root.querySelector("#el11-l1");
      const l2   = root.querySelector("#el11-l2");
      const dot  = root.querySelector("#el11-dot");

      l1.textContent = cs.getPropertyValue("--line1").trim().replace(/^["']|["']$/g, "");
      l2.textContent = cs.getPropertyValue("--line2").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      tl.from(l1,  { y: -80, opacity: 0, scaleY: 1.3, duration: 0.7, ease: "elastic.out(1, 0.5)" }, 0.1);
      tl.to(dot,   { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" }, 0.55);
      tl.from(l2,  { y:  80, opacity: 0, scaleY: 1.3, duration: 0.7, ease: "elastic.out(1, 0.5)" }, 0.65);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
