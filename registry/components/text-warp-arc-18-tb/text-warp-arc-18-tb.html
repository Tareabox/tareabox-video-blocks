<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-warp-arc-18-tb
  Tareabox Hyperframes Effect
  Description: Text rides a semicircular arc that expands outward while the text slides along it.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-warp-arc-18-tb" data-composition-id="text-warp-arc-18-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="8">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-warp-arc-18-tb"] {
      --tb-bg:           #0e0e10;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "REACH HIGHER";
      --label:    "";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-warp-arc-18-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-warp-arc-18-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-warp-arc-18-tb"] .label {
      position: absolute;
      bottom: 8%; left: 0; right: 0;
      text-align: center;
      font-size: clamp(10px, 1.1vmin, 13px);
      font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-warp-arc-18-tb"] .svg-stage {
      position: absolute; inset: 0;
    }
</style>
    <div class="label" id="arc18-label"></div>
    <svg class="svg-stage" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <!-- Arco "rainbow" anclado abajo · endpoints off-screen izq y der · apex visible arriba -->
        <path id="arc18-path" d="M -240,1280 A 1200,1200 0 0 1 2160,1280" />
      </defs>
      <path id="arc18-guide" fill="none" stroke="white" stroke-width="1.5" opacity="0.07"
            d="M -240,1280 A 1200,1200 0 0 1 2160,1280" />
      <text id="arc18-text" font-weight="800" font-size="78" opacity="0">
        <textPath href="#arc18-path" id="arc18-tp" startOffset="0%"></textPath>
      </text>
    </svg>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-warp-arc-18-tb"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-warp-arc-18-tb"]');
      const cs      = getComputedStyle(root);
      const labelEl = root.querySelector("#arc18-label");
      const pathEl  = root.querySelector("#arc18-path");
      const guideEl = root.querySelector("#arc18-guide");
      const textEl  = root.querySelector("#arc18-text");
      const tpEl    = root.querySelector("#arc18-tp");

      const headline = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label    = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      const accent   = cs.getPropertyValue("--tb-accent").trim();

      labelEl.textContent = label;
      tpEl.textContent    = headline;
      textEl.setAttribute("fill", accent);

      /* Arco fijo anclado abajo, endpoints off-screen.
         Texto recorre el arco entero: entra de bottom-left off-screen,
         sube por el apex, baja y sale por bottom-right off-screen */
      const state = { offset: 8 };
      tpEl.setAttribute("startOffset", "8%");

      const TOTAL = 8;
      const tl = gsap.timeline({ paused: true });
      tl.to(textEl,  { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.2);
      tl.to(labelEl, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.4);

      /* Mismo ease + sensación de la versión expanding original.
         Arco length ~3770px, recorrer 100% con power2.inOut → entrada/salida off-screen */
      tl.to(state, {
        offset: 92,
        duration: 7.2,
        ease: "power3.inOut",
        onUpdate: () => tpEl.setAttribute("startOffset", state.offset + "%")
      }, 0.3);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
