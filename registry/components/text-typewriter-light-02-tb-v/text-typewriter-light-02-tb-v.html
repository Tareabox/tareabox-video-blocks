<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-typewriter-light-02-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Headline types out on a clean light background with a bold underline cursor.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"headline","type":"string","label":"Headline","default":"Your headline here"},
  {"id":"label","type":"string","label":"Top label","default":"Typewriter"},
  {"id":"accent","type":"color","label":"Accent color","default":"#2563eb"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#f0ede8"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-typewriter-light-02-tb-v" data-composition-id="text-typewriter-light-02-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    [data-composition-id="text-typewriter-light-02-tb-v"] {
      --tb-bg:           #f0ede8;
      --tb-text:         #111111;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline:        "Your headline here";
      --label:           "Typewriter";
    }
    [data-composition-id="text-typewriter-light-02-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-typewriter-light-02-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-typewriter-light-02-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 12% 9%; gap: 28px;
    }
    [data-composition-id="text-typewriter-light-02-tb-v"] .label {
      font-size: clamp(16px, 2vmin, 24px);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-typewriter-light-02-tb-v"] .headline {
      font-size: clamp(56px, 11vmin, 130px);
      font-weight: 800;
      color: var(--tb-text);
      line-height: 1.05;
      letter-spacing: -0.04em;
      max-width: 95%;
      overflow: hidden;
    }
    [data-composition-id="text-typewriter-light-02-tb-v"] .cursor {
      display: inline-block;
      width: 0.55em; height: 0.08em;
      background: var(--tb-accent);
      margin-left: 0.04em;
      vertical-align: baseline;
      transform: translateY(-0.1em);
    }
    [data-composition-id="text-typewriter-light-02-tb-v"] .cursor.blink {
      animation: tw-l02v-blink 0.6s steps(2, end) infinite;
    }
    @keyframes tw-l02v-blink { 50% { opacity: 0; } }
    [data-composition-id="text-typewriter-light-02-tb-v"] .accent-bar {
      width: 64px; height: 5px;
      background: var(--tb-accent);
      border-radius: 2px;
      transform-origin: left;
      transform: scaleX(0);
    }
</style>

    <div class="stage">
      <div class="accent-bar"></div>
      <div class="label"></div>
      <h1 class="headline"><span class="typed"></span><span class="cursor"></span></h1>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-typewriter-light-02-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-typewriter-light-02-tb-v"]');
      const typedEl = root.querySelector(".typed");
      const cursor  = root.querySelector(".cursor");
      const labelEl = root.querySelector(".label");
      const barEl   = root.querySelector(".accent-bar");
      const cs      = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--headline", V.headline);
      setStr("--label",    V.label);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const text    = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label   = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      const TOTAL   = 3;
      const TYPE_D  = 1.75;

      root.querySelector(".headline").setAttribute("aria-label", text);
      labelEl.textContent = label;
      typedEl.textContent = "";

      const tl = gsap.timeline({ paused: true });
      const counter = { v: 0 };

      tl.to(barEl, { scaleX: 1, duration: 0.35, ease: "power3.out" }, 0.05);
      tl.to(labelEl, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.2);
      /* Dynamic font fit per HyperFrames skill (SKILL.md:366) — shrink only
         Pre-fit using FULL text (typewriter types into the pre-sized element) */
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        try {
          const __cs = getComputedStyle(typedEl);
          const __cur = parseFloat(__cs.fontSize);
          const __pw  = typedEl.parentElement.getBoundingClientRect().width || 0;
          if (__pw >= 40) {
            const __ff  = (__cs.fontFamily.split(",")[0] || "Geist").replace(/["']/g,"").trim();
            const __fw  = parseInt(__cs.fontWeight) || 700;
            const __fit = window.__hyperframes.fitTextFontSize(text, {
              maxWidth: __pw * 0.96, fontFamily: __ff, fontWeight: __fw,
            });
            if (__fit && __fit < __cur) typedEl.style.fontSize = __fit + "px";
          }
        } catch (e) {}
      }

      tl.to(counter, {
        v: text.length, duration: TYPE_D, ease: "none",
        snap: { v: 1 },
        onUpdate: () => { typedEl.textContent = text.slice(0, Math.floor(counter.v)); }
      }, 0.35);
      tl.call(() => cursor.classList.add("blink"), [], 0.35 + TYPE_D);
      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
