<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-pro-tip-23-tb
  Tareabox Hyperframes Effect
  Description: Typography-only pro tip — badge slides in, tip text reveals line by line with a glowing left accent bar.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-pro-tip-23-tb" data-composition-id="text-pro-tip-23-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-pro-tip-23-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --tip-badge:   "Pro Tip";
      --tip-heading: "Use keyboard shortcuts to speed up your workflow";
      --tip-body:    "Press Cmd+K to open the command palette. From there you can navigate to any file, run any action, and trigger most features without ever touching the mouse.";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-pro-tip-23-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-pro-tip-23-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-pro-tip-23-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      padding: 0 10%;
    }
    [data-composition-id="text-pro-tip-23-tb"] .content {
      display: flex; gap: 0;
      width: 62%;
    }
    [data-composition-id="text-pro-tip-23-tb"] .glow-bar {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      margin-right: 4vmin;
      background: var(--tb-accent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--tb-accent) 70%, transparent),
                  0 0 28px color-mix(in srgb, var(--tb-accent) 35%, transparent);
      transform-origin: top;
    }
    [data-composition-id="text-pro-tip-23-tb"] .text-block {
      display: flex; flex-direction: column; gap: 2.8vmin;
    }
    [data-composition-id="text-pro-tip-23-tb"] .badge {
      display: inline-flex; align-items: center; gap: 1.2vmin;
      padding: 0.5vmin 1.4vmin;
      border-radius: 6px;
      background: color-mix(in srgb, var(--tb-accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 40%, transparent);
      font-size: clamp(18px, 3vmin, 32px);
      font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--tb-accent);
      width: fit-content;
      opacity: 0;
    }
    [data-composition-id="text-pro-tip-23-tb"] .badge svg {
      width: 1.4vmin; height: 1.4vmin;
      stroke: var(--tb-accent);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    [data-composition-id="text-pro-tip-23-tb"] .tip-heading {
      font-size: clamp(23px, 4vmin, 46px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.25;
      color: var(--tb-text);
      opacity: 0;
    }
    [data-composition-id="text-pro-tip-23-tb"] .tip-body {
      font-size: clamp(21px, 3.5vmin, 27px);
      font-weight: 400;
      line-height: 1.65;
      color: var(--tb-text-dim);
      opacity: 0;
    }
    [data-composition-id="text-pro-tip-23-tb"] .bg-glow {
      position: absolute;
      left: 6%; top: 20%; bottom: 20%;
      width: 30%;
      border-radius: 50%;
      background: radial-gradient(ellipse, color-mix(in srgb, var(--tb-accent) 4%, transparent) 0%, transparent 70%);
      filter: blur(40px);
      opacity: 0;
      pointer-events: none;
    }
</style>

    <div class="bg-glow"  id="pt23-glow"></div>
    <div class="stage">
      <div class="content">
        <div class="glow-bar" id="pt23-bar"></div>
        <div class="text-block">
          <div class="badge" id="pt23-badge">
            <svg viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="6"/>
              <line x1="8" y1="7" x2="8" y2="11"/>
              <circle cx="8" cy="5" r="0.5" fill="currentColor" stroke="none"/>
            </svg>
            <span id="pt23-badge-text"></span>
          </div>
          <div class="tip-heading" id="pt23-heading"></div>
          <div class="tip-body"    id="pt23-body"></div>
        </div>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-pro-tip-23-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-pro-tip-23-tb"]');
      const cs   = getComputedStyle(root);

      root.querySelector("#pt23-badge-text").textContent = cs.getPropertyValue("--tip-badge").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#pt23-heading").textContent    = cs.getPropertyValue("--tip-heading").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#pt23-body").textContent       = cs.getPropertyValue("--tip-body").trim().replace(/^["']|["']$/g,"");

      const bar     = root.querySelector("#pt23-bar");
      const badge   = root.querySelector("#pt23-badge");
      const heading = root.querySelector("#pt23-heading");
      const body    = root.querySelector("#pt23-body");
      const glow    = root.querySelector("#pt23-glow");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      gsap.set(bar, { scaleY: 0 });

      tl.to(glow, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.05);

      tl.to(bar, { scaleY: 1, duration: 0.5, ease: "expo.out" }, 0.15);

      tl.to(badge, { opacity: 1, duration: 0.3, ease: "back.out(2)" }, 0.25);
      tl.from(badge, { scale: 0.8, x: -10, duration: 0.3, ease: "back.out(2)" }, 0.25);

      tl.to(heading, { opacity: 1, duration: 0.45, ease: "power2.out" }, 0.45);
      tl.from(heading, { y: 16, duration: 0.45, ease: "power2.out" }, 0.45);

      tl.to(body, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);
      tl.from(body, { y: 12, duration: 0.4, ease: "power2.out" }, 0.7);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
