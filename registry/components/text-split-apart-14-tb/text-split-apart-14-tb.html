<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-split-apart-14-tb
  Tareabox Hyperframes Effect
  Description: Words converge from outside to form a phrase, hold, then explode apart.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-split-apart-14-tb" data-composition-id="text-split-apart-14-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-split-apart-14-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #ef4444);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --word1: "BREAK";
      --word2: "THE";
      --word3: "RULES";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-split-apart-14-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-split-apart-14-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-split-apart-14-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 0.2em;
    }
    [data-composition-id="text-split-apart-14-tb"] .word {
      font-size: clamp(48px, 9.5vmin, 114px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      overflow: hidden;
    }
    [data-composition-id="text-split-apart-14-tb"] .word:nth-child(1) { color: var(--tb-text); }
    [data-composition-id="text-split-apart-14-tb"] .word:nth-child(2) { color: var(--tb-accent); font-size: clamp(32px, 6vmin, 72px); }
    [data-composition-id="text-split-apart-14-tb"] .word:nth-child(3) { color: var(--tb-text); }
</style>

    <div class="stage">
      <div class="word" id="sp14-w1"></div>
      <div class="word" id="sp14-w2"></div>
      <div class="word" id="sp14-w3"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-split-apart-14-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-split-apart-14-tb"]');
      const cs   = getComputedStyle(root);
      const w1   = root.querySelector("#sp14-w1");
      const w2   = root.querySelector("#sp14-w2");
      const w3   = root.querySelector("#sp14-w3");

      w1.textContent = cs.getPropertyValue("--word1").trim().replace(/^["']|["']$/g, "");
      w2.textContent = cs.getPropertyValue("--word2").trim().replace(/^["']|["']$/g, "");
      w3.textContent = cs.getPropertyValue("--word3").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      // Converge from outside
      tl.from(w1, { x: -300, opacity: 0, duration: 0.55, ease: "expo.out" }, 0.1);
      tl.from(w2, { y: -80,  opacity: 0, duration: 0.45, ease: "back.out(2)" }, 0.25);
      tl.from(w3, { x:  300, opacity: 0, duration: 0.55, ease: "expo.out" }, 0.1);

      // Hold assembled — then explode apart on final scene
      tl.to(w1, { x: -400, opacity: 0, rotation: -8,  duration: 0.45, ease: "power3.in" }, 2.8);
      tl.to(w2, { y:  200, opacity: 0, scale: 0.6,    duration: 0.4,  ease: "power3.in" }, 2.85);
      tl.to(w3, { x:  400, opacity: 0, rotation:  8,  duration: 0.45, ease: "power3.in" }, 2.8);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
