<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-morph-06-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — One word dissolves into another through a blur-cross-fade morph.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"wordFrom","type":"string","label":"Word From","default":"PROBLEM"},
  {"id":"wordTo","type":"string","label":"Word To","default":"SOLUTION"},
  {"id":"accent","type":"color","label":"Accent color","default":"#10b981"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#040a08"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-morph-06-tb-v" data-composition-id="text-morph-06-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3.5">
<style>
    [data-composition-id="text-morph-06-tb-v"] {
      --tb-bg:           #040a08;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --word-from: "PROBLEM";
      --word-to:   "SOLUTION";
    }
    [data-composition-id="text-morph-06-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-morph-06-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-morph-06-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0 6%;
    }
    [data-composition-id="text-morph-06-tb-v"] .word {
      position: absolute;
      left: 0; right: 0; padding: 0 6%;
      font-size: clamp(72px, 17vmin, 200px);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-align: center;
      overflow: hidden;
    }
    [data-composition-id="text-morph-06-tb-v"] #m06v-from { color: var(--tb-text); }
    [data-composition-id="text-morph-06-tb-v"] #m06v-to {
      color: var(--tb-accent);
      opacity: 0;
      filter: blur(20px);
    }
    [data-composition-id="text-morph-06-tb-v"] .underline {
      position: absolute;
      bottom: 38%;
      height: 5px; width: 0;
      background: var(--tb-accent);
      border-radius: 2px;
    }
</style>

    <div class="stage">
      <div class="word" id="m06v-from"></div>
      <div class="word" id="m06v-to"></div>
    </div>
    <div class="underline" id="m06v-line"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-morph-06-tb-v"] = (function () {
      const root   = document.querySelector('[data-composition-id="text-morph-06-tb-v"]');
      const cs     = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--word-from", V.wordFrom);
      setStr("--word-to",   V.wordTo);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const fromEl = root.querySelector("#m06v-from");
      const toEl   = root.querySelector("#m06v-to");
      const lineEl = root.querySelector("#m06v-line");

      fromEl.textContent = cs.getPropertyValue("--word-from").trim().replace(/^["']|["']$/g, "");
      toEl.textContent   = cs.getPropertyValue("--word-to").trim().replace(/^["']|["']$/g, "");

      /* Dynamic font fit per HyperFrames skill recommendation
         (src: hyperframes/dist/skills/hyperframes/SKILL.md, line 366).
         Falls back to CSS clamp if running outside HyperFrames runtime. */
      const FRAME_W = 1080, INNER_PCT = 0.88;  /* 6% padding each side */
      const MAX_W = FRAME_W * INNER_PCT;
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        [fromEl, toEl].forEach((el) => {
          const fitted = window.__hyperframes.fitTextFontSize(el.textContent, {
            maxWidth: MAX_W,
            fontFamily: "Geist",
            fontWeight: 900,
          });
          el.style.fontSize = fitted + "px";
        });
      }

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      tl.from(fromEl, { opacity: 0, filter: "blur(16px)", duration: 0.5, ease: "power2.out" }, 0.1);

      // morph crossfade
      tl.to(fromEl, { opacity: 0, filter: "blur(20px)", scale: 1.05, duration: 0.55, ease: "power2.in" }, 1.3);
      tl.to(toEl,   { opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "power2.out" }, 1.5);

      // underline draws under final word
      tl.to(lineEl, { width: "30%", left: "35%", duration: 0.4, ease: "power3.out" }, 2.2);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
