<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-warp-diagonal-wave-10-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Text flows along a diagonal wave SVG path, sliding top-to-bottom.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"headline","type":"string","label":"Headline","default":"RENDER NOW"},
  {"id":"label","type":"string","label":"Label","default":""},
  {"id":"accent","type":"color","label":"Accent color","default":"#06b6d4"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#080810"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-warp-diagonal-wave-10-tb-v" data-composition-id="text-warp-diagonal-wave-10-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="7">
<style>
    [data-composition-id="text-warp-diagonal-wave-10-tb-v"] {
      --tb-bg:           #0e0e10;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #06b6d4);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "RENDER NOW";
      --label:    "";
    }
    [data-composition-id="text-warp-diagonal-wave-10-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-warp-diagonal-wave-10-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-warp-diagonal-wave-10-tb-v"] .label {
      position: absolute;
      top: 5%; left: 0; right: 0;
      text-align: center;
      font-size: clamp(14px, 1.8vmin, 22px);
      font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-warp-diagonal-wave-10-tb-v"] .svg-stage {
      position: absolute; inset: 0;
    }
        </style>
    <div class="label" id="dw10v-label"></div>
    <svg class="svg-stage" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="dw10v-path" d="" />
      </defs>
      <path id="dw10v-guide" fill="none" stroke="white" stroke-width="2" opacity="0.06" d="" />
      <text font-weight="700" opacity="0" id="dw10v-text">
        <textPath href="#dw10v-path" id="dw10v-tp" startOffset="5%"></textPath>
      </text>
    </svg>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-warp-diagonal-wave-10-tb-v"] = (function () {
      const root     = document.querySelector('[data-composition-id="text-warp-diagonal-wave-10-tb-v"]');
      const cs       = getComputedStyle(root);
      const labelEl  = root.querySelector("#dw10v-label");
      const pathEl   = root.querySelector("#dw10v-path");
      const guideEl  = root.querySelector("#dw10v-guide");
      const textEl   = root.querySelector("#dw10v-text");
      const tpEl     = root.querySelector("#dw10v-tp");

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--headline", V.headline);
      setStr("--label",    V.label);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const headline = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label    = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      const accent   = cs.getPropertyValue("--tb-accent").trim();
      labelEl.textContent = label;
      tpEl.textContent    = headline;

      /* Dynamic font fit per HyperFrames skill (SKILL.md:366) — shrink only */
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        [
              labelEl,
              tpEl
        ].forEach((__el) => {
          try {
            if (!__el || !__el.textContent || !__el.parentElement) return;
            const __cs = getComputedStyle(__el);
            const __cur = parseFloat(__cs.fontSize);
            const __pw  = __el.parentElement.getBoundingClientRect().width || 0;
            if (__pw < 40) return;
            const __ff  = (__cs.fontFamily.split(",")[0] || "Geist").replace(/["\']/g,"").trim();
            const __fw  = parseInt(__cs.fontWeight) || 700;
            const __fit = window.__hyperframes.fitTextFontSize(__el.textContent, {
              maxWidth: __pw * 0.96, fontFamily: __ff, fontWeight: __fw,
            });
            if (__fit && __fit < __cur) __el.style.fontSize = __fit + "px";
          } catch (e) {}
        });
      }

      const W = 1080, H = 1920, SEGS = 60;

      function buildWavePath(amplitude) {
        // Diagonal top-left → bottom-right with horizontal wave perpendicular
        const sx = 180, sy = 260, ex = W - 180, ey = H - 280;
        const dx = ex - sx, dy = ey - sy;
        const len = Math.sqrt(dx*dx + dy*dy);
        const px = -dy/len, py = dx/len;
        const pts = [];
        for (let i = 0; i <= SEGS; i++) {
          const t = i / SEGS;
          const bx = sx + dx*t, by = sy + dy*t;
          const w = Math.sin(t * Math.PI * 2.8) * amplitude;
          pts.push([bx + px*w, by + py*w]);
        }
        let d = `M ${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
        for (let i = 1; i < pts.length - 1; i++) {
          const mx = (pts[i][0]+pts[i+1][0])/2, my = (pts[i][1]+pts[i+1][1])/2;
          d += ` Q ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)} ${mx.toFixed(1)},${my.toFixed(1)}`;
        }
        const l = pts[pts.length-1];
        d += ` L ${l[0].toFixed(1)},${l[1].toFixed(1)}`;
        return d;
      }

      const staticPath = buildWavePath(90);
      pathEl.setAttribute("d", staticPath);
      guideEl.setAttribute("d", staticPath);

      const fontSize = Math.round(W * 0.10);
      textEl.setAttribute("font-size", fontSize);
      textEl.setAttribute("fill", "white");

      const TOTAL = 7;
      const tl = gsap.timeline({ paused: true });
      const state = { offset: -55, amp: 0 };
      tl.to(labelEl, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.1);
      tl.to(textEl,  { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.25);

      // Wave forms first (amp 0 → 90 only once, stays after)
      tl.to(state, {
        amp: 90, duration: 0.4, ease: "power2.out",
        onUpdate: () => {
          const d = buildWavePath(state.amp);
          pathEl.setAttribute("d", d);
          guideEl.setAttribute("d", d);
        }
      }, 0.1);

      // Forward: slow & readable across the wave
      tl.to(state, {
        offset: 110, duration: 4.5, ease: "power1.inOut",
        onUpdate: () => { tpEl.setAttribute("startOffset", state.offset + "%"); }
      }, 0.4);

      // Bounce back: snappier exit by the same way it came
      tl.to(state, {
        offset: -55, duration: 1.8, ease: "power2.in",
        onUpdate: () => { tpEl.setAttribute("startOffset", state.offset + "%"); }
      }, ">+0.15");

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
