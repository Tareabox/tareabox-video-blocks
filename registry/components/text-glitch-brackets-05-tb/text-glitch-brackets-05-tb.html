<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-glitch-brackets-05-tb
  Description: Text reveals through real glitch — RGB split (chromatic aberration), slice tearing,
  scanlines, sustained flicker loop. Framed by animated corner brackets.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@500;700&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-glitch-brackets-05-tb" data-composition-id="text-glitch-brackets-05-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-glitch-brackets-05-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #f97316);
      --tb-glitch-cyan:  #00fff0;
      --tb-glitch-magenta: #ff00aa;
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "SYSTEM ERROR";
      --label:    "[ OVERRIDE ]";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-glitch-brackets-05-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-glitch-brackets-05-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Scanlines overlay sutil */
    [data-composition-id="text-glitch-brackets-05-tb"] .scanlines {
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          rgba(255,255,255,0.03) 2px,
          rgba(255,255,255,0.03) 3px
        );
      pointer-events: none;
      z-index: 5;
      opacity: 0.6;
    }

    [data-composition-id="text-glitch-brackets-05-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
    }
    [data-composition-id="text-glitch-brackets-05-tb"] .label {
      font-family: "Geist Mono", monospace;
      font-size: clamp(16px, 1.8vmin, 24px);
      font-weight: 700; letter-spacing: 0.25em;
      color: var(--tb-accent);
      opacity: 0;
    }

    /* Headline · 3 capas apiladas para RGB split */
    [data-composition-id="text-glitch-brackets-05-tb"] .head-stack {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="text-glitch-brackets-05-tb"] .headline,
    [data-composition-id="text-glitch-brackets-05-tb"] .head-cyan,
    [data-composition-id="text-glitch-brackets-05-tb"] .head-magenta {
      font-size: clamp(48px, 9vmin, 108px);
      font-weight: 900;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1;
      white-space: nowrap;
    }
    [data-composition-id="text-glitch-brackets-05-tb"] .head-cyan,
    [data-composition-id="text-glitch-brackets-05-tb"] .head-magenta {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      mix-blend-mode: screen;
      pointer-events: none;
      opacity: 0;
    }
    [data-composition-id="text-glitch-brackets-05-tb"] .head-cyan    { color: var(--tb-glitch-cyan); }
    [data-composition-id="text-glitch-brackets-05-tb"] .head-magenta { color: var(--tb-glitch-magenta); }
    [data-composition-id="text-glitch-brackets-05-tb"] .headline    {
      color: var(--tb-text);
      opacity: 0;
      position: relative;
      z-index: 2;
    }

    /* Slice overlay — copia del texto que se "rompe" en una banda horizontal */
    [data-composition-id="text-glitch-brackets-05-tb"] .head-slice {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      font-size: clamp(48px, 9vmin, 108px);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--tb-text);
      white-space: nowrap;
      clip-path: inset(38% 0 48% 0);
      pointer-events: none;
      opacity: 0;
      z-index: 3;
    }

    /* Brackets frame */
    [data-composition-id="text-glitch-brackets-05-tb"] .bracket-frame {
      position: absolute;
      width: 72%; height: 60%;
      top: 20%; left: 14%;
    }
    [data-composition-id="text-glitch-brackets-05-tb"] .corner {
      position: absolute;
      width: 44px; height: 44px;
      border-color: var(--tb-accent);
      border-style: solid;
      opacity: 0;
    }
    [data-composition-id="text-glitch-brackets-05-tb"] .tl { top: 0; left: 0;   border-width: 4px 0 0 4px; }
    [data-composition-id="text-glitch-brackets-05-tb"] .tr { top: 0; right: 0;  border-width: 4px 4px 0 0; }
    [data-composition-id="text-glitch-brackets-05-tb"] .bl { bottom: 0; left: 0;  border-width: 0 0 4px 4px; }
    [data-composition-id="text-glitch-brackets-05-tb"] .br { bottom: 0; right: 0; border-width: 0 4px 4px 0; }

    /* Noise flash full-screen para hits fuertes */
    [data-composition-id="text-glitch-brackets-05-tb"] .flash {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.06);
      mix-blend-mode: screen;
      opacity: 0;
      z-index: 6;
      pointer-events: none;
    }
</style>


    <div class="bracket-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <div class="stage">
      <div class="label" id="gb05-label"></div>
      <div class="head-stack">
        <span class="head-cyan"    id="gb05-cyan"></span>
        <span class="head-magenta" id="gb05-magenta"></span>
        <h1 class="headline"       id="gb05-head"></h1>
        <span class="head-slice"   id="gb05-slice"></span>
      </div>
    </div>

    <div class="scanlines"></div>
    <div class="flash" id="gb05-flash"></div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-glitch-brackets-05-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-glitch-brackets-05-tb"]');
      const cs   = getComputedStyle(root);
      const $    = (s) => root.querySelector(s);
      const G    = (v) => cs.getPropertyValue(v).trim().replace(/^["']|["']$/g, "");

      const headline = G("--headline");
      const label    = G("--label");
      $("#gb05-head").textContent    = headline;
      $("#gb05-cyan").textContent    = headline;
      $("#gb05-magenta").textContent = headline;
      $("#gb05-slice").textContent   = headline;
      $("#gb05-label").textContent   = label;

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      const corners = root.querySelectorAll(".corner");
      const head    = $("#gb05-head");
      const cyan    = $("#gb05-cyan");
      const magenta = $("#gb05-magenta");
      const slice   = $("#gb05-slice");
      const flash   = $("#gb05-flash");
      const labelEl = $("#gb05-label");

      /* ═══ Brackets entrada ═══ */
      tl.to(corners, { opacity: 1, duration: 0.2, stagger: 0.06, ease: "power2.out" }, 0.1);
      tl.to(corners[0], { x: -10, y: -10, duration: 0.35, ease: "power2.out" }, 0.1);
      tl.to(corners[1], { x:  10, y: -10, duration: 0.35, ease: "power2.out" }, 0.1);
      tl.to(corners[2], { x: -10, y:  10, duration: 0.35, ease: "power2.out" }, 0.1);
      tl.to(corners[3], { x:  10, y:  10, duration: 0.35, ease: "power2.out" }, 0.1);

      /* ═══ Headline reveal con glitch heavy (0.4-0.85s) ═══ */
      // Pre-flash
      tl.to(flash, { opacity: 0.5, duration: 0.04 }, 0.42);
      tl.to(flash, { opacity: 0,   duration: 0.06 }, 0.46);

      // RGB split flicker — capas aparecen y vuelan
      tl.to(cyan,    { opacity: 0.85, x: -22, duration: 0.05 }, 0.45);
      tl.to(magenta, { opacity: 0.85, x:  22, duration: 0.05 }, 0.45);
      tl.to(head,    { opacity: 1, duration: 0.05 }, 0.48);

      // Snap back
      tl.to(cyan,    { x: -3, opacity: 0.4, duration: 0.08 }, 0.55);
      tl.to(magenta, { x:  3, opacity: 0.4, duration: 0.08 }, 0.55);

      /* ═══ Glitch hits sostenidos durante el hold ═══ */
      // Helper para crear un glitch hit
      function glitchHit(at, intensity) {
        const offset = 18 * intensity;
        const sliceShift = 12 * intensity;
        // Hit
        tl.to(head,    { x:  offset * 0.4, skewX:  3 * intensity, duration: 0.04, ease: "none" }, at);
        tl.to(cyan,    { x: -offset, opacity: 0.85, duration: 0.04, ease: "none" }, at);
        tl.to(magenta, { x:  offset, opacity: 0.85, duration: 0.04, ease: "none" }, at);
        tl.to(slice,   { x:  sliceShift, opacity: 1, duration: 0.04, ease: "none" }, at);
        tl.to(flash,   { opacity: 0.25 * intensity, duration: 0.03 }, at);
        // Recovery
        tl.to(head,    { x: 0, skewX: 0, duration: 0.07, ease: "none" }, at + 0.05);
        tl.to(cyan,    { x: -3, opacity: 0.4, duration: 0.07, ease: "none" }, at + 0.05);
        tl.to(magenta, { x:  3, opacity: 0.4, duration: 0.07, ease: "none" }, at + 0.05);
        tl.to(slice,   { x: 0, opacity: 0, duration: 0.07, ease: "none" }, at + 0.05);
        tl.to(flash,   { opacity: 0, duration: 0.07 }, at + 0.05);
      }

      // Secuencia de hits — patrón irregular pero determinístico
      glitchHit(0.95, 0.6);   // pequeño
      glitchHit(1.30, 1.2);   // grande
      glitchHit(1.65, 0.4);   // mini
      glitchHit(1.95, 0.9);   // medio
      glitchHit(2.40, 1.4);   // pico
      glitchHit(2.75, 0.5);   // colita

      /* Label aparece después del primer reveal */
      tl.to(labelEl, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.85);
      // Label también flickea ligero en cada hit grande
      tl.to(labelEl, { opacity: 0.3, duration: 0.04, yoyo: true, repeat: 1 }, 1.30);
      tl.to(labelEl, { opacity: 0.3, duration: 0.04, yoyo: true, repeat: 1 }, 2.40);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
