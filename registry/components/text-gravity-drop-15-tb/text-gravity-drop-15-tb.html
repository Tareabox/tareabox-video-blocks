<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-gravity-drop-15-tb
  Tareabox Hyperframes Effect
  Description: Words crash down from above frame with a snappy gravity fall and bounce landing.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-gravity-drop-15-tb" data-composition-id="text-gravity-drop-15-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-gravity-drop-15-tb"] {
      --tb-bg:           #080c14;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --line1: "GRAVITY";
      --line2: "PULLS";
      --line3: "EVERYTHING";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-gravity-drop-15-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-gravity-drop-15-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-gravity-drop-15-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
    }
    [data-composition-id="text-gravity-drop-15-tb"] .word {
      font-size: clamp(52px, 10vmin, 120px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--tb-text);
    }
    [data-composition-id="text-gravity-drop-15-tb"] .word.accent {
      color: var(--tb-accent);
    }
    [data-composition-id="text-gravity-drop-15-tb"] .impact-line {
      width: 70%;
      height: 4px;
      background: var(--tb-accent);
      transform-origin: center;
      transform: scaleX(0);
      margin-top: 10px;
    }
</style>

    <div class="stage">
      <div class="word" id="gd15-w1"></div>
      <div class="word accent" id="gd15-w2"></div>
      <div class="word" id="gd15-w3"></div>
      <div class="impact-line" id="gd15-line"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-gravity-drop-15-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-gravity-drop-15-tb"]');
      const cs   = getComputedStyle(root);
      const w1   = root.querySelector("#gd15-w1");
      const w2   = root.querySelector("#gd15-w2");
      const w3   = root.querySelector("#gd15-w3");
      const line = root.querySelector("#gd15-line");

      w1.textContent = cs.getPropertyValue("--line1").trim().replace(/^["']|["']$/g, "");
      w2.textContent = cs.getPropertyValue("--line2").trim().replace(/^["']|["']$/g, "");
      w3.textContent = cs.getPropertyValue("--line3").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      // Words fall in from above with bounce
      tl.from(w1, { y: -700, duration: 0.75, ease: "bounce.out" }, 0.05);
      tl.from(w2, { y: -700, duration: 0.75, ease: "bounce.out" }, 0.28);
      tl.from(w3, { y: -700, duration: 0.75, ease: "bounce.out" }, 0.51);

      // Impact line snaps in after last word lands
      tl.to(line, { scaleX: 1, duration: 0.3, ease: "power4.out" }, 1.25);

      // Subtle scale pulse on line
      tl.to(line, { scaleX: 1.08, duration: 0.12, ease: "power2.out", yoyo: true, repeat: 1 }, 1.4);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
