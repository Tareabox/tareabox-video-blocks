<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-delete-rewrite-07-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — First phrase types out, gets deleted character by character, then a new phrase appears.
  Category: text
  Duration: 4 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"phraseA","type":"string","label":"Phrase A","default":"Manual process"},
  {"id":"phraseB","type":"string","label":"Phrase B","default":"AUTOMATED"},
  {"id":"accent","type":"color","label":"Accent color","default":"#ef4444"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-delete-rewrite-07-tb-v" data-composition-id="text-delete-rewrite-07-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="4">
<style>
    [data-composition-id="text-delete-rewrite-07-tb-v"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #ef4444);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --phrase-a: "Manual process";
      --phrase-b: "AUTOMATED";
    }
    [data-composition-id="text-delete-rewrite-07-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-delete-rewrite-07-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-delete-rewrite-07-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0 6%;
      text-align: center;
    }
    [data-composition-id="text-delete-rewrite-07-tb-v"] .headline {
      font-size: clamp(72px, 14vmin, 180px);
      font-weight: 700;
      color: var(--tb-text);
      letter-spacing: -0.03em;
      line-height: 1.1;
      min-height: 1.2em;
      overflow: hidden;
      text-align: center;
    }
    [data-composition-id="text-delete-rewrite-07-tb-v"] .headline.phase-b {
      color: var(--tb-accent);
      font-weight: 900;
      font-size: clamp(72px, 13.5vmin, 170px);
    }
    [data-composition-id="text-delete-rewrite-07-tb-v"] .cursor {
      display: inline-block;
      width: 0.055em; height: 0.88em;
      background: var(--tb-accent);
      margin-left: 0.05em;
      vertical-align: text-bottom;
      transform: translateY(0.05em);
    }
    [data-composition-id="text-delete-rewrite-07-tb-v"] .cursor.blink {
      animation: dr07v-blink 0.5s steps(2, end) infinite;
    }
    @keyframes dr07v-blink { 50% { opacity: 0; } }
    [data-composition-id="text-delete-rewrite-07-tb-v"] .strikethrough {
      position: absolute; top: 50%; left: 6%;
      height: 3px; width: 0;
      background: var(--tb-accent);
      transform: translateY(-50%);
    }
</style>

    <div class="stage">
      <h1 class="headline"><span class="typed"></span><span class="cursor"></span></h1>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-delete-rewrite-07-tb-v"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-delete-rewrite-07-tb-v"]');
      const cs      = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--phrase-a",  V.phraseA);
      setStr("--phrase-b",  V.phraseB);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const typedEl = root.querySelector(".typed");
      const cursor  = root.querySelector(".cursor");
      const headEl  = root.querySelector(".headline");
      const phraseA = cs.getPropertyValue("--phrase-a").trim().replace(/^["']|["']$/g, "");
      const phraseB = cs.getPropertyValue("--phrase-b").trim().replace(/^["']|["']$/g, "");
      const TOTAL = 4;

      const TYPE_A  = 0.9;
      const HOLD_A  = 0.5;
      const DEL_A   = 0.7;
      const TYPE_B  = 0.8;

      typedEl.textContent = "";
      const cA = { v: 0 };
      const cB = { v: 0 };

      const tl = gsap.timeline({ paused: true });

      // Type phrase A
      tl.to(cA, {
        v: phraseA.length, duration: TYPE_A, ease: "none", snap: { v: 1 },
        onUpdate: () => { typedEl.textContent = phraseA.slice(0, Math.floor(cA.v)); }
      }, 0.1);

      // Hold A then delete
      tl.call(() => cursor.classList.add("blink"), [], 0.1 + TYPE_A);
      const startDel = 0.1 + TYPE_A + HOLD_A;
      tl.call(() => cursor.classList.remove("blink"), [], startDel);
      tl.to(cA, {
        v: 0, duration: DEL_A, ease: "none", snap: { v: 1 },
        onUpdate: () => { typedEl.textContent = phraseA.slice(0, Math.floor(cA.v)); }
      }, startDel);

      // Switch to phrase B style, type it
      const startB = startDel + DEL_A + 0.1;
      tl.call(() => headEl.classList.add("phase-b"), [], startB);
      tl.to(cB, {
        v: phraseB.length, duration: TYPE_B, ease: "none", snap: { v: 1 },
        onUpdate: () => { typedEl.textContent = phraseB.slice(0, Math.floor(cB.v)); }
      }, startB);
      tl.call(() => cursor.classList.add("blink"), [], startB + TYPE_B);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
