<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-morph-06-tb
  Tareabox Hyperframes Effect
  Description: One word dissolves into another through a blur-cross-fade morph.
  Category: text
  Duration: 3.5 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-morph-06-tb" data-composition-id="text-morph-06-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3.5">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-morph-06-tb"] {
      --tb-bg:           #040a08;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #10b981);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --word-from: "PROBLEM";
      --word-to:   "SOLUTION";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-morph-06-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-morph-06-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-morph-06-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="text-morph-06-tb"] .word {
      position: absolute;
      left: 0; right: 0; padding: 0 6%;
      font-size: clamp(48px, 9vmin, 110px);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-align: center;
      overflow: hidden;
    }
    [data-composition-id="text-morph-06-tb"] #m06-from { color: var(--tb-text); }
    [data-composition-id="text-morph-06-tb"] #m06-to {
      color: var(--tb-accent);
      opacity: 0;
      filter: blur(20px);
    }
    [data-composition-id="text-morph-06-tb"] .underline {
      position: absolute;
      bottom: 32%;
      height: 4px; width: 0;
      background: var(--tb-accent);
      border-radius: 2px;
    }
</style>

    <div class="stage">
      <div class="word" id="m06-from"></div>
      <div class="word" id="m06-to"></div>
    </div>
    <div class="underline" id="m06-line"></div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-morph-06-tb"] = (function () {
      const root   = document.querySelector('[data-composition-id="text-morph-06-tb"]');
      const cs     = getComputedStyle(root);
      const fromEl = root.querySelector("#m06-from");
      const toEl   = root.querySelector("#m06-to");
      const lineEl = root.querySelector("#m06-line");

      fromEl.textContent = cs.getPropertyValue("--word-from").trim().replace(/^["']|["']$/g, "");
      toEl.textContent   = cs.getPropertyValue("--word-to").trim().replace(/^["']|["']$/g, "");

      /* Dynamic font fit per HyperFrames skill recommendation
         (src: hyperframes/dist/skills/hyperframes/SKILL.md, line 366).
         Falls back to CSS clamp if running outside HyperFrames runtime. */
      const FRAME_W = 1920, INNER_PCT = 0.88;
      const MAX_W = FRAME_W * INNER_PCT;
      if (window.__hyperframes && window.__hyperframes.fitTextFontSize) {
        [fromEl, toEl].forEach((el) => {
          const fitted = window.__hyperframes.fitTextFontSize(el.textContent, {
            maxWidth: MAX_W,
            fontFamily: "Geist",
            fontWeight: 900,
          });
          el.style.fontSize = fitted + "px";
        });
      }

      const TOTAL = 3.5;
      const tl = gsap.timeline({ paused: true });

      tl.from(fromEl, { opacity: 0, filter: "blur(16px)", duration: 0.5, ease: "power2.out" }, 0.1);

      // morph crossfade
      tl.to(fromEl, { opacity: 0, filter: "blur(20px)", scale: 1.05, duration: 0.55, ease: "power2.in" }, 1.3);
      tl.to(toEl,   { opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "power2.out" }, 1.5);

      // underline draws under final word
      tl.to(lineEl, { width: "30%", left: "35%", duration: 0.4, ease: "power3.out" }, 2.2);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
