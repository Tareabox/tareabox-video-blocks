<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-typewriter-light-02-tb
  Tareabox Hyperframes Effect
  Description: Headline types out on a clean light background with a bold underline cursor.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-typewriter-light-02-tb" data-composition-id="text-typewriter-light-02-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-light-02-tb"] {
      --tb-bg:           #f0ede8;
      --tb-text:         #111111;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #2563eb);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline:        "Your headline here";
      --label:           "Typewriter";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-typewriter-light-02-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-typewriter-light-02-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-typewriter-light-02-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 8% 12%; gap: 20px;
    }
    [data-composition-id="text-typewriter-light-02-tb"] .label {
      font-size: clamp(10px, 1.1vmin, 13px);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-typewriter-light-02-tb"] .headline {
      font-size: clamp(36px, 7vmin, 84px);
      font-weight: 800;
      color: var(--tb-text);
      line-height: 1.08;
      letter-spacing: -0.04em;
      max-width: 85%;
      overflow: hidden;
    }
    [data-composition-id="text-typewriter-light-02-tb"] .cursor {
      display: inline-block;
      width: 0.55em; height: 0.08em;
      background: var(--tb-accent);
      margin-left: 0.04em;
      vertical-align: baseline;
      transform: translateY(-0.1em);
    }
    [data-composition-id="text-typewriter-light-02-tb"] .cursor.blink {
      animation: tw-l02-blink 0.6s steps(2, end) infinite;
    }
    @keyframes tw-l02-blink { 50% { opacity: 0; } }
    [data-composition-id="text-typewriter-light-02-tb"] .accent-bar {
      width: 48px; height: 4px;
      background: var(--tb-accent);
      border-radius: 2px;
      transform-origin: left;
      transform: scaleX(0);
    }
</style>

    <div class="stage">
      <div class="accent-bar"></div>
      <div class="label"></div>
      <h1 class="headline"><span class="typed"></span><span class="cursor"></span></h1>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-typewriter-light-02-tb"] = (function () {
      const root    = document.querySelector('[data-composition-id="text-typewriter-light-02-tb"]');
      const typedEl = root.querySelector(".typed");
      const cursor  = root.querySelector(".cursor");
      const labelEl = root.querySelector(".label");
      const barEl   = root.querySelector(".accent-bar");
      const cs      = getComputedStyle(root);
      const text    = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label   = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      const TOTAL   = 3;
      const TYPE_D  = 1.75;

      root.querySelector(".headline").setAttribute("aria-label", text);
      labelEl.textContent = label;
      typedEl.textContent = "";

      const tl = gsap.timeline({ paused: true });
      const counter = { v: 0 };

      tl.to(barEl, { scaleX: 1, duration: 0.35, ease: "power3.out" }, 0.05);
      tl.to(labelEl, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.2);
      tl.to(counter, {
        v: text.length, duration: TYPE_D, ease: "none",
        snap: { v: 1 },
        onUpdate: () => { typedEl.textContent = text.slice(0, Math.floor(counter.v)); }
      }, 0.35);
      tl.call(() => cursor.classList.add("blink"), [], 0.35 + TYPE_D);
      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
