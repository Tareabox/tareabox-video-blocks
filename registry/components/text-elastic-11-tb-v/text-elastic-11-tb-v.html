<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-elastic-11-tb-v (vertical 1080x1920)
  Tareabox Hyperframes Effect
  Description: Vertical 9:16 — Words snap in with an elastic overshoot bounce, one after another.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en" data-composition-variables='[
  {"id":"line1","type":"string","label":"Line 1","default":"MOVE FAST"},
  {"id":"line2","type":"string","label":"Line 2","default":"BREAK LIMITS"},
  {"id":"accent","type":"color","label":"Accent color","default":"#f97316"},
  {"id":"bg","type":"string","label":"Background (color or \"transparent\")","default":"#0a0a0a"}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-elastic-11-tb-v" data-composition-id="text-elastic-11-tb-v"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="3">
<style>
    [data-composition-id="text-elastic-11-tb-v"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #f97316);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --line1: "MOVE FAST";
      --line2: "BREAK LIMITS";
    }
    [data-composition-id="text-elastic-11-tb-v"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-elastic-11-tb-v"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-elastic-11-tb-v"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      padding: 0 6%;
    }
    [data-composition-id="text-elastic-11-tb-v"] .line {
      font-size: clamp(64px, 13vmin, 160px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      overflow: hidden;
      text-align: center;
    }
    [data-composition-id="text-elastic-11-tb-v"] .line:first-child { color: var(--tb-text); }
    [data-composition-id="text-elastic-11-tb-v"] .line:last-child  { color: var(--tb-accent); }
    [data-composition-id="text-elastic-11-tb-v"] .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--tb-accent);
      margin: 10px auto;
      opacity: 0; transform: scale(0);
    }
</style>

    <div class="stage">
      <div class="line" id="el11v-l1"></div>
      <div class="dot"  id="el11v-dot"></div>
      <div class="line" id="el11v-l2"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-elastic-11-tb-v"] = (function () {
      const root = document.querySelector('[data-composition-id="text-elastic-11-tb-v"]');
      const cs   = getComputedStyle(root);

      const V = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const setStr = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, '"' + String(val) + '"');
      };
      const setRaw = (cssVar, val) => {
        if (val !== undefined && val !== null && val !== "")
          root.style.setProperty(cssVar, String(val));
      };
      setStr("--line1",     V.line1);
      setStr("--line2",     V.line2);
      setRaw("--tb-accent", V.accent);
      setRaw("--tb-bg",     V.bg);

      const l1   = root.querySelector("#el11v-l1");
      const l2   = root.querySelector("#el11v-l2");
      const dot  = root.querySelector("#el11v-dot");

      l1.textContent = cs.getPropertyValue("--line1").trim().replace(/^["']|["']$/g, "");
      l2.textContent = cs.getPropertyValue("--line2").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      tl.from(l1,  { y: -80, opacity: 0, scaleY: 1.3, duration: 0.7, ease: "elastic.out(1, 0.5)" }, 0.1);
      tl.to(dot,   { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2.5)" }, 0.55);
      tl.from(l2,  { y:  80, opacity: 0, scaleY: 1.3, duration: 0.7, ease: "elastic.out(1, 0.5)" }, 0.65);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
