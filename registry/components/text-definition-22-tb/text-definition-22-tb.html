<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-definition-22-tb
  Tareabox Hyperframes Effect
  Description: Term and definition card — term in accent color fades in, definition reveals below with a left accent border.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-definition-22-tb" data-composition-id="text-definition-22-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-definition-22-tb"] {
      --tb-bg:           #09090b;
      --tb-text:         #fafafa;
      --tb-text-dim:     #d4d4d8;
      --tb-accent:       var(--tb-brand-accent, #06b6d4);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --def-eyebrow: "Definition";
      --def-term:    "Idempotency";
      --def-body:    "An operation is idempotent if performing it multiple times produces the same result as performing it once. Critical for safe retries in distributed systems.";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-definition-22-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-definition-22-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-definition-22-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="text-definition-22-tb"] .card {
      width: 52%;
      display: flex; flex-direction: column; gap: 0;
      opacity: 0;
    }
    [data-composition-id="text-definition-22-tb"] .eyebrow-row {
      display: flex; align-items: center; gap: 1.6vmin;
      margin-bottom: 3vmin;
    }
    [data-composition-id="text-definition-22-tb"] .eyebrow-badge {
      font-size: clamp(15px, 3.5vmin, 30px);
      font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--tb-accent);
      background: color-mix(in srgb, var(--tb-accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--tb-accent) 35%, transparent);
      padding: 0.3vmin 1.1vmin; border-radius: 4px;
    }
    [data-composition-id="text-definition-22-tb"] .eyebrow-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.18);
      transform-origin: left;
    }
    [data-composition-id="text-definition-22-tb"] .term {
      font-size: clamp(42px, 7vmin, 88px);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--tb-accent);
      line-height: 1.05;
      margin-bottom: 3.5vmin;
      opacity: 0;
    }
    [data-composition-id="text-definition-22-tb"] .body-wrap {
      display: flex; gap: 0;
      overflow: hidden;
    }
    [data-composition-id="text-definition-22-tb"] .left-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--tb-accent);
      flex-shrink: 0;
      margin-right: 2.5vmin;
      transform-origin: top;
    }
    [data-composition-id="text-definition-22-tb"] .body-text {
      font-size: clamp(23px, 4vmin, 40px);
      font-weight: 400;
      line-height: 1.65;
      color: var(--tb-text-dim);
      opacity: 0;
    }
</style>

    <div class="stage">
      <div class="card" id="df22-card">
        <div class="eyebrow-row">
          <span class="eyebrow-badge" id="df22-ew"></span>
          <div  class="eyebrow-line"  id="df22-line"></div>
        </div>
        <div class="term" id="df22-term"></div>
        <div class="body-wrap">
          <div class="left-bar" id="df22-bar"></div>
          <div class="body-text" id="df22-body"></div>
        </div>
      </div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-definition-22-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-definition-22-tb"]');
      const cs   = getComputedStyle(root);

      root.querySelector("#df22-ew").textContent   = cs.getPropertyValue("--def-eyebrow").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#df22-term").textContent = cs.getPropertyValue("--def-term").trim().replace(/^["']|["']$/g,"");
      root.querySelector("#df22-body").textContent = cs.getPropertyValue("--def-body").trim().replace(/^["']|["']$/g,"");

      const card = root.querySelector("#df22-card");
      const line = root.querySelector("#df22-line");
      const term = root.querySelector("#df22-term");
      const bar  = root.querySelector("#df22-bar");
      const body = root.querySelector("#df22-body");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true });

      gsap.set(line, { scaleX: 0 });
      gsap.set(bar,  { scaleY: 0 });

      tl.to(card, { opacity: 1, duration: 0.01 }, 0.1);
      tl.from(card, { x: -24, duration: 0.5, ease: "expo.out" }, 0.1);
      tl.to(line, { scaleX: 1, duration: 0.5, ease: "expo.out" }, 0.15);

      tl.to(term, { opacity: 1, duration: 0.45, ease: "power2.out" }, 0.35);
      tl.from(term, { y: 18, duration: 0.45, ease: "power2.out" }, 0.35);

      tl.to(bar,  { scaleY: 1, duration: 0.5, ease: "expo.out" }, 0.6);
      tl.to(body, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);
      tl.from(body, { y: 10, duration: 0.4, ease: "power2.out" }, 0.7);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
