<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-kinetic-08-tb
  Tareabox Hyperframes Effect
  Description: Three bold words slam in from different directions with kinetic energy.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-kinetic-08-tb" data-composition-id="text-kinetic-08-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="3">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-kinetic-08-tb"] {
      --tb-bg:           #0a0a0a;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #facc15);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --word1: "THINK";
      --word2: "BUILD";
      --word3: "SHIP";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-kinetic-08-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-kinetic-08-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-kinetic-08-tb"] .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }
    [data-composition-id="text-kinetic-08-tb"] .word {
      font-size: clamp(56px, 11vmin, 130px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.95;
      color: var(--tb-text);
      overflow: hidden;
    }
    [data-composition-id="text-kinetic-08-tb"] .word.accent { color: var(--tb-accent); }
    [data-composition-id="text-kinetic-08-tb"] .divider {
      width: 3px; height: 0;
      background: var(--tb-accent);
      margin: 8px 0;
    }
</style>

    <div class="stage">
      <div class="word" id="k08-w1"></div>
      <div class="divider" id="k08-div"></div>
      <div class="word accent" id="k08-w2"></div>
      <div class="divider" id="k08-div2"></div>
      <div class="word" id="k08-w3"></div>
    </div>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-kinetic-08-tb"] = (function () {
      const root = document.querySelector('[data-composition-id="text-kinetic-08-tb"]');
      const cs   = getComputedStyle(root);
      const w1   = root.querySelector("#k08-w1");
      const w2   = root.querySelector("#k08-w2");
      const w3   = root.querySelector("#k08-w3");
      const divs = root.querySelectorAll(".divider");

      w1.textContent = cs.getPropertyValue("--word1").trim().replace(/^["']|["']$/g, "");
      w2.textContent = cs.getPropertyValue("--word2").trim().replace(/^["']|["']$/g, "");
      w3.textContent = cs.getPropertyValue("--word3").trim().replace(/^["']|["']$/g, "");

      const TOTAL = 3;
      const tl = gsap.timeline({ paused: true, defaults: { ease: "expo.out" } });

      tl.from(w1, { x: -120, opacity: 0, duration: 0.5 }, 0.1);
      tl.to(divs[0], { height: 24, duration: 0.25, ease: "power3.out" }, 0.4);
      tl.from(w2, { x:  120, opacity: 0, duration: 0.5 }, 0.45);
      tl.to(divs[1], { height: 24, duration: 0.25, ease: "power3.out" }, 0.75);
      tl.from(w3, { x: -120, opacity: 0, duration: 0.5 }, 0.8);

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
