<!doctype html>
<!--
  © 2026 Natalie Digital · tareabox.com · Tareabox Hyperframes Pack
  text-warp-diagonal-wave-10-tb
  Tareabox Hyperframes Effect
  Description: Text flows along a diagonal wave SVG path, sliding from start to finish.
  Category: text
  Duration: 3 seconds
  REQUIRES: gsap (CDN)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=block" rel="stylesheet" />
</head>
<body>
<div id="text-warp-diagonal-wave-10-tb" data-composition-id="text-warp-diagonal-wave-10-tb"
       data-width="1920" data-height="1080"
       data-start="0" data-duration="7">
<style>
    /* ═══════════════════════════════════════════════════════ */
    /* 🎨 CUSTOMIZE HERE                                       */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-warp-diagonal-wave-10-tb"] {
      --tb-bg:           #0e0e10;
      --tb-text:         #ffffff;
      --tb-text-dim:     #6b7280;
      --tb-accent:       var(--tb-brand-accent, #06b6d4);
      --tb-font-display: var(--tb-brand-font-display, "Geist", sans-serif);

      --headline: "RENDER NOW";
      --label:    "";
    }
    /* ═══════════════════════════════════════════════════════ */
    /* ⛔ EFFECT CODE                                          */
    /* ═══════════════════════════════════════════════════════ */
    [data-composition-id="text-warp-diagonal-wave-10-tb"] {
      position: relative; width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--tb-font-display);
    }
    [data-composition-id="text-warp-diagonal-wave-10-tb"] * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="text-warp-diagonal-wave-10-tb"] .label {
      position: absolute;
      top: 7%; left: 0; right: 0;
      text-align: center;
      font-size: clamp(10px, 1.1vmin, 13px);
      font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--tb-accent);
      opacity: 0;
    }
    [data-composition-id="text-warp-diagonal-wave-10-tb"] .svg-stage {
      position: absolute; inset: 0;
    }
        </style>
    <div class="label" id="dw10-label"></div>
    <svg class="svg-stage" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="dw10-path" d="" />
      </defs>
      <path id="dw10-guide" fill="none" stroke="white" stroke-width="1.5" opacity="0.05" d="" />
      <text font-weight="700" opacity="0" id="dw10-text">
        <textPath href="#dw10-path" id="dw10-tp" startOffset="5%"></textPath>
      </text>
    </svg>
  
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    window.__timelines = window.__timelines || {};
    window.__timelines["text-warp-diagonal-wave-10-tb"] = (function () {
      const root     = document.querySelector('[data-composition-id="text-warp-diagonal-wave-10-tb"]');
      const cs       = getComputedStyle(root);
      const labelEl  = root.querySelector("#dw10-label");
      const pathEl   = root.querySelector("#dw10-path");
      const guideEl  = root.querySelector("#dw10-guide");
      const textEl   = root.querySelector("#dw10-text");
      const tpEl     = root.querySelector("#dw10-tp");

      const headline = cs.getPropertyValue("--headline").trim().replace(/^["']|["']$/g, "");
      const label    = cs.getPropertyValue("--label").trim().replace(/^["']|["']$/g, "");
      labelEl.textContent = label;
      tpEl.textContent    = headline;

      const W = 1920, H = 1080, SEGS = 60;

      function buildWavePath(amplitude) {
        const sx = 140, sy = 260, ex = W - 140, ey = H - 280;
        const dx = ex - sx, dy = ey - sy;
        const len = Math.sqrt(dx*dx + dy*dy);
        const px = -dy/len, py = dx/len;
        const pts = [];
        for (let i = 0; i <= SEGS; i++) {
          const t = i / SEGS;
          const bx = sx + dx*t, by = sy + dy*t;
          const w = Math.sin(t * Math.PI * 2.8) * amplitude;
          pts.push([bx + px*w, by + py*w]);
        }
        let d = `M ${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
        for (let i = 1; i < pts.length - 1; i++) {
          const mx = (pts[i][0]+pts[i+1][0])/2, my = (pts[i][1]+pts[i+1][1])/2;
          d += ` Q ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)} ${mx.toFixed(1)},${my.toFixed(1)}`;
        }
        const l = pts[pts.length-1];
        d += ` L ${l[0].toFixed(1)},${l[1].toFixed(1)}`;
        return d;
      }

      const staticPath = buildWavePath(90);
      pathEl.setAttribute("d", staticPath);
      guideEl.setAttribute("d", staticPath);

      const fontSize = Math.round(H * 0.072);
      textEl.setAttribute("font-size", fontSize);
      textEl.setAttribute("fill", "white");

      const TOTAL = 7;
      const tl = gsap.timeline({ paused: true });
      const state = { offset: -55, amp: 0 };
      tl.to(labelEl, { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.1);
      tl.to(textEl,  { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.25);

      // Wave forms first (amp 0 → 90 only once, stays after)
      tl.to(state, {
        amp: 90, duration: 0.4, ease: "power2.out",
        onUpdate: () => {
          const d = buildWavePath(state.amp);
          pathEl.setAttribute("d", d);
          guideEl.setAttribute("d", d);
        }
      }, 0.1);

      // Forward: slow & readable across the wave
      tl.to(state, {
        offset: 110, duration: 4.5, ease: "power1.inOut",
        onUpdate: () => { tpEl.setAttribute("startOffset", state.offset + "%"); }
      }, 0.4);

      // Bounce back: snappier exit by the same way it came
      tl.to(state, {
        offset: -55, duration: 1.8, ease: "power2.in",
        onUpdate: () => { tpEl.setAttribute("startOffset", state.offset + "%"); }
      }, ">+0.15");

      tl.to({}, { duration: TOTAL }, 0);
      return tl;
    })();
  </script>
</div>
</body>
</html>
